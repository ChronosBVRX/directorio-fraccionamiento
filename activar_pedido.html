<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar y Asignar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Montserrat', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full border-t-4 border-[#d4af37]">
        <h1 class="text-2xl font-black text-[#143653] mb-2">Asignar Repartidor</h1>
        <p class="text-xs text-gray-500 mb-6 font-bold uppercase tracking-wider" id="folio-display">Cargando...</p>
        
        <div id="loader" class="my-6 flex justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#22527b]"></div>
        </div>

        <div id="zona-asignacion" class="hidden text-left">
            <label class="block text-sm font-bold text-gray-700 mb-2">Repartidores Conectados:</label>
            <select id="select-repartidor" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-[#22527b] mb-6">
                </select>

            <button onclick="asignarPedido()" id="btn-asignar" class="w-full bg-[#22527b] text-white font-bold px-4 py-3 rounded-lg hover:bg-[#143653] shadow-md transition">
                Asignar y Activar Pedido
            </button>
        </div>

        <div id="mensaje-final" class="hidden mt-4"></div>
        <button id="btn-cerrar" class="mt-6 hidden w-full bg-gray-200 text-gray-800 font-bold px-4 py-3 rounded-lg hover:bg-gray-300 transition" onclick="window.close()">Cerrar Pestaña</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let folioActual = null;

        async function inicializar() {
            const urlParams = new URLSearchParams(window.location.search);
            folioActual = urlParams.get('folio');
            const loader = document.getElementById('loader');
            const zonaAsignacion = document.getElementById('zona-asignacion');
            const mensajeFinal = document.getElementById('mensaje-final');
            const folioDisplay = document.getElementById('folio-display');

            if (!folioActual) {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold">Error: Folio no detectado.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            folioDisplay.innerText = `Folio: ${folioActual}`;

            // 1. Validar el estado del pedido
            const { data: pedido, error: errorPedido } = await clienteSupabase
                .from('pedidos')
                .select('estado')
                .eq('folio', folioActual)
                .single();

            if (errorPedido || !pedido) {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold">El pedido no existe en la base de datos.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            if (pedido.estado !== 'esperando_activacion') {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-yellow-600 font-bold text-lg">Este pedido ya fue procesado.</span><br><br><span class="text-sm">Estado actual: ${pedido.estado}</span>`;
                mensajeFinal.classList.remove('hidden');
                document.getElementById('btn-cerrar').classList.remove('hidden');
                return;
            }

            // 2. Buscar repartidores activos
            const { data: repartidores, error: errorReps } = await clienteSupabase
                .from('repartidores')
                .select('id, nombre, vehiculo')
                .eq('esta_activo', true);

            loader.classList.add('hidden');

            if (errorReps || !repartidores || repartidores.length === 0) {
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold text-lg">⚠️ No hay repartidores conectados en este momento.</span><br><br><span class="text-sm">Pídeles que abran su aplicación y se conecten para poder asignar el pedido. Luego recarga esta página.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            // Llenar el select
            const select = document.getElementById('select-repartidor');
            select.innerHTML = repartidores.map(r => `<option value="${r.id}">🛵 ${r.nombre} (${r.vehiculo})</option>`).join('');
            
            zonaAsignacion.classList.remove('hidden');
        }

        async function asignarPedido() {
            const repartidorSeleccionado = document.getElementById('select-repartidor').value;
            const btnAsignar = document.getElementById('btn-asignar');
            const mensajeFinal = document.getElementById('mensaje-final');
            const zonaAsignacion = document.getElementById('zona-asignacion');

            btnAsignar.innerText = "Asignando...";
            btnAsignar.disabled = true;

            // Actualizamos: Asignamos el ID del repartidor y cambiamos estado a 'asignado'
            const { data, error } = await clienteSupabase
                .from('pedidos')
                .update({ 
                    estado: 'asignado',
                    repartidor_id: repartidorSeleccionado
                })
                .eq('folio', folioActual)
                .select();

            zonaAsignacion.classList.add('hidden');

            if (error) {
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold">Error al asignar: ${error.message}</span>`;
            } else {
                mensajeFinal.innerHTML = `<span class="text-green-600 font-black text-2xl">¡Asignado y Activado! ✅</span><br><br><span class="font-normal text-sm">El repartidor que elegiste acaba de recibir la alerta.</span>`;
                document.getElementById('btn-cerrar').classList.remove('hidden');
            }
            
            mensajeFinal.classList.remove('hidden');
        }

        inicializar();
    </script>
</body>
</html>
