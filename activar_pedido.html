<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar y Asignar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Montserrat', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full border-t-4 border-[#d4af37]">
        <h1 class="text-2xl font-black text-[#143653] mb-2">Asignar Repartidor</h1>
        <p class="text-xs text-gray-500 mb-6 font-bold uppercase tracking-wider" id="folio-display">Cargando...</p>
        
        <div id="loader" class="my-6 flex justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#22527b]"></div>
        </div>

        <div id="zona-asignacion" class="hidden text-left">
            <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-3 text-center uppercase">¿Cómo está el pago?</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="pago" value="false" checked class="peer sr-only">
                        <div class="p-3 text-center border-2 rounded-lg text-xs font-bold peer-checked:border-red-500 peer-checked:bg-red-50 text-gray-500 peer-checked:text-red-600 transition-all">
                            ❌ COBRAR EFECTIVO
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="pago" value="true" class="peer sr-only">
                        <div class="p-3 text-center border-2 rounded-lg text-xs font-bold peer-checked:border-green-500 peer-checked:bg-green-50 text-gray-500 peer-checked:text-green-600 transition-all">
                            ✅ YA PAGADO
                        </div>
                    </label>
                </div>
            </div>

            <label class="block text-sm font-bold text-gray-700 mb-2">Selecciona Repartidor:</label>
            <select id="select-repartidor" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-[#22527b] mb-6">
            </select>

            <button onclick="asignarPedido()" id="btn-assign" class="w-full bg-[#22527b] text-white font-bold px-4 py-3 rounded-lg hover:bg-[#143653] shadow-md transition">
                Asignar y Activar Pedido
            </button>
        </div>

        <div id="mensaje-final" class="hidden mt-4"></div>
        <button id="btn-cerrar" class="mt-6 hidden w-full bg-gray-200 text-gray-800 font-bold px-4 py-3 rounded-lg hover:bg-gray-300 transition" onclick="window.close()">Cerrar Pestaña</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'TU_SUPABASE_KEY'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let folioActual = null;

        async function inicializar() {
            const urlParams = new URLSearchParams(window.location.search);
            folioActual = urlParams.get('folio');
            if (!folioActual) return;
            document.getElementById('folio-display').innerText = `Folio: ${folioActual}`;

            const { data: pedido } = await clienteSupabase.from('pedidos').select('estado').eq('folio', folioActual).single();
            if (pedido?.estado !== 'esperando_activacion') {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('mensaje-final').innerHTML = `<span class="text-yellow-600 font-bold">Este pedido ya fue procesado.</span>`;
                document.getElementById('mensaje-final').classList.remove('hidden');
                document.getElementById('btn-cerrar').classList.remove('hidden');
                return;
            }

            const { data: repartidores } = await clienteSupabase.from('repartidores').select('id, nombre, vehiculo').eq('esta_activo', true);
            document.getElementById('loader').classList.add('hidden');

            if (!repartidores || repartidores.length === 0) {
                document.getElementById('mensaje-final').innerHTML = `<span class="text-red-500 font-bold">No hay repartidores conectados.</span>`;
                document.getElementById('mensaje-final').classList.remove('hidden');
                return;
            }

            const select = document.getElementById('select-repartidor');
            select.innerHTML = repartidores.map(r => `<option value="${r.id}">🛵 ${r.nombre} (${r.vehiculo})</option>`).join('');
            document.getElementById('zona-asignacion').classList.remove('hidden');
        }

        async function asignarPedido() {
            const repartidorId = document.getElementById('select-repartidor').value;
            const yaPagado = document.querySelector('input[name="pago"]:checked').value === "true";
            
            const { error } = await clienteSupabase.from('pedidos').update({ 
                estado: 'asignado',
                repartidor_id: repartidorId,
                pago_confirmado: yaPagado
            }).eq('folio', folioActual);

            if (!error) {
                document.getElementById('zona-asignacion').classList.add('hidden');
                document.getElementById('mensaje-final').innerHTML = `<span class="text-green-600 font-black text-2xl">¡Éxito! ✅</span><br>Pedido asignado correctamente.`;
                document.getElementById('mensaje-final').classList.remove('hidden');
                document.getElementById('btn-cerrar').classList.remove('hidden');
            }
        }
        inicializar();
    </script>
</body>
</html>
