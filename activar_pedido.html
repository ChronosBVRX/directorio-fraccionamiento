<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar Pedido - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Montserrat', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full border-t-4 border-[#d4af37]">
        <h1 class="text-2xl font-black text-[#143653] mb-4">Activación de Pedido</h1>
        <p id="mensaje" class="text-gray-600 font-bold">Procesando folio...</p>
        
        <div id="loader" class="my-6 flex justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#22527b]"></div>
        </div>

        <button id="btn-cerrar" class="mt-6 hidden w-full bg-[#22527b] text-white font-bold px-4 py-3 rounded-lg hover:bg-[#143653] transition" onclick="window.close()">Cerrar Pestaña</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function activar() {
            const urlParams = new URLSearchParams(window.location.search);
            const folio = urlParams.get('folio');
            const mensajeEl = document.getElementById('mensaje');
            const btnCerrar = document.getElementById('btn-cerrar');
            const loader = document.getElementById('loader');

            if (!folio) {
                mensajeEl.innerText = "Error: Folio no proporcionado en el enlace.";
                loader.classList.add('hidden');
                return;
            }

            mensajeEl.innerText = `Buscando pedido ${folio}...`;

            // Cambiamos estado de 'esperando_activacion' a 'pendiente' para llamar a repartidores
            const { data, error } = await clienteSupabase
                .from('pedidos')
                .update({ estado: 'pendiente' })
                .eq('folio', folio)
                .select();

            loader.classList.add('hidden');

            if (error) {
                mensajeEl.innerText = "Error de conexión con la base de datos.";
            } else if (data.length === 0) {
                mensajeEl.innerHTML = `<span class="text-red-500">El pedido no existe o ya fue activado por otro medio.</span>`;
                btnCerrar.classList.remove('hidden');
            } else {
                mensajeEl.innerHTML = `<span class="text-green-600 font-black text-2xl">¡Pedido Activado! ✅</span><br><br><span class="font-normal text-sm">Los repartidores cercanos han sido notificados. Prepara la orden.</span>`;
                btnCerrar.classList.remove('hidden');
            }
        }

        activar();
    </script>
</body>
</html>
