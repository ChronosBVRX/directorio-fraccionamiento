<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activar y Asignar Pedido - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Montserrat', sans-serif; } </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full border-t-4 border-[#d4af37]">
        <h1 class="text-2xl font-black text-[#143653] mb-2">Asignar Repartidor</h1>
        <p class="text-xs text-gray-500 mb-6 font-bold uppercase tracking-wider" id="folio-display">Verificando sesión...</p>
        
        <div id="loader" class="my-6 flex justify-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#22527b]"></div>
        </div>

        <div id="zona-login" class="hidden text-center my-6">
            <span class="text-4xl block mb-2">🔒</span>
            <p class="text-gray-700 font-bold mb-4">Debes iniciar sesión con la cuenta de tu negocio para confirmar este pedido.</p>
            <a href="login.html" id="btn-ir-login" class="inline-block w-full bg-[#22527b] text-white font-bold py-3 rounded-lg hover:bg-[#143653] shadow-md transition uppercase tracking-widest text-sm">
                Ir a Iniciar Sesión
            </a>
        </div>

        <div id="zona-asignacion" class="hidden text-left">
            <div class="mb-6 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <label class="block text-sm font-bold text-gray-700 mb-3 text-center uppercase">¿Cómo está el pago?</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="pago" value="false" checked class="peer sr-only">
                        <div class="p-3 text-center border-2 rounded-lg text-[10px] font-black peer-checked:border-red-500 peer-checked:bg-red-50 text-gray-400 peer-checked:text-red-600 transition-all uppercase leading-tight">
                            ❌ Cobrar<br>Efectivo
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="pago" value="true" class="peer sr-only">
                        <div class="p-3 text-center border-2 rounded-lg text-[10px] font-black peer-checked:border-green-500 peer-checked:bg-green-50 text-gray-400 peer-checked:text-green-600 transition-all uppercase leading-tight">
                            ✅ Ya está<br>Pagado
                        </div>
                    </label>
                </div>
            </div>

            <label class="block text-sm font-bold text-gray-700 mb-2">Selecciona Repartidor:</label>
            <select id="select-repartidor" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-[#22527b] mb-6 font-bold text-sm">
                </select>

            <button onclick="asignarPedido()" id="btn-asignar" class="w-full bg-[#22527b] text-white font-bold py-4 rounded-lg hover:bg-[#143653] shadow-md transition uppercase tracking-widest text-sm">
                Confirmar y Activar
            </button>
        </div>

        <div id="mensaje-final" class="hidden mt-4"></div>
        <button id="btn-cerrar" class="mt-6 hidden w-full bg-gray-200 text-gray-800 font-bold px-4 py-3 rounded-lg hover:bg-gray-300 transition" onclick="window.close()">Cerrar Pestaña</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let folioActual = null;
        let usuarioActual = null;

        // Escuchar el estado de la sesión y crear la ruta de regreso
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            usuarioActual = session ? session.user : null;
            if (usuarioActual) {
                inicializar();
            } else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('zona-asignacion').classList.add('hidden');
                document.getElementById('zona-login').classList.remove('hidden');
                document.getElementById('folio-display').innerText = 'Acceso Denegado';
                
                // Extraer folio y generar ruta de regreso para el login
                const urlParams = new URLSearchParams(window.location.search);
                const folioParam = urlParams.get('folio');
                if (folioParam) {
                    const rutaRegreso = encodeURIComponent(`activar_pedido.html?folio=${folioParam}`);
                    document.getElementById('btn-ir-login').href = `login.html?returnTo=${rutaRegreso}`;
                } else {
                    document.getElementById('btn-ir-login').href = 'login.html';
                }
            }
        });

        async function inicializar() {
            const urlParams = new URLSearchParams(window.location.search);
            folioActual = urlParams.get('folio');
            const loader = document.getElementById('loader');
            const zonaAsignacion = document.getElementById('zona-asignacion');
            const zonaLogin = document.getElementById('zona-login');
            const mensajeFinal = document.getElementById('mensaje-final');
            const folioDisplay = document.getElementById('folio-display');

            zonaLogin.classList.add('hidden');
            loader.classList.remove('hidden');

            if (!folioActual) {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold">Error: Folio no detectado.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            folioDisplay.innerText = `Folio: ${folioActual}`;

            const { data: pedido, error: errorPedido } = await clienteSupabase.from('pedidos').select('estado').eq('folio', folioActual).single();

            if (errorPedido || !pedido) {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold">El pedido no existe.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            if (pedido.estado !== 'esperando_activacion') {
                loader.classList.add('hidden');
                mensajeFinal.innerHTML = `<span class="text-yellow-600 font-bold text-lg">Este pedido ya fue activado.</span><br><span class="text-sm">Estado: ${pedido.estado}</span>`;
                mensajeFinal.classList.remove('hidden');
                document.getElementById('btn-cerrar').classList.remove('hidden');
                return;
            }

            const { data: repartidores } = await clienteSupabase.from('repartidores').select('id, nombre, vehiculo').eq('esta_activo', true);
            loader.classList.add('hidden');

            if (!repartidores || repartidores.length === 0) {
                mensajeFinal.innerHTML = `<span class="text-red-500 font-bold text-lg">⚠️ No hay repartidores en línea.</span><br><span class="text-xs mt-2 block">Pídeles que abran su app y se conecten.</span>`;
                mensajeFinal.classList.remove('hidden');
                return;
            }

            const select = document.getElementById('select-repartidor');
            select.innerHTML = repartidores.map(r => `<option value="${r.id}">🛵 ${r.nombre} (${r.vehiculo})</option>`).join('');
            zonaAsignacion.classList.remove('hidden');
        }

        async function asignarPedido() {
            const repartidorId = document.getElementById('select-repartidor').value;
            const esPagado = document.querySelector('input[name="pago"]:checked').value === "true";
            const btn = document.getElementById('btn-asignar');

            btn.innerText = "Procesando..."; 
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            document.getElementById('mensaje-final').classList.add('hidden');

            const { data, error } = await clienteSupabase.functions.invoke('asignar-pedido', {
                body: {
                    folio: folioActual,
                    repartidor_id: repartidorId,
                    es_pagado: esPagado
                }
            });

            btn.classList.remove('opacity-50', 'cursor-not-allowed');

            if (error || !data.success) {
                const mensajeError = error?.message || data?.error || "Error desconocido al procesar la solicitud.";
                
                document.getElementById('mensaje-final').innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-4 rounded-xl text-left mt-4 animate-pulse">
                        <span class="text-red-600 font-black text-lg block mb-1">⚠️ Acceso Denegado</span>
                        <span class="font-bold text-sm text-red-500">${mensajeError}</span>
                    </div>
                `;
                document.getElementById('mensaje-final').classList.remove('hidden');
                
                btn.innerText = "Confirmar y Activar"; 
                btn.disabled = false;
            } else {
                document.getElementById('zona-asignacion').classList.add('hidden');
                document.getElementById('mensaje-final').innerHTML = `
                    <div class="bg-green-50 border border-green-200 p-4 rounded-xl mt-4">
                        <span class="text-green-600 font-black text-2xl block mb-1">¡Activado! ✅</span>
                        <span class="font-bold text-sm text-green-700">El repartidor ha recibido la alerta.</span>
                    </div>
                `;
                document.getElementById('mensaje-final').classList.remove('hidden');
                document.getElementById('btn-cerrar').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
