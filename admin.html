<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración General - Vive Tres Marías</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } } }</script>
</head>
<body class="bg-gray-100 font-sans text-tm-gris min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div id="pantalla-carga" class="flex flex-col items-center justify-center h-screen bg-gray-100 absolute inset-0 z-50"><div class="w-12 h-12 border-4 border-tm-azul border-t-tm-dorado rounded-full animate-spin mb-4"></div><h2 class="text-xl font-bold text-tm-azul-oscuro">Verificando credenciales...</h2></div>
    <div id="pantalla-denegado" class="hidden flex-col items-center justify-center h-screen text-center px-4 bg-gray-100 absolute inset-0 z-40"><div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border-t-4 border-red-500"><span class="text-5xl mb-4 block">🚫</span><h2 class="text-2xl font-black text-tm-azul-oscuro mb-2">Acceso Restringido</h2><p class="text-gray-500 mb-6">Esta área es exclusiva para administradores.</p><a href="index.html" class="bg-tm-azul text-white px-6 py-3 rounded-lg font-bold block w-full">Volver al Inicio</a></div></div>

    <div id="panel-admin" class="hidden flex h-screen overflow-hidden">
        <aside class="w-64 bg-tm-azul-oscuro text-white flex flex-col shadow-2xl z-20 hidden md:flex">
            <div class="p-6 border-b border-white/10 text-center"><h1 class="text-xl font-black text-tm-dorado">Vive Tres Marías</h1></div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="cambiarVistaAdmin('directorio')" id="nav-directorio" class="w-full flex items-center gap-3 bg-white/10 text-white px-4 py-3 rounded-lg font-bold transition">🏢 Negocios</button>
                <button onclick="cambiarVistaAdmin('solicitudes')" id="nav-solicitudes" class="w-full flex items-center gap-3 hover:bg-white/5 text-gray-300 hover:text-white px-4 py-3 rounded-lg font-bold transition">🛡️ Verificaciones</button>
            </nav>
            <div class="p-4 border-t border-white/10"><button onclick="cerrarSesion()" class="w-full bg-red-500/20 text-red-100 px-4 py-2 rounded-lg text-sm font-bold">Salir</button></div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-gray-50 p-4 md:p-8 relative">
            <div id="vista-directorio" class="block">
                <div class="mb-8"><h2 class="text-3xl font-black text-tm-azul-oscuro">Directorio de Negocios</h2></div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500"><th class="p-4 font-bold">Negocio</th><th class="p-4 font-bold">Categoría</th><th class="p-4 font-bold text-center">Plan</th><th class="p-4 font-bold text-right">Acciones</th></tr></thead>
                        <tbody id="tabla-negocios" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>

            <div id="vista-solicitudes" class="hidden">
                <div class="mb-8"><h2 class="text-3xl font-black text-tm-azul-oscuro">Verificaciones Pendientes</h2></div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead><tr class="bg-blue-50 border-b border-blue-100 text-xs uppercase tracking-wider text-blue-800"><th class="p-4 font-bold">Negocio</th><th class="p-4 font-bold">Responsable Declarado</th><th class="p-4 font-bold text-right">Acción</th></tr></thead>
                        <tbody id="tabla-solicitudes" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-editar" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg relative shadow-2xl"><button onclick="cerrarModalEditar()" class="absolute top-4 right-4 text-2xl">&times;</button><h2 class="text-xl font-black mb-4">Editar Negocio</h2>
            <form id="form-editar" onsubmit="event.preventDefault(); guardarEdicion();" class="space-y-4">
                <input type="hidden" id="edit-id"><input type="hidden" id="edit-horarios-oculto">
                <div><label class="text-xs font-bold uppercase">Nombre del Negocio</label><input type="text" id="edit-nombre" required class="w-full p-2.5 border rounded-lg mt-1"></div>
                <div class="grid grid-cols-2 gap-4"><div><label class="text-xs font-bold uppercase">Categoría</label><select id="edit-categoria" class="w-full p-2.5 border rounded-lg mt-1"><option>Alimentos</option><option>Servicios</option><option>Salud</option><option>Hogar</option></select></div><div><label class="text-xs font-bold uppercase">WhatsApp</label><input type="number" id="edit-wa" required class="w-full p-2.5 border rounded-lg mt-1"></div></div>
                <div><label class="text-xs font-bold uppercase">Nivel de Pago</label><select id="edit-nivel" class="w-full p-2.5 border rounded-lg mt-1 font-bold"><option value="0">0 - Básico</option><option value="1">1 - Pro</option><option value="2">2 - Elite</option></select></div>
                <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-100"><div><label class="text-xs font-bold text-blue-800 uppercase">Badge de Verificado ✅</label></div><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="edit-verificado" class="sr-only peer"><div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div></label></div>
                <button type="submit" id="btn-guardar-edicion" class="w-full bg-tm-dorado text-white py-3 rounded-lg font-bold">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener("DOMContentLoaded", async () => {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (!session) { document.getElementById('pantalla-carga').classList.add('hidden'); document.getElementById('pantalla-denegado').classList.remove('hidden'); return; }
            const { data: perfil } = await clienteSupabase.from('perfiles').select('es_admin').eq('user_id', session.user.id).single();
            if (!perfil || !perfil.es_admin) { document.getElementById('pantalla-carga').classList.add('hidden'); document.getElementById('pantalla-denegado').classList.remove('hidden'); return; }
            
            document.getElementById('pantalla-carga').classList.add('hidden'); document.getElementById('panel-admin').classList.remove('hidden');
            cargarTodosLosNegocios();
        });

        function cambiarVistaAdmin(vista) {
            document.getElementById('vista-directorio').classList.toggle('hidden', vista !== 'directorio');
            document.getElementById('vista-solicitudes').classList.toggle('hidden', vista !== 'solicitudes');
            if(vista === 'directorio') cargarTodosLosNegocios(); else cargarSolicitudesPendientes();
        }

        async function cargarTodosLosNegocios() {
            const { data: negocios } = await clienteSupabase.from('anuncios').select('*').order('id', { ascending: false });
            document.getElementById('tabla-negocios').innerHTML = negocios.map(n => {
                const badgeVerificado = n.es_verificado ? '<span class="text-blue-500">☑️</span>' : '';
                return `<tr class="border-b"><td class="p-4 font-bold">${n.nombre_negocio} ${badgeVerificado}</td><td class="p-4 text-sm">${n.categoria}</td><td class="p-4 text-center">Nivel ${n.nivel_pago}</td><td class="p-4 text-right"><button onclick="abrirModalEditar('${encodeURIComponent(JSON.stringify(n))}')" class="text-tm-azul text-xs font-bold mx-2">Editar</button></td></tr>`;
            }).join('');
        }

        function abrirModalEditar(negocioStr) {
            const n = JSON.parse(decodeURIComponent(negocioStr));
            document.getElementById('edit-id').value = n.id; document.getElementById('edit-nombre').value = n.nombre_negocio || ''; document.getElementById('edit-categoria').value = n.categoria || 'Servicios';
            document.getElementById('edit-wa').value = n.enlace_whatsapp || ''; document.getElementById('edit-nivel').value = n.nivel_pago || 0; document.getElementById('edit-verificado').checked = n.es_verificado || false;
            document.getElementById('edit-horarios-oculto').value = JSON.stringify(n.horarios || {}); // Preservar horarios
            document.getElementById('modal-editar').classList.remove('hidden');
        }

        function cerrarModalEditar() { document.getElementById('modal-editar').classList.add('hidden'); }

        async function guardarEdicion() {
            const id = document.getElementById('edit-id').value;
            const payloadDatos = { nombre_negocio: document.getElementById('edit-nombre').value, categoria: document.getElementById('edit-categoria').value, enlace_whatsapp: document.getElementById('edit-wa').value, nivel_pago: parseInt(document.getElementById('edit-nivel').value), es_verificado: document.getElementById('edit-verificado').checked, horarios: JSON.parse(document.getElementById('edit-horarios-oculto').value) };
            await clienteSupabase.functions.invoke('admin-gestionar', { body: { accion: 'editar', id_negocio: id, payload: payloadDatos } });
            cerrarModalEditar(); cargarTodosLosNegocios();
        }

        async function cargarSolicitudesPendientes() {
            const { data } = await clienteSupabase.from('anuncios').select('*').eq('estado_verificacion', 'pendiente');
            document.getElementById('tabla-solicitudes').innerHTML = data.map(s => `<tr class="border-b"><td class="p-4 font-bold">${s.nombre_negocio}</td><td class="p-4 text-sm">${s.responsable_nombre}</td><td class="p-4 text-right"><button onclick="alert('Usa tu panel Supabase temporalmente para revisar el bucket de Verificaciones de: ${s.responsable_nombre}')" class="text-blue-600 font-bold text-xs">Revisar INE</button></td></tr>`).join('');
        }

        async function cerrarSesion() { await clienteSupabase.auth.signOut(); window.location.href = "index.html"; }
    </script>
</body>
</html>
