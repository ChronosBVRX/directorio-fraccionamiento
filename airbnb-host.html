<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Airbnb - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-tm-azul p-3 relative">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" class="h-10 sm:h-12">
            </a>
            <button onclick="document.getElementById('dropdown').classList.toggle('hidden')" class="p-2 bg-gray-100 rounded-lg text-tm-azul hover:bg-gray-200 transition">☰</button>
        </div>
        <div id="dropdown" class="hidden absolute right-3 mt-2 w-48 bg-white shadow-xl rounded-xl border z-50 overflow-hidden">
            <a href="index.html" class="block p-3 border-b hover:bg-gray-50 text-sm">🏪 Directorio</a>
            <a href="rastreo.html" class="block p-3 hover:bg-gray-50 text-sm">📍 Rastrear Pedido</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 mt-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-tm-azul-oscuro">
            <h1 class="text-2xl font-black text-tm-azul-oscuro mb-6 text-center">Panel Airbnb</h1>
            
            <form id="form-airbnb" onsubmit="guardarAirbnb(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-tm-gris mb-1">Nombre del Alojamiento</label>
                    <input type="text" id="airbnb-nombre" placeholder="Ej: Departamento T4 2A" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-tm-dorado" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-tm-gris mb-1">Dirección de Entrega</label>
                    <textarea id="airbnb-direccion" placeholder="Calle, Número, Coto y referencias..." class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-tm-dorado" rows="3" required></textarea>
                </div>
                <button type="submit" id="btn-guardar" class="w-full bg-tm-azul text-white font-black py-4 rounded-xl shadow-lg hover:bg-tm-azul-oscuro transition">
                    Guardar y Crear Póster
                </button>
            </form>

            <div id="seccion-pdf" class="hidden mt-8 text-center border-t pt-8">
                <p class="text-sm text-gray-500 mb-4 font-bold">¡Configuración guardada!</p>
                <button onclick="generarPosterPDF()" class="w-full bg-gradient-to-r from-tm-dorado to-yellow-600 text-white font-black py-5 rounded-2xl shadow-xl hover:scale-105 transition-all">
                    🖨️ Descargar Póster (1 Hoja)
                </button>
            </div>
        </div>
    </main>

    <div style="position: fixed; right: 200%; top: 0;">
        <div id="plantilla-poster" style="width: 800px; height: 1050px; background: white; border: 30px solid #22527b; padding: 50px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Arial', sans-serif;">
            
            <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" style="width: 350px; margin-bottom: 30px;">
            
            <h1 style="font-size: 55px; color: #143653; font-weight: 900; margin: 0; line-height: 1.1; text-align: center;">Pide a domicilio</h1>
            
            <div style="background: #f3f4f6; border-radius: 20px; padding: 25px; width: 90%; margin: 30px 0; border: 2px dashed #999; text-align: center;">
                <p style="font-size: 26px; color: #4b5563; font-weight: 600; margin: 0;">📍 Estás en: <br> 
                    <span id="pdf-nombre" style="font-size: 40px; color: #22527b; font-weight: 900; display: block; margin-top: 10px;"></span>
                </p>
            </div>

            <div style="background: white; padding: 20px; border-radius: 25px; border: 5px solid #e5e7eb; display: inline-block; margin-bottom: 30px;">
                <div id="qr-container"></div>
            </div>

            <div style="background: #fff8eb; border-left: 12px solid #d4af37; padding: 30px; border-radius: 0 20px 20px 0; width: 85%;">
                <h3 style="font-size: 32px; color: #d4af37; font-weight: 900; margin: 0 0 15px 0;">Instrucciones:</h3>
                <p style="font-size: 22px; color: #4b5563; margin: 0 0 10px 0; font-weight: bold;">📱 1. Escanea el código con tu celular.</p>
                <p style="font-size: 22px; color: #4b5563; margin: 0 0 10px 0; font-weight: bold;">🍔 2. Elige tu comida favorita.</p>
                <p style="font-size: 22px; color: #22527b; margin: 0; font-weight: 900;">✨ 3. ¡Pide fácil! Tu dirección ya está cargada.</p>
            </div>

            <p style="margin-top: 30px; color: #999; font-weight: bold; letter-spacing: 3px; font-size: 16px;">VIVETRESMARIAS.COM</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function guardarAirbnb(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const nombre = document.getElementById('airbnb-nombre').value;
            const direccion = document.getElementById('airbnb-direccion').value;

            const { data, error } = await clienteSupabase.from('airbnbs').insert([{ nombre_alojamiento: nombre, direccion_completa: direccion }]).select().single();
            
            if (data) {
                document.getElementById('pdf-nombre').innerText = data.nombre_alojamiento;
                
                const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
                const urlMagica = `${baseUrl}/bienvenida.html?id=${data.id}`;
                
                const qrCont = document.getElementById('qr-container');
                qrCont.innerHTML = "";
                new QRCode(qrCont, { text: urlMagica, width: 280, height: 280, colorDark: "#143653" });
                
                document.getElementById('seccion-pdf').classList.remove('hidden');
                alert("¡Guardado! Ya puedes descargar tu póster.");
            } else { 
                alert("Error al guardar en la base de datos."); 
            }
            btn.innerText = "Guardar y Crear Póster"; btn.disabled = false;
        }

        function generarPosterPDF() {
            const element = document.getElementById('plantilla-poster');
            const nombreLimpio = document.getElementById('airbnb-nombre').value.replace(/[^a-z0-9]/gi, '_');
            
            const opt = {
                margin: 0,
                filename: `Poster_Airbnb_${nombreLimpio}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 2, 
                    useCORS: true, 
                    windowWidth: 800
                },
                // AQUÍ ESTÁ LA MAGIA: Obligamos a que el PDF sea EXACTAMENTE de 800x1050 px, sin hacer "auto-ajustes".
                jsPDF: { unit: 'px', format: [800, 1050], orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
