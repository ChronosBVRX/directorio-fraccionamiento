<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Airbnb - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-xl w-full bg-white p-6 rounded-2xl shadow-md border-t-8 border-[#22527b]">
        <h1 class="text-2xl font-black text-[#143653] mb-4 text-center">Configura tu Airbnb</h1>
        <form id="form-airbnb" onsubmit="guardarAirbnb(event)" class="space-y-4">
            <input type="hidden" id="airbnb-id">
            <input type="text" id="airbnb-nombre" placeholder="Nombre de tu Alojamiento" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-[#d4af37]" required>
            <textarea id="airbnb-direccion" placeholder="Dirección completa para repartidores" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-[#d4af37]" rows="3" required></textarea>
            <button type="submit" id="btn-guardar" class="w-full bg-[#22527b] text-white font-bold py-3 rounded-lg shadow">Guardar y Generar Póster</button>
        </form>

        <div id="seccion-pdf" class="hidden mt-6 text-center border-t pt-6">
            <p class="text-sm text-tm-gris mb-4">¡Todo listo! Descarga tu póster inteligente para imprimir.</p>
            <button onclick="generarPosterPDF()" class="w-full bg-[#d4af37] text-white font-black py-4 rounded-xl shadow-lg">🖨️ Descargar Póster PDF</button>
        </div>
    </div>

    <div style="position: absolute; top: 0; left: -9999px; z-index: -1;">
        <div id="plantilla-poster" class="bg-white w-[800px] h-[1130px] flex flex-col items-center justify-center text-center p-12 border-[15px] border-[#22527b]">
            <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" style="width: 300px; margin-bottom: 50px;">
            <h1 style="color: #143653; font-size: 50px; font-weight: 900; margin-bottom: 20px;">Pide a tu puerta</h1>
            <div style="background: #f3f4f6; border-radius: 20px; padding: 25px 45px; margin-bottom: 50px;">
                <p style="color: #4b5563; font-size: 28px; font-weight: 600;">📍 Estás en: <br><span id="poster-nombre-airbnb" style="color: #22527b; font-weight: 900; font-size: 36px;">...</span></p>
            </div>
            <div id="qr-container" style="background: white; padding: 25px; border-radius: 25px; border: 4px solid #e5e7eb; margin-bottom: 60px;"></div>
            <p style="font-size: 24px; color: #4b5563;">Escanea, elige tu comida y nosotros ya sabemos dónde entregártela.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function guardarAirbnb(e) {
            e.preventDefault();
            const nombre = document.getElementById('airbnb-nombre').value;
            const direccion = document.getElementById('airbnb-direccion').value;
            const { data } = await clienteSupabase.from('airbnbs').insert([{ nombre_alojamiento: nombre, direccion_completa: direccion }]).select().single();
            if (data) {
                document.getElementById('poster-nombre-airbnb').innerText = data.nombre_alojamiento;
                const url = window.location.href.replace('airbnb-host.html', `bienvenida.html?id=${data.id}`);
                new QRCode(document.getElementById("qr-container"), { text: url, width: 400, height: 400 });
                document.getElementById('seccion-pdf').classList.remove('hidden');
            }
        }

        function generarPosterPDF() {
            const el = document.getElementById('plantilla-poster');
            const opt = {
                filename: 'Poster_Airbnb.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, windowWidth: 800 },
                jsPDF: { unit: 'px', format: [800, 1130], orientation: 'portrait' }
            };
            html2pdf().set(opt).from(el).save();
        }
    </script>
</body>
</html>
