<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Sitio... | Conecta Tres Marias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ctm-azul': '#143653',
                        'ctm-dorado': '#d4af37',
                        'ctm-footer': '#22527b'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style> 
        body { font-family: 'Montserrat', sans-serif; } 
        /* Pequeña animación extra para darle vida a la carga de imágenes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-element {
            animation: fadeIn 0.6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 hidden selection:bg-ctm-dorado selection:text-ctm-azul" id="body-content">

    <header id="hero-header" class="text-white py-32 px-6 text-center relative overflow-hidden bg-gray-900 shadow-xl">
        <img id="hero-bg-img" src="" class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay transition-transform duration-1000 hover:scale-105" alt="Fondo Conecta Tres Marias">
        <div class="absolute inset-0 bg-gradient-to-t from-ctm-azul via-ctm-azul/80 to-transparent"></div>
        
        <div class="max-w-4xl mx-auto relative z-10 fade-in-element">
            <span id="badge-categoria" class="text-xs font-black uppercase tracking-widest text-ctm-dorado mb-4 block drop-shadow-md">Negocio Local</span>
            <h1 id="hero-titulo" class="text-5xl md:text-7xl font-black mb-6 leading-tight drop-shadow-2xl text-white tracking-tight"></h1>
            <p id="hero-subtitulo" class="text-lg md:text-2xl text-blue-100 mb-10 max-w-2xl mx-auto font-medium drop-shadow"></p>
            <a href="#" id="hero-cta" class="inline-block bg-ctm-dorado text-ctm-azul font-black px-10 py-4 rounded-full shadow-[0_10px_30px_rgba(212,175,55,0.4)] hover:bg-yellow-400 hover:scale-105 hover:shadow-[0_15px_35px_rgba(212,175,55,0.6)] transition-all duration-300 transform ring-4 ring-ctm-dorado/30"></a>
        </div>
    </header>

    <section class="py-24 px-6 max-w-4xl mx-auto text-center fade-in-element" style="animation-delay: 0.2s;">
        <h2 id="acerca-titulo" class="text-4xl font-black text-ctm-azul mb-8 relative inline-block">
            Conócenos
            <span class="absolute -bottom-2 left-1/4 w-1/2 h-1 bg-ctm-dorado rounded-full"></span>
        </h2>
        <p id="acerca-parrafo" class="text-gray-600 leading-relaxed text-xl font-medium mt-6"></p>
    </section>

    <section id="seccion-galeria" class="hidden bg-gray-100 py-24 px-6 border-t border-gray-200">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-4xl font-black text-center mb-4 text-ctm-azul">Nuestros Servicios y Productos</h3>
            <p class="text-center text-gray-500 mb-16 text-lg">Lo mejor de nuestro catálogo directo para ti en Conecta Tres Marias.</p>
            
            <div id="contenedor-galeria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <section class="bg-white py-24 px-6 border-t border-gray-100 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-50 via-white to-white -z-10"></div>
        <div class="max-w-7xl mx-auto">
            <h3 class="text-4xl font-black text-center mb-16 text-ctm-azul">¿Por qué elegirnos?</h3>
            <div id="contenedor-beneficios" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <footer id="contacto" class="bg-ctm-footer text-white py-20 text-center relative">
        <div class="max-w-4xl mx-auto px-6 relative z-10">
            <h3 class="text-3xl font-black mb-8 drop-shadow-md">¿Tienes alguna duda o quieres agendar?</h3>
            <a id="btn-whatsapp" href="#" target="_blank" class="inline-flex items-center gap-3 bg-[#25D366] text-white font-black px-10 py-5 rounded-full shadow-[0_10px_25px_rgba(37,211,102,0.4)] hover:bg-[#20bd5a] transition-all duration-300 hover:-translate-y-2 animate-bounce hover:animate-none group">
                <span class="text-3xl group-hover:scale-110 transition-transform">📱</span> 
                <span class="text-lg">Enviar WhatsApp</span>
            </a>
        </div>
    </footer>

    <script>
        // Inicialización de Supabase
        if (!window.clienteSupabaseMicro) {
            window.clienteSupabaseMicro = window.supabase.createClient(
                'https://vlnpefgqodnxcqeztcnh.supabase.co', 
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'
            );
        }

        async function cargarMicrositio() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('id'); 

            if (!slug) return mostrarError();

            try {
                const { data, error } = await window.clienteSupabaseMicro
                    .from('micrositios')
                    .select('*, anuncios(id, categoria, enlace_whatsapp)')
                    .eq('slug', slug)
                    .single();

                if (error || !data) throw error;

                const cont = data.contenido;
                
                document.title = cont.hero.titulo ? cont.hero.titulo + ' | Conecta Tres Marias' : 'Sitio web | Conecta Tres Marias';
                if(data.anuncios && data.anuncios.categoria) document.getElementById('badge-categoria').innerText = data.anuncios.categoria;
                document.getElementById('hero-titulo').innerText = cont.hero.titulo || '';
                document.getElementById('hero-subtitulo').innerText = cont.hero.subtitulo || '';
                
                const btnCta = document.getElementById('hero-cta');
                btnCta.innerText = cont.hero.cta || 'Contactar ahora';
                btnCta.href = `index.html?id=${data.anuncio_id}`;
                
                // CORRECCIÓN FONDO HERO
                const imgFondo = document.getElementById('hero-bg-img');
                if (cont.hero.imagen_real_banner) {
                    imgFondo.src = cont.hero.imagen_real_banner;
                } else if (cont.hero.keyword_fondo) {
                    imgFondo.src = `https://loremflickr.com/1280/720/${cont.hero.keyword_fondo},business`;
                } else {
                    imgFondo.src = `https://loremflickr.com/1280/720/business,interior`;
                }

                // RENDERIZAR LA GALERÍA DE IMÁGENES
                const galeriaArr = cont.galeria_productos || [];
                const seccionGaleria = document.getElementById('seccion-galeria');
                const contenedorGaleria = document.getElementById('contenedor-galeria');

                if (galeriaArr.length > 0) {
                    seccionGaleria.classList.remove('hidden'); 
                    galeriaArr.forEach((prod, index) => {
                        
                        // PARCHE MÁGICO: Si la base de datos tiene la ruta rota de Unsplash, la arreglamos aquí mismo
                        let urlSegura = prod.imagen_url;
                        if (urlSegura && urlSegura.includes('unsplash.com')) {
                            // Extraemos el nombre del servicio para buscar una foto similar
                            let keywordLimpio = prod.nombre.replace(/\s+/g, '').toLowerCase() || 'service';
                            urlSegura = `https://loremflickr.com/800/600/${keywordLimpio},professional?lock=${index}`;
                        }

                        // Agregamos un onerror por si la foto falla en cargar, ponga un fondo gris que dice "Servicio"
                        // CORRECCIÓN: Se cambiaron las clases text-tm-azul-oscuro y text-tm-dorado a las variables ctm configuradas arriba.
                        contenedorGaleria.innerHTML += `
                            <div class="bg-white rounded-3xl shadow-lg overflow-hidden hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2 border border-gray-100 flex flex-col group">
                                <div class="h-56 w-full overflow-hidden bg-gray-100 shrink-0 relative">
                                    <div class="absolute inset-0 bg-ctm-azul opacity-0 group-hover:opacity-20 transition-opacity duration-300 z-10"></div>
                                    <img src="${urlSegura}" onerror="this.src='https://placehold.co/800x600/f3f4f6/143653?text=Servicio'" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${prod.nombre}">
                                </div>
                                <div class="p-8 flex flex-col flex-grow">
                                    <div class="flex justify-between items-start mb-4 gap-3">
                                        <h4 class="font-black text-xl text-ctm-azul leading-tight">${prod.nombre}</h4>
                                        <span class="bg-yellow-50 text-ctm-dorado font-black px-3 py-1.5 rounded-lg text-sm shrink-0 border border-yellow-100 shadow-sm">${prod.precio}</span>
                                    </div>
                                    <p class="text-base text-gray-500 line-clamp-3 leading-relaxed">${prod.descripcion || 'Excelente servicio garantizado.'}</p>
                                </div>
                            </div>
                        `;
                    });
                }

                document.getElementById('acerca-titulo').innerText = cont.acerca_de.titulo || 'Nuestra Historia';
                document.getElementById('acerca-parrafo').innerText = cont.acerca_de.parrafo || '';

                const divBeneficios = document.getElementById('contenedor-beneficios');
                divBeneficios.innerHTML = ''; 
                if(cont.beneficios && cont.beneficios.length > 0) {
                    cont.beneficios.forEach((b, i) => {
                        // Se agrega un pequeño delay escalonado para la animación si se deseara
                        divBeneficios.innerHTML += `
                            <div class="bg-white border border-gray-100 p-10 rounded-[2.5rem] text-center shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 group">
                                <div class="text-6xl mb-6 transform group-hover:scale-110 group-hover:rotate-6 transition-transform duration-300">✨</div>
                                <p class="font-bold text-ctm-azul text-xl leading-relaxed">${b}</p>
                            </div>
                        `;
                    });
                }

                if(data.anuncios && data.anuncios.enlace_whatsapp) {
                    const wsLink = `https://wa.me/${data.anuncios.enlace_whatsapp.replace(/\D/g, '')}`;
                    document.getElementById('btn-whatsapp').href = wsLink;
                } else {
                    document.getElementById('btn-whatsapp').style.display = 'none';
                }

                document.body.classList.remove('hidden');

            } catch (err) {
                console.error("Error cargando el micrositio:", err);
                mostrarError();
            }
        }

        function mostrarError() {
            document.body.innerHTML = `
                <div class="h-screen flex flex-col items-center justify-center text-center px-4 bg-gray-50">
                    <div class="text-8xl mb-6">🔍</div>
                    <h1 class="text-5xl font-black text-ctm-azul mb-4">Sitio no encontrado</h1>
                    <p class="text-xl text-gray-500 max-w-md mx-auto">Este espacio de Conecta Tres Marias no existe o fue eliminado temporalmente.</p>
                </div>
            `;
            document.body.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', cargarMicrositio);
    </script>
</body>
</html>
