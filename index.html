<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio - Cañadas del Bosque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'bosque-morado': '#622e70',    
                'bosque-oliva': '#5d444e',     
                'bosque-lima': '#a8c345',      
                'bosque-cian': '#34bec1',      
                'bosque-amarillo': '#ebd138',  
              }
            }
          }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-4 border-bosque-morado">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-serif tracking-wide text-bosque-oliva uppercase">Cañadas <span class="lowercase text-bosque-lima italic text-2xl">del</span> <span class="text-bosque-morado font-bold text-4xl">Bosque</span></h1>
                <p class="text-sm text-bosque-oliva mt-1 font-light">El hogar para tu familia</p>
            </div>
            <button class="bg-bosque-cian hover:bg-teal-500 text-white px-5 py-2 rounded-full font-medium transition shadow-sm hidden sm:block">
                Anuncia tu negocio
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="mb-10 text-center">
            <h2 class="text-2xl font-bold text-bosque-morado mb-2">Directorio Vecinal</h2>
            <p class="text-gray-600">Encuentra los mejores servicios y productos sin salir de casa.</p>
        </div>

        <div id="contenedor-anuncios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full text-bosque-oliva animate-pulse">Cargando directorio...</p>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN DE SUPABASE CON TUS CLAVES EXACTAS ---
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- LÓGICA DE DIBUJADO DE TARJETAS ---
        async function cargarAnuncios() {
            let { data: anuncios, error } = await supabase
                .from('anuncios')
                .select('*')
                .order('nivel_pago', { ascending: false });

            if (error) {
                console.error("Error cargando datos:", error);
                document.getElementById('contenedor-anuncios').innerHTML = '<p class="col-span-full text-red-500 text-center">Error al cargar los anuncios. Verifica tu base de datos en Supabase.</p>';
                return;
            }

            const contenedor = document.getElementById('contenedor-anuncios');
            
            // Si la base de datos está vacía
            if (anuncios.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-gray-500 text-center">Aún no hay negocios registrados. ¡Sé el primero en anunciarte!</p>';
                return;
            }

            contenedor.innerHTML = ''; 

            anuncios.forEach(anuncio => {
                let htmlTarjeta = '';

                if (anuncio.nivel_pago === 0) {
                    // NIVEL GRATIS
                    htmlTarjeta = `
                    <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                        <h3 class="font-bold text-lg text-bosque-oliva">${anuncio.nombre_negocio}</h3>
                        <p class="text-sm text-gray-600 mt-2 line-clamp-3">${anuncio.descripcion}</p>
                        <span class="inline-block mt-4 text-xs font-semibold text-bosque-morado bg-purple-50 px-3 py-1 rounded-full">${anuncio.categoria}</span>
                    </div>`;
                } 
                else if (anuncio.nivel_pago >= 1) {
                    // NIVELES PREMIUM
                    let etiquetaColor = 'bg-bosque-cian';
                    let etiquetaTexto = 'Imágenes';
                    let bordeEspecial = 'border-gray-100';
                    
                    if (anuncio.nivel_pago === 2) {
                        etiquetaColor = 'bg-bosque-lima';
                        etiquetaTexto = 'Pro';
                        bordeEspecial = 'border-bosque-lima border-2';
                    } else if (anuncio.nivel_pago === 3) {
                        etiquetaColor = 'bg-bosque-amarillo text-bosque-oliva';
                        etiquetaTexto = 'Premium';
                        bordeEspecial = 'border-bosque-amarillo border-2 ring-4 ring-yellow-50';
                    }

                    let etiqueta = `<span class="${etiquetaColor} text-white text-xs font-bold px-3 py-1 rounded-bl-lg absolute top-0 right-0 shadow-sm">${etiquetaTexto}</span>`;
                    
                    let botonPro = anuncio.nivel_pago >= 2 ? `<button class="mt-4 w-full border border-bosque-morado text-bosque-morado py-2 rounded-lg font-medium hover:bg-purple-50 transition">Ver Menú</button>` : '';
                    
                    let botonStripe = anuncio.nivel_pago === 3 ? `<button class="mt-2 w-full bg-bosque-morado text-white py-2.5 rounded-lg font-medium shadow-md hover:bg-purple-900 transition flex justify-center items-center gap-2">Hacer Pedido</button>` : '';

                    htmlTarjeta = `
                    <div class="bg-white rounded-2xl shadow-lg overflow-hidden relative ${bordeEspecial} flex flex-col h-full transform hover:-translate-y-1 transition-all duration-300">
                        ${etiqueta}
                        <img src="${anuncio.imagen_url}" alt="${anuncio.nombre_negocio}" class="w-full h-48 object-cover bg-gray-100">
                        <div class="p-6 flex flex-col flex-grow">
                            <span class="text-xs font-bold text-bosque-cian uppercase tracking-wider mb-1">${anuncio.categoria}</span>
                            <h3 class="font-bold text-xl text-bosque-oliva">${anuncio.nombre_negocio}</h3>
                            <p class="text-sm text-gray-600 mt-2 mb-4 flex-grow">${anuncio.descripcion}</p>
                            <div>
                                ${botonPro}
                                ${botonStripe}
                            </div>
                        </div>
                    </div>`;
                }
                contenedor.innerHTML += htmlTarjeta;
            });
        }

        cargarAnuncios();
    </script>
</body>
</html>
