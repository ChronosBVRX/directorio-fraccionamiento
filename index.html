<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Tres Marías - Directorio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { sans: ['Montserrat', 'sans-serif'] },
              colors: {
                'tm-azul': '#22527b',       
                'tm-azul-oscuro': '#143653',
                'tm-dorado': '#d4af37',     
                'tm-gris': '#4b5563',
              }
            }
          }
        }
    </script>
    <style>
        .active-filter { background-color: #22527b !important; color: white !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-tm-gris">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-tm-azul">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
            <a href="#" class="flex items-center">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" alt="Logo" class="h-12 md:h-16 w-auto">
            </a>
            
            <div id="nav-botones" class="flex gap-2">
                <button onclick="abrirModalAuth()" id="btn-login" class="bg-tm-azul hover:bg-tm-azul-oscuro text-white px-4 py-2 rounded font-bold text-sm transition">Entrar / Registrarse</button>
                <button onclick="abrirModalNegocio()" id="btn-mi-negocio" class="hidden bg-tm-dorado hover:bg-yellow-600 text-white px-4 py-2 rounded font-bold text-sm transition">+ Publicar Negocio</button>
                <button onclick="cerrarSesion()" id="btn-logout" class="hidden bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-bold text-sm text-tm-azul transition">Salir</button>
            </div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto mt-8 px-4 flex gap-2 overflow-x-auto pb-2 border-b border-gray-200">
        <button onclick="filtrar('Todos')" id="btn-Todos" class="filter-btn active-filter px-6 py-2 rounded-md border border-tm-azul text-sm font-bold text-tm-azul transition">Todos</button>
        <button onclick="filtrar('Alimentos')" id="btn-Alimentos" class="filter-btn px-6 py-2 rounded-md border border-tm-azul text-sm font-bold text-tm-azul transition">Alimentos</button>
        <button onclick="filtrar('Servicios')" id="btn-Servicios" class="filter-btn px-6 py-2 rounded-md border border-tm-azul text-sm font-bold text-tm-azul transition">Servicios</button>
        <button onclick="filtrar('Salud')" id="btn-Salud" class="filter-btn px-6 py-2 rounded-md border border-tm-azul text-sm font-bold text-tm-azul transition">Salud y Belleza</button>
        <button onclick="filtrar('Hogar')" id="btn-Hogar" class="filter-btn px-6 py-2 rounded-md border border-tm-azul text-sm font-bold text-tm-azul transition">Hogar</button>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="contenedor-anuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="modal-auth" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full relative">
            <button onclick="cerrarModalAuth()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 font-bold text-2xl">&times;</button>
            
            <div class="flex mb-6 border-b">
                <button onclick="setModoAuth(false)" id="tab-login" class="flex-1 pb-2 font-bold text-tm-azul border-b-2 border-tm-azul">Iniciar Sesión</button>
                <button onclick="setModoAuth(true)" id="tab-registro" class="flex-1 pb-2 font-bold text-gray-400 border-b-2 border-transparent">Registro</button>
            </div>

            <h2 id="auth-titulo" class="text-xl font-black text-tm-azul mb-2 text-center">Bienvenido de vuelta</h2>
            <p id="auth-subtitulo" class="text-xs text-center text-tm-gris mb-4">Ingresa para administrar o publicar tu negocio.</p>

            <div id="auth-msg" class="hidden w-full p-3 rounded mb-4 text-sm font-bold text-center"></div>

            <form onsubmit="event.preventDefault(); procesarAuth();">
                <input type="email" id="auth-email" placeholder="Correo Electrónico" required class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-tm-azul outline-none">
                <input type="password" id="auth-password" placeholder="Contraseña" required minlength="6" class="w-full p-3 border rounded mb-4 focus:ring-2 focus:ring-tm-azul outline-none">
                <button type="submit" id="auth-btn-submit" class="w-full bg-tm-azul hover:bg-tm-azul-oscuro text-white py-3 rounded font-bold transition">Entrar</button>
            </form>
        </div>
    </div>

    <div id="modal-negocio" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 max-w-lg w-full relative max-h-[90vh] overflow-y-auto">
            <button onclick="cerrarModalNegocio()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 font-bold text-2xl">&times;</button>
            <h2 class="text-2xl font-black text-tm-azul mb-2">Publica tu Negocio</h2>
            <p class="text-sm text-tm-gris mb-4">Completa la información para aparecer en el directorio de Tres Marías.</p>
            
            <div id="negocio-msg" class="hidden w-full p-3 rounded mb-4 text-sm font-bold text-center"></div>

            <form onsubmit="event.preventDefault(); guardarNegocio();">
                <label class="block text-xs font-bold text-tm-gris uppercase mb-1">Nombre del Negocio *</label>
                <input type="text" id="neg-nombre" placeholder="Ej. Veterinaria Huellitas" required class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-tm-azul outline-none">
                
                <label class="block text-xs font-bold text-tm-gris uppercase mb-1">Categoría *</label>
                <select id="neg-categoria" class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-tm-azul outline-none bg-white">
                    <option value="Alimentos">Alimentos y Restaurantes</option>
                    <option value="Servicios">Servicios Profesionales</option>
                    <option value="Salud">Salud y Belleza</option>
                    <option value="Hogar">Hogar y Mantenimiento</option>
                </select>
                
                <label class="block text-xs font-bold text-tm-gris uppercase mb-1">Descripción corta *</label>
                <textarea id="neg-desc" placeholder="¿Qué ofreces a la comunidad?" required rows="3" class="w-full p-3 border rounded mb-3 focus:ring-2 focus:ring-tm-azul outline-none"></textarea>
                
                <label class="block text-xs font-bold text-tm-gris uppercase mb-1">WhatsApp (Solo números) *</label>
                <input type="number" id="neg-wa" placeholder="Ej. 4431234567" required class="w-full p-3 border rounded mb-4 focus:ring-2 focus:ring-tm-azul outline-none">
                
                <button type="submit" id="neg-btn-submit" class="w-full bg-tm-dorado hover:bg-yellow-600 text-white py-3 rounded font-bold transition">Publicar Ahora</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const EMAIL_ADMIN = 'noirsysan@gmail.com'; 

        let todosLosAnuncios = [];
        let usuarioActual = null;
        let esModoRegistro = false;

        // FUNCIONES DE NOTIFICACIÓN EN UI
        function mostrarMensajeUI(idElemento, mensaje, esError) {
            const div = document.getElementById(idElemento);
            div.innerText = mensaje;
            div.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
            
            if (esError) {
                div.classList.add('bg-red-100', 'text-red-700');
            } else {
                div.classList.add('bg-green-100', 'text-green-700');
            }
        }

        function ocultarMensajeUI(idElemento) {
            document.getElementById(idElemento).classList.add('hidden');
        }

        // AUTH LISTENER
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            usuarioActual = session ? session.user : null;
            document.getElementById('btn-login').classList.toggle('hidden', !!usuarioActual);
            document.getElementById('btn-mi-negocio').classList.toggle('hidden', !usuarioActual);
            document.getElementById('btn-logout').classList.toggle('hidden', !usuarioActual);
            cargarDatos();
        });

        // FUNCIONES MODAL AUTH
        function abrirModalAuth() { 
            document.getElementById('modal-auth').classList.remove('hidden'); 
            ocultarMensajeUI('auth-msg');
            setModoAuth(false);
        }
        
        function cerrarModalAuth() { 
            document.getElementById('modal-auth').classList.add('hidden'); 
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
        }
        
        function setModoAuth(modoRegistro) {
            esModoRegistro = modoRegistro;
            ocultarMensajeUI('auth-msg');
            
            const tabLogin = document.getElementById('tab-login');
            const tabRegistro = document.getElementById('tab-registro');
            
            if(esModoRegistro) {
                tabRegistro.className = "flex-1 pb-2 font-bold text-tm-azul border-b-2 border-tm-azul";
                tabLogin.className = "flex-1 pb-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-tm-azul";
                document.getElementById('auth-titulo').innerText = 'Crea tu Cuenta';
                document.getElementById('auth-subtitulo').innerText = 'Únete como usuario o como negocio en minutos.';
                document.getElementById('auth-btn-submit').innerText = 'Registrarme';
            } else {
                tabLogin.className = "flex-1 pb-2 font-bold text-tm-azul border-b-2 border-tm-azul";
                tabRegistro.className = "flex-1 pb-2 font-bold text-gray-400 border-b-2 border-transparent hover:text-tm-azul";
                document.getElementById('auth-titulo').innerText = 'Bienvenido de vuelta';
                document.getElementById('auth-subtitulo').innerText = 'Ingresa para administrar o publicar tu negocio.';
                document.getElementById('auth-btn-submit').innerText = 'Entrar';
            }
        }

        async function procesarAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btnSubmit = document.getElementById('auth-btn-submit');
            
            ocultarMensajeUI('auth-msg');
            btnSubmit.innerText = "Procesando...";
            btnSubmit.disabled = true;

            try {
                if(esModoRegistro) {
                    const { error } = await clienteSupabase.auth.signUp({ email, password });
                    if(error) throw error;
                    
                    mostrarMensajeUI('auth-msg', "¡Registro exitoso! Ya puedes publicar tu negocio.", false);
                    setTimeout(cerrarModalAuth, 2000); 
                } else {
                    const { error } = await clienteSupabase.auth.signInWithPassword({ email, password });
                    if(error) {
                        if(error.message.includes("Invalid login credentials")) {
                            throw new Error("Correo o contraseña incorrectos.");
                        }
                        throw error;
                    }
                    cerrarModalAuth();
                }
            } catch (error) {
                mostrarMensajeUI('auth-msg', error.message, true);
            } finally {
                btnSubmit.innerText = esModoRegistro ? "Registrarme" : "Entrar";
                btnSubmit.disabled = false;
            }
        }

        async function cerrarSesion() { await clienteSupabase.auth.signOut(); }

        // FUNCIONES MODAL NEGOCIO
        function abrirModalNegocio() { 
            document.getElementById('modal-negocio').classList.remove('hidden'); 
            ocultarMensajeUI('negocio-msg');
        }
        
        function cerrarModalNegocio() { 
            document.getElementById('modal-negocio').classList.add('hidden'); 
        }

        async function guardarNegocio() {
            if (!usuarioActual) {
                mostrarMensajeUI('negocio-msg', "Debes iniciar sesión para publicar.", true);
                return;
            }

            const btnSubmit = document.getElementById('neg-btn-submit');
            btnSubmit.innerText = "Publicando...";
            btnSubmit.disabled = true;
            ocultarMensajeUI('negocio-msg');

            const nuevo = {
                user_id: usuarioActual.id,
                nombre_negocio: document.getElementById('neg-nombre').value,
                categoria: document.getElementById('neg-categoria').value,
                descripcion: document.getElementById('neg-desc').value,
                enlace_whatsapp: document.getElementById('neg-wa').value,
                nivel_pago: 0 
            };

            try {
                const { error } = await clienteSupabase.from('anuncios').insert([nuevo]);
                if(error) throw error;

                mostrarMensajeUI('negocio-msg', "¡Tu negocio fue publicado con éxito!", false);
                
                // Recargar datos desde Supabase para asegurar que tenemos el ID real
                await cargarDatos();

                setTimeout(() => {
                    document.querySelector('#modal-negocio form').reset(); 
                    cerrarModalNegocio();
                }, 2000);

            } catch (error) {
                mostrarMensajeUI('negocio-msg', "Error al guardar: " + error.message, true);
            } finally {
                btnSubmit.innerText = "Publicar Ahora";
                btnSubmit.disabled = false;
            }
        }

        // CARGAR Y DIBUJAR DATOS (AHORA 100% REAL DESDE SUPABASE)
        async function cargarDatos() {
            const { data, error } = await clienteSupabase.from('anuncios').select('*').order('nivel_pago', { ascending: false });
            
            if (error) {
                console.error("Error obteniendo datos:", error.message);
                todosLosAnuncios = [];
            } else {
                todosLosAnuncios = data || [];
            }
            
            const filtroActivo = document.querySelector('.active-filter').id.replace('btn-', '');
            filtrar(filtroActivo);
        }

        // FUNCIONES DE ADMIN (AHORA 100% REALES)
        async function adminBorrar(id) {
            if(confirm('¿Seguro que quieres borrar este anuncio permanentemente?')) {
                const { error } = await clienteSupabase.from('anuncios').delete().eq('id', id);
                if (error) {
                    alert("Error al eliminar: " + error.message);
                } else {
                    cargarDatos();
                }
            }
        }

        async function adminSubirNivel(id) {
            const nivel = prompt('Ingresa el nivel (0=Gratis, 1=Imágenes, 2=Pro, 3=Elite):', '1');
            if(nivel !== null && ["0","1","2","3"].includes(nivel)) {
                const { error } = await clienteSupabase.from('anuncios').update({ nivel_pago: parseInt(nivel) }).eq('id', id);
                if (error) {
                    alert("Error al actualizar: " + error.message);
                } else {
                    cargarDatos();
                }
            }
        }

        // RENDERIZAR INTERFAZ
        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '';
            
            if (lista.length === 0) {
                contenedor.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-xl border border-dashed border-gray-300">
                        <p class="text-xl font-bold text-tm-azul mb-2">Aún no hay negocios en esta categoría</p>
                        <p class="text-sm text-tm-gris">¡Sé el primero en publicarte y destacar en tu zona!</p>
                    </div>`;
                return;
            }

            // Ordenamos por nivel_pago (mayor a menor) para que los premium salgan arriba
            lista.sort((a, b) => b.nivel_pago - a.nivel_pago);

            const esAdmin = usuarioActual && usuarioActual.email === EMAIL_ADMIN;

            lista.forEach(a => {
                const herramientasAdmin = esAdmin ? `
                    <div class="mt-4 p-3 bg-red-50 rounded-lg flex justify-between border border-red-100">
                        <button onclick="adminBorrar(${a.id})" class="text-red-600 text-xs font-bold uppercase hover:underline">Eliminar</button>
                        <button onclick="adminSubirNivel(${a.id})" class="text-tm-azul text-xs font-bold uppercase hover:underline">Nivel (${a.nivel_pago}) ⚙️</button>
                    </div>
                ` : '';

                const esPremium = a.nivel_pago >= 2;
                const esElite = a.nivel_pago === 3;
                const bordeTarjeta = esElite ? 'border-tm-dorado ring-1 ring-tm-dorado/30 border-2' : (esPremium ? 'border-tm-azul ring-1 ring-tm-azul/10 border-2' : 'border-gray-200 border');

                contenedor.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm ${bordeTarjeta} overflow-hidden hover:shadow-xl transition duration-300 flex flex-col h-full transform hover:-translate-y-1">
                        ${a.imagen_url ? `<img src="${a.imagen_url}" class="w-full h-48 object-cover bg-tm-azul-claro">` : ''}
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start gap-2">
                                <span class="text-[10px] font-bold text-tm-azul bg-blue-50 px-2.5 py-1 rounded-sm uppercase tracking-wider">${a.categoria}</span>
                                ${esElite ? '<span class="text-tm-dorado font-bold text-[10px] uppercase tracking-wide bg-yellow-50 px-2 py-1 rounded">★ Elite</span>' : (esPremium ? '<span class="text-tm-azul font-bold text-[10px] uppercase tracking-wide bg-blue-50 px-2 py-1 rounded">Destacado</span>' : '')}
                            </div>
                            <h3 class="mt-3 font-bold text-xl text-tm-azul-oscuro leading-tight">${a.nombre_negocio}</h3>
                            <p class="text-sm text-tm-gris mt-2 flex-grow line-clamp-3 font-light">${a.descripcion}</p>
                            ${herramientasAdmin}
                            <div class="mt-6 pt-4 border-t border-gray-100 flex gap-3">
                                <a href="https://wa.me/${a.enlace_whatsapp}" target="_blank" class="flex-1 flex justify-center items-center gap-2 bg-[#25D366] hover:bg-[#1ebd59] text-white py-2.5 rounded text-sm font-bold transition shadow-sm">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.88-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.347-.272.297-1.04 1.016-1.04 2.479 0 1.463 1.065 2.876 1.213 3.074.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                                    Contactar
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filtrar(cat) { 
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            const btnActivo = document.getElementById(`btn-${cat}`);
            if (btnActivo) btnActivo.classList.add('active-filter');
            
            renderizar(cat === 'Todos' ? todosLosAnuncios : todosLosAnuncios.filter(a => a.categoria === cat)); 
        }
        
    </script>
</body>
</html>
