    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosAnuncios = [];
        let usuarioActual = null;
        let carritoActual = {}; 
        let negocioActualPedido = null;
        let negocioActualAgenda = null; 
        let perfilUsuarioActual = null;

        const CATEGORIAS_TIENDA = ['Alimentos', 'Restaurante', 'Postres', 'Abarrotes', 'Hogar', 'Ropa', 'Otro Producto'];
        const CATEGORIAS_SERVICIO = ['Medicina General', 'Especialidad Médica', 'Salud Mental', 'Nutrición', 'Belleza y Spa', 'Servicio Técnico', 'Otro Servicio', 'Medicina', 'Servicios', 'Belleza'];

        function limpiarIdIndex(valor) {
            return valor === null || valor === undefined ? '' : String(valor).trim();
        }

        function hhmmIndex(hora) {
            return hora ? String(hora).substring(0, 5) : '00:00';
        }

        function minsIndex(hora) {
            const [hh, mm] = hhmmIndex(hora).split(':').map(Number);
            return (hh * 60) + mm;
        }

        function strHoraIndex(mins) {
            const hh = String(Math.floor(mins / 60)).padStart(2, '0');
            const mm = String(mins % 60).padStart(2, '0');
            return `${hh}:${mm}`;
        }

        function sumarMinutosIndex(hora, minutos) {
            return strHoraIndex(minsIndex(hora) + Number(minutos || 0));
        }

        function hayTraslapeIndex(inicioNuevo, finNuevo, ocupados = []) {
            const nuevoIni = minsIndex(inicioNuevo);
            const nuevoFin = minsIndex(finNuevo);

            return ocupados.some((cita) => {
                const citaIni = minsIndex(cita.hora_inicio);
                const citaFin = minsIndex(cita.hora_fin);
                return nuevoIni < citaFin && nuevoFin > citaIni;
            });
        }

        function detalleErrorSupabase(error) {
            if (!error) return 'Sin detalle';
            return [error.message, error.details, error.hint, error.code].filter(Boolean).join(' | ');
        }

        function lanzarNotificacion(titulo, mensaje, tipo = 'info', modoBotones = 'entendido', urlRastreo = null) {
            return new Promise((resolve) => {
                const modal = document.getElementById('modal-notificacion');
                const icono = document.getElementById('noti-icono');
                const tituloEl = document.getElementById('noti-titulo');
                const mensajeEl = document.getElementById('noti-mensaje');
                const botonesCont = document.getElementById('noti-botones');

                tituloEl.innerText = titulo;
                mensajeEl.innerText = mensaje;

                let iconEmoji = 'ℹ️';
                if (tipo === 'success') iconEmoji = '✅';
                if (tipo === 'error') iconEmoji = '❌';
                if (tipo === 'warning') iconEmoji = '⚠️';
                icono.innerText = iconEmoji;

                botonesCont.innerHTML = '';
                botonesCont.className = modoBotones === 'rastreo' ? "flex flex-col gap-2 w-full" : "flex gap-3 justify-center w-full";

                if (modoBotones === 'confirmacion') {
                    const btnCancelar = document.createElement('button');
                    btnCancelar.className = "flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition border border-gray-200";
                    btnCancelar.innerText = "Cancelar";
                    btnCancelar.onclick = () => { modal.classList.add('hidden'); resolve(false); };

                    const btnConfirmar = document.createElement('button');
                    btnConfirmar.className = "flex-1 bg-tm-azul text-white py-2.5 rounded-xl font-bold text-sm hover:bg-tm-azul-oscuro transition shadow-md";
                    btnConfirmar.innerText = "Confirmar";
                    btnConfirmar.onclick = () => { modal.classList.add('hidden'); resolve(true); };

                    botonesCont.appendChild(btnCancelar);
                    botonesCont.appendChild(btnConfirmar);
                } 
                else if (modoBotones === 'rastreo' && urlRastreo) {
                    const btnRastrear = document.createElement('a');
                    btnRastrear.href = urlRastreo;
                    btnRastrear.className = "w-full block bg-tm-dorado text-white py-3 rounded-xl font-black text-sm hover:bg-yellow-600 transition shadow-lg uppercase tracking-widest text-center";
                    btnRastrear.innerText = "📍 Rastrear mi pedido ahora";

                    const btnCerrar = document.createElement('button');
                    btnCerrar.className = "w-full bg-gray-100 text-gray-700 py-2.5 rounded-xl font-bold text-sm hover:bg-gray-200 transition border border-gray-200";
                    btnCerrar.innerText = "Cerrar / Seguir Viendo";
                    btnCerrar.onclick = () => { modal.classList.add('hidden'); resolve(true); };

                    botonesCont.appendChild(btnRastrear);
                    botonesCont.appendChild(btnCerrar);
                }
                else {
                    const btnEntendido = document.createElement('button');

        function estaAbiertoAhora(a) {
            try {
                if (a.esta_abierto === false) return false; 
                if (!a.horarios || typeof a.horarios !== 'object' || Object.keys(a.horarios).length === 0) return true; 

                const ahora = new Date();
                const diaSemana = ahora.getDay(); 
                const horaActual = ahora.getHours() * 60 + ahora.getMinutes(); 

                const hoy = a.horarios[diaSemana];
                if (!hoy) return true; 
                if (!hoy.abierto) return false; 
                if (!hoy.abre || !hoy.cierra) return true; 

                const [hAbre, mAbre] = hoy.abre.split(':').map(Number);
                const [hCierra, mCierra] = hoy.cierra.split(':').map(Number);
                const minAbre = hAbre * 60 + mAbre;
                const minCierra = hCierra * 60 + mCierra;

                return horaActual >= minAbre && horaActual <= minCierra;
            } catch(e) {
                return true; 
            }
        }

        function stringHorarioHoy(horarios) {
            try {
                if (!horarios || typeof horarios !== 'object' || Object.keys(horarios).length === 0) return 'Horario no definido';
                const ahora = new Date(); 
                const hoy = horarios[ahora.getDay()];
                
                if (!hoy) return 'Horario no definido';
                if (!hoy.abierto) return 'Cerrado hoy';
                if (!hoy.abre || !hoy.cierra) return 'Abierto 24 hrs';
                
                function format12(time24) { 
                    let [h, m] = time24.split(':'); 
                    h = parseInt(h); 
                    let ampm = h >= 12 ? 'PM' : 'AM'; 
                    h = h % 12 || 12; 
                    return `${h}:${m} ${ampm}`; 
                }
                return `Hoy de ${format12(hoy.abre)} a ${format12(hoy.cierra)}`;
            } catch(e) {
                return 'Horario no definido';
            }
        }

        async function procesarPedido() {
            const nombre = document.getElementById('cliente-nombre').value.trim();
            const telefono = document.getElementById('cliente-telefono').value.trim();
            const direccion = document.getElementById('cliente-direccion').value.trim();
            const notas = document.getElementById('cliente-notas').value.trim();

            if (!nombre || !telefono || !direccion) {
                await lanzarNotificacion("Faltan Datos", "Por favor, llena todos tus datos de envío.", "warning", "entendido");
                return;
            }

            let total = 0;
            let detallesPedido = [];
            const prodList = negocioActualPedido.productosArr;
            
            let textoPedido = `*NUEVO PEDIDO DE VIVE TRES MARÍAS* 🚀\n\n`;
            textoPedido += `*Cliente:* ${nombre}\n*Teléfono:* ${telefono}\n*Dirección:* ${direccion}\n\n*Detalle:*\n`;
            
            for (let i in carritoActual) {
                if(carritoActual[i] > 0) {
                    let subtotal = carritoActual[i] * prodList[i].precio;
                    total += subtotal;
                    detallesPedido.push({ cantidad: carritoActual[i], producto: prodList[i].nombre, precio_unitario: prodList[i].precio, subtotal: subtotal });
                    textoPedido += `- ${carritoActual[i]}x ${prodList[i].nombre} ...... $${subtotal.toFixed(2)}\n`;
                }
            }

            if(detallesPedido.length === 0) {
                await lanzarNotificacion("Carrito Vacío", "Por favor agrega productos a tu pedido.", "warning", "entendido");
                return;
            }
            if (notas) textoPedido += `\n*Anotaciones del Cliente:*\n_💬 "${notas}"_\n`;

            const btn = document.getElementById('btn-confirmar-pedido');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = 'Procesando pedido...'; btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');

            const { data, error } = await clienteSupabase.functions.invoke('procesar-pedido', {
                body: { negocio_id: negocioActualPedido.id, cliente_id: usuarioActual ? usuarioActual.id : null, nombre: nombre, telefono: telefono, direccion: direccion, carrito: detallesPedido, total: total, notas: notas }
            });

            btn.innerHTML = textoOriginal; btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');

            if (error || !data.success) {
                await lanzarNotificacion("Error", "Hubo un error al generar tu pedido. Intenta nuevamente.", "error", "entendido");
                return;
            }

            const folioVenta = data.folio;
            textoPedido += `\n*TOTAL A PAGAR: $${total.toFixed(2)}*\n*Folio:* ${folioVenta}\n\n`;
            
            const rutaBase = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            
            textoPedido += `_Vendedor: Tras confirmar el pago, da clic en el siguiente enlace para gestionar la entrega o asignar un repartidor:_\n${rutaBase}/activar_pedido.html?folio=${folioVenta}`;

            let numeroVendedor = negocioActualPedido.enlace_whatsapp ? negocioActualPedido.enlace_whatsapp.replace(/\D/g,'') : '';
            if(numeroVendedor) {
                window.open(`https://wa.me/${numeroVendedor}?text=${encodeURIComponent(textoPedido)}`, '_blank');
            } else {
                await lanzarNotificacion("Atención", "El negocio no tiene un número configurado. Guarda este Folio para aclaraciones:\n\n" + folioVenta, "warning", "entendido");
            }

            const urlRastreo = `rastreo.html?folio=${folioVenta}`;
            await lanzarNotificacion(
                "¡Pedido Generado con Éxito!", 
                `Tu folio es: ${folioVenta}\n\nDa clic abajo para ver el estado de tu orden en tiempo real y calificar el servicio cuando termine.`, 
                "success", 
                "rastreo", 
                urlRastreo
            );
            
            cerrarMenu();
        }

        async function abrirAgenda(negocio) {
            negocioActualAgenda = negocio; 
            if (!usuarioActual) {
                await lanzarNotificacion("Inicia Sesión", "Por favor, inicia sesión o crea una cuenta gratis para agendar tu cita.", "warning", "entendido");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('modal-agendar-index').classList.remove('hidden');
            document.getElementById('modal-agendar-negocio-nombre').innerText = negocio.nombre_negocio;
            document.getElementById('reserva-negocio-id-index').value = negocio.id;
            
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('reserva-fecha-index').min = hoy;
            document.getElementById('reserva-fecha-index').value = '';
            document.getElementById('contenedor-horarios-libres-index').innerHTML = '<p class="text-xs text-gray-400 col-span-3 text-center italic mt-2">Selecciona un servicio y fecha arriba.</p>';

            const selectServicio = document.getElementById('reserva-servicio-index');
            selectServicio.innerHTML = '<option value="">Cargando servicios...</option>';

            const { data, error } = await clienteSupabase.from('servicios').select('*').eq('anuncio_id', negocio.id).order('id');
            
            if (error || !data || data.length === 0) {
                selectServicio.innerHTML = '<option value="">El profesional aún no agrega servicios a la agenda.</option>';
            } else {
                selectServicio.innerHTML = '<option value="">Selecciona un servicio...</option>' + 
                    data.map(s => `<option value="${s.id}">${s.nombre} (${s.duracion_minutos} min) - $${s.precio}</option>`).join('');
            }
        }

        function cerrarAgenda() {
            document.getElementById('modal-agendar-index').classList.add('hidden');
        }

        async function buscarHorariosIndex() {
            const negocioId = limpiarIdIndex(document.getElementById('reserva-negocio-id-index').value);
            const servicioId = limpiarIdIndex(document.getElementById('reserva-servicio-index').value);
            const fecha = document.getElementById('reserva-fecha-index').value;
            const cont = document.getElementById('contenedor-horarios-libres-index');

            if (!negocioId || !servicioId || !fecha) {
                cont.innerHTML = '<p class="text-xs text-gray-400 col-span-3 text-center italic mt-2">Selecciona un servicio y fecha arriba.</p>';
                return;
            }

            cont.innerHTML = '<p class="text-sm text-tm-azul animate-pulse col-span-3 text-center">Buscando disponibilidad...</p>';

            try {
                const payload = {
                    anuncio_id: negocioId,
                    servicio_id: servicioId,
                    fecha: fecha,
                };

                const { data, error } = await clienteSupabase.functions.invoke('gestionar-agendas', {
                    body: { accion: 'obtener_disponibilidad', payload }
                });

                if (error) {
                    console.error('Error en Edge Function obtener_disponibilidad:', detalleErrorSupabase(error), error);
                    throw error;
                }

                if (data?.success) {
                    mostrarHorarios(data.disponibles || [], cont);
                    return;
                }

                throw new Error(data?.error || 'La Edge Function no devolvió success=true.');
            } catch (err) {
                console.warn('Utilizando Respaldo (Fallback) para buscar horarios:', err);

                try {
                    const { data: anuncio, error: errAnuncio } = await clienteSupabase
                        .from('anuncios')
                        .select('horarios')
                        .eq('id', negocioId)
                        .maybeSingle();

                    const { data: servicio, error: errServicio } = await clienteSupabase
                        .from('servicios')
                        .select('duracion_minutos')
                        .eq('id', servicioId)
                        .maybeSingle();

                    const { data: citas, error: errCitas } = await clienteSupabase
                        .from('citas')
                        .select('hora_inicio,hora_fin,estado')
                        .eq('anuncio_id', negocioId)
                        .eq('fecha_cita', fecha)
                        .neq('estado', 'cancelada');

                    if (errAnuncio) throw errAnuncio;
                    if (errServicio) throw errServicio;
                    if (errCitas) throw errCitas;
                    if (!anuncio) throw new Error('Faltan datos del anuncio en la base de datos.');

                    const [year, month, day] = fecha.split('-').map(Number);
                    const diaSemana = new Date(year, month - 1, day).getDay();
                    const horarioHoy = anuncio.horarios ? anuncio.horarios[diaSemana] : null;

                    if (!horarioHoy || !horarioHoy.abierto || !horarioHoy.abre || !horarioHoy.cierra) {
                        cont.innerHTML = '<p class="text-sm text-red-500 col-span-3 text-center">El negocio no atiende este día ❌</p>';
                        return;
                    }

                    const duracionMin = Number(servicio?.duracion_minutos || 60);
                    const disponibles = [];
                    const inicioJornada = minsIndex(horarioHoy.abre);
                    const finJornada = minsIndex(horarioHoy.cierra);
                    const citasOcupadas = Array.isArray(citas) ? citas : [];

                    for (let t = inicioJornada; (t + duracionMin) <= finJornada; t += duracionMin) {
                        const horaInicio = strHoraIndex(t);
                        const horaFin = strHoraIndex(t + duracionMin);

                        if (!hayTraslapeIndex(horaInicio, horaFin, citasOcupadas)) {
                            disponibles.push(horaInicio);
                        }
                    }

                    mostrarHorarios(disponibles, cont);
                } catch (fallbackErr) {
                    console.error('Error en Respaldo:', fallbackErr);
                    cont.innerHTML = '<p class="text-sm text-red-500 col-span-3 text-center">Hubo un error al buscar los horarios disponibles. Intenta recargando.</p>';
                }
            }
        }

        function mostrarHorarios(disponibles, contenedor) {
            if (!disponibles || disponibles.length === 0) {
                contenedor.innerHTML = '<p class="text-sm text-red-500 col-span-3 text-center">No hay espacios disponibles para esta fecha ❌</p>';
                return;
            }
            contenedor.innerHTML = disponibles.map(h => `<button onclick="confirmarCitaIndex('${h}')" class="bg-blue-50 border border-blue-100 text-tm-azul py-2 rounded-lg font-bold hover:bg-tm-azul hover:text-white transition shadow-sm">${h}</button>`).join('');
        }

        async function confirmarCitaIndex(hora) {
            const fecha = document.getElementById('reserva-fecha-index').value;
            const selectElement = document.getElementById('reserva-servicio-index');
            const servicioId = limpiarIdIndex(selectElement.value);
            const negocioId = limpiarIdIndex(document.getElementById('reserva-negocio-id-index').value);

            const nombreServicioRaw = selectElement.options[selectElement.selectedIndex].text;
            const nombreServicio = nombreServicioRaw.split(' (')[0]; 

            if (!usuarioActual?.id) {
                await lanzarNotificacion('Inicia Sesión', 'Necesitas iniciar sesión para reservar una cita.', 'warning', 'entendido');
                window.location.href = 'login.html';
                return;
            }

            const confirmado = await lanzarNotificacion('Confirmar Solicitud', `¿Enviar tu solicitud de cita el día ${fecha} a las ${hora}?`, 'info', 'confirmacion');
            if (!confirmado) return;

            const cont = document.getElementById('contenedor-horarios-libres-index');
            cont.innerHTML = '<p class="text-sm text-tm-dorado animate-pulse col-span-3 text-center font-bold">Enviando solicitud...</p>';

            try {
                const { data: servicioInfo, error: servicioErr } = await clienteSupabase
                    .from('servicios')
                    .select('duracion_minutos')
                    .eq('id', servicioId)
                    .maybeSingle();

                if (servicioErr) {
                    console.error('Error obteniendo duración del servicio:', detalleErrorSupabase(servicioErr), servicioErr);
                    throw servicioErr;
                }

                const duracion = Number(servicioInfo?.duracion_minutos || 60);
                const horaFin = sumarMinutosIndex(hora, duracion);

                const payload = {
                    anuncio_id: negocioId,
                    cliente_id: usuarioActual.id,
                    servicio_id: servicioId,
                    fecha_cita: fecha,
                    hora_inicio: hora,
                    hora_fin: horaFin
                };

                const { data, error } = await clienteSupabase.functions.invoke('gestionar-agendas', {
                    body: { accion: 'crear_cita', payload }
                });

                if (error) {
                    console.error('Error en Edge Function crear_cita:', detalleErrorSupabase(error), error);
                    throw error;
                }

                if (!data?.success) {
                    throw new Error(data?.error || 'La Edge Function no confirmó la reserva.');
                }

                await reservaExitosa(fecha, hora, nombreServicio); 
            } catch (err) {
                console.warn('La Edge Function falló. Intentando guardar la cita de manera directa en la base de datos...', err);

                try {
                    const { data: servicioInfo, error: servicioErr } = await clienteSupabase
                        .from('servicios')
                        .select('duracion_minutos')
                        .eq('id', servicioId)
                        .maybeSingle();

                    if (servicioErr) throw servicioErr;

                    const duracion = Number(servicioInfo?.duracion_minutos || 60);
                    const horaFin = sumarMinutosIndex(hora, duracion);

                    const { error: insertError } = await clienteSupabase.from('citas').insert([{
                        anuncio_id: negocioId,
                        cliente_id: usuarioActual.id,
                        servicio_id: servicioId,
                        fecha_cita: fecha,
                        hora_inicio: `${hhmmIndex(hora)}:00`,
                        hora_fin: `${hhmmIndex(horaFin)}:00`,
                        estado: 'pendiente' 
                    }]);

                    if (insertError) {
                        console.error('Error al insertar cita directamente:', detalleErrorSupabase(insertError), insertError);
                        await lanzarNotificacion('Horario Ocupado', 'Este horario acaba de ser ocupado o ha ocurrido un error. Por favor, selecciona otro.', 'error', 'entendido');
                        buscarHorariosIndex();
                    } else {
                        await reservaExitosa(fecha, hora, nombreServicio); 
                    }
                } catch (insertErr) {
                    console.error('Error final al guardar la cita:', insertErr);
                    await lanzarNotificacion('Error', 'No se pudo guardar la cita. Revisa la consola y la Edge Function.', 'error', 'entendido');
                    buscarHorariosIndex();
                }
            }
        }

        async function reservaExitosa(fecha, hora, nombreServicio) {
            if (negocioActualAgenda && negocioActualAgenda.enlace_whatsapp) {
                let numeroVendedor = negocioActualAgenda.enlace_whatsapp.replace(/\D/g, '');
                
                if (numeroVendedor) {
                    let clienteNombre = perfilUsuarioActual ? (perfilUsuarioActual.nombre_completo || 'Un paciente') : 'Un paciente';
                    
                    let textoCita = `*NUEVA SOLICITUD DE CITA - VIVE TRES MARÍAS* 📅\n\n`;
                    textoCita += `*Paciente:* ${clienteNombre}\n`;
                    textoCita += `*Servicio:* ${nombreServicio}\n`;
                    textoCita += `*Fecha:* ${fecha}\n`;
                    textoCita += `*Hora:* ${hora}\n\n`;
                    textoCita += `Por favor, entra a tu panel profesional para ACEPTAR ✅ o RECHAZAR ❌ esta solicitud.`;

                    window.open(`https://wa.me/${numeroVendedor}?text=${encodeURIComponent(textoCita)}`, '_blank');
                }
            }

            await lanzarNotificacion("¡Solicitud Enviada!", "Tu cita está en estado PENDIENTE.\n\nEl profesional ha sido notificado y deberá confirmar tu solicitud. Puedes revisar el estado en 'Mi Perfil / Panel'.", "success", "entendido");
            cerrarAgenda(); 
        }

        async function cerrarSesion() { 
            await clienteSupabase.auth.signOut(); 
            window.location.reload(); 
        }

        window.addEventListener('DOMContentLoaded', () => {
            const airbnbNombre = localStorage.getItem('tm_airbnb_nombre');
            if (airbnbNombre) {
                document.getElementById('banner-airbnb').classList.remove('hidden');
                document.getElementById('nombre-airbnb-banner').innerText = airbnbNombre;
            }
            cargarDatos();
        });

        function limpiarModoAirbnb() {
            localStorage.removeItem('tm_airbnb_direccion');
            localStorage.removeItem('tm_airbnb_nombre');
            location.reload();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(err => {}));
        }
        let eventoInstalacion; const btnInstalar = document.getElementById('btn-instalar');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); eventoInstalacion = e; btnInstalar.classList.remove('hidden'); });
        btnInstalar.addEventListener('click', async () => {
            if (!eventoInstalacion) return; eventoInstalacion.prompt(); 
            const { outcome } = await eventoInstalacion.userChoice;
            if (outcome === 'accepted') btnInstalar.classList.add('hidden');
            eventoInstalacion = null;
        });
        window.addEventListener('appinstalled', () => btnInstalar.classList.add('hidden'));

        function abrirDocumentoLegal(url, titulo) {
            document.getElementById('modal-legal-titulo').innerText = titulo;
            document.getElementById('iframe-documento-legal').src = url;
            document.getElementById('modal-documento-legal').classList.remove('hidden');
        }

        function cerrarDocumentoLegal() {
            document.getElementById('modal-documento-legal').classList.add('hidden');
            document.getElementById('iframe-documento-legal').src = '';
        }
    </script>
