<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Comercial - Cañadas del Bosque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'bosque-morado': '#622e70',    
                'bosque-oliva': '#5d444e',     
                'bosque-lima': '#a8c345',      
                'bosque-cian': '#34bec1',      
                'bosque-amarillo': '#ebd138',  
              }
            }
          }
        }
    </script>
    <style>
        .active-filter { background-color: #622e70 !important; color: white !important; }
        .banner-slide { min-width: 100%; transition: 0.5s; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-4 border-bosque-morado">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-serif tracking-wide text-bosque-oliva uppercase">Cañadas <span class="lowercase text-bosque-lima italic">del</span> <span class="text-bosque-morado font-bold text-3xl md:text-4xl">Bosque</span></h1>
                <p class="text-xs text-bosque-oliva font-light">Directorio Comercial Exclusivo</p>
            </div>
            <a href="https://wa.me/tu_numero" class="bg-bosque-cian hover:bg-teal-500 text-white px-4 py-2 rounded-full text-sm font-medium transition shadow-md">
                Publicar Anuncio
            </a>
        </div>
    </header>

    <section class="max-w-7xl mx-auto mt-6 px-4">
        <div class="relative overflow-hidden rounded-2xl shadow-xl bg-bosque-morado h-48 md:h-64 flex items-center">
            <div class="absolute inset-0 flex items-center justify-between px-10 bg-gradient-to-r from-bosque-morado to-transparent z-10">
                <div class="max-w-md text-white">
                    <span class="bg-bosque-amarillo text-bosque-morado px-2 py-1 rounded text-xs font-bold uppercase">Destacado de la semana</span>
                    <h2 class="text-3xl font-bold mt-2">Hogwarts Snacks & Foods</h2>
                    <p class="text-sm opacity-90 mt-1">¡Magia en cada bocado! Hamburguesas, alitas y postres temáticos.</p>
                    <button class="mt-4 bg-white text-bosque-morado px-4 py-2 rounded-lg font-bold text-sm">Ver Menú Mágico</button>
                </div>
                <div class="hidden md:block">
                    <img src="https://images.unsplash.com/photo-1550507992-eb63ffee0847?auto=format&fit=crop&w=300" class="rounded-full border-4 border-bosque-lima w-40 h-40 object-cover shadow-2xl">
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200" class="w-full h-full object-cover opacity-40">
        </div>
    </section>

    <nav class="max-w-7xl mx-auto mt-8 px-4 overflow-x-auto">
        <div class="flex gap-3 pb-2">
            <button onclick="filtrar('Todos')" id="btn-Todos" class="filter-btn active-filter whitespace-nowrap px-6 py-2 rounded-full border border-bosque-morado text-bosque-morado font-medium hover:bg-bosque-morado hover:text-white transition">Todos</button>
            <button onclick="filtrar('Alimentos')" id="btn-Alimentos" class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-bosque-morado text-bosque-morado font-medium hover:bg-bosque-morado hover:text-white transition">🍔 Alimentos</button>
            <button onclick="filtrar('Servicios')" id="btn-Servicios" class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-bosque-morado text-bosque-morado font-medium hover:bg-bosque-morado hover:text-white transition">🛠️ Servicios</button>
            <button onclick="filtrar('Salud')" id="btn-Salud" class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-bosque-morado text-bosque-morado font-medium hover:bg-bosque-morado hover:text-white transition">🩺 Salud</button>
            <button onclick="filtrar('Hogar')" id="btn-Hogar" class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-bosque-morado text-bosque-morado font-medium hover:bg-bosque-morado hover:text-white transition">🏠 Hogar</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="contenedor-anuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="bg-bosque-oliva text-white py-10 mt-10">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="font-serif text-xl uppercase tracking-widest">Cañadas del Bosque</p>
            <p class="text-xs opacity-60 mt-2">© 2026 Directorio Vecinal Protegido. Morelia, Michoacán.</p>
        </div>
    </footer>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosAnuncios = [];

        async function cargarDatos() {
            const { data, error } = await supabase
                .from('anuncios')
                .select('*')
                .order('nivel_pago', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }
            todosLosAnuncios = data;
            renderizar(todosLosAnuncios);
        }

        function filtrar(categoria) {
            // Actualizar botones UI
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`btn-${categoria}`).classList.add('active-filter');

            if (categoria === 'Todos') {
                renderizar(todosLosAnuncios);
            } else {
                const filtrados = todosLosAnuncios.filter(a => a.categoria === categoria);
                renderizar(filtrados);
            }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-medium">No hay anuncios en esta categoría todavía.</p>';
                return;
            }

            lista.forEach(anuncio => {
                const esPremium = anuncio.nivel_pago >= 2;
                const tarjetaHtml = `
                    <div class="bg-white rounded-2xl shadow-sm border ${esPremium ? 'border-bosque-lima ring-2 ring-bosque-lima/10' : 'border-gray-100'} overflow-hidden hover:shadow-xl transition duration-300 flex flex-col h-full">
                        ${anuncio.imagen_url ? `<img src="${anuncio.imagen_url}" class="w-full h-44 object-cover">` : ''}
                        <div class="p-5 flex flex-col flex-grow">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-bold text-bosque-morado bg-purple-50 px-2 py-0.5 rounded uppercase tracking-wider">${anuncio.categoria}</span>
                                ${anuncio.nivel_pago === 3 ? '<span class="text-amber-500 font-bold text-xs">★ Premium</span>' : ''}
                            </div>
                            <h3 class="mt-2 font-bold text-lg text-bosque-oliva">${anuncio.nombre_negocio}</h3>
                            <p class="text-sm text-gray-500 mt-1 flex-grow line-clamp-3">${anuncio.descripcion}</p>
                            
                            <div class="mt-4 pt-4 border-t border-gray-50 flex gap-2">
                                <a href="https://wa.me/${anuncio.enlace_whatsapp || ''}" class="flex-1 text-center bg-green-500 text-white py-2 rounded-lg text-sm font-bold hover:bg-green-600 transition">WhatsApp</a>
                                ${anuncio.nivel_pago >= 2 ? '<button class="flex-1 bg-bosque-morado text-white py-2 rounded-lg text-sm font-bold">Ver Menú</button>' : ''}
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjetaHtml;
            });
        }

        cargarDatos();
    </script>
</body>
</html>
