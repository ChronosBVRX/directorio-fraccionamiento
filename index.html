<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio - Ciudad Tres Marías</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Montserrat', 'sans-serif'],
              },
              colors: {
                'tm-azul': '#22527b',       
                'tm-azul-oscuro': '#143653',
                'tm-azul-claro': '#eaf1f8', 
                'tm-dorado': '#d4af37',     
                'tm-gris': '#4b5563',
              }
            }
          }
        }
    </script>
    <style>
        .active-filter { background-color: #22527b !important; color: white !important; }
        img { transition: opacity 0.3s ease-in-out; }
        img[loading] { opacity: 0; }
        img[src] { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-tm-gris">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-4 border-tm-azul">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
            
            <a href="#" class="flex items-center flex-shrink-0">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" alt="Logo Ciudad Tres Marías" class="h-12 md:h-16 w-auto object-contain">
            </a>
            
            <a href="https://wa.me/tu_numero" class="bg-tm-azul hover:bg-tm-azul-oscuro text-white px-5 py-2.5 rounded-md text-sm font-bold transition shadow whitespace-nowrap">
                Publicar Anuncio
            </a>
        </div>
    </header>

    <section class="max-w-7xl mx-auto mt-6 px-4">
        <div class="relative overflow-hidden rounded-xl shadow-lg bg-tm-azul h-48 md:h-64 flex items-center">
            <div class="absolute inset-0 flex items-center justify-between px-10 bg-gradient-to-r from-tm-azul via-tm-azul/80 to-transparent z-10">
                <div class="max-w-md text-white">
                    <span class="bg-tm-dorado text-white px-3 py-1 rounded-sm text-[10px] font-bold uppercase tracking-wider">Destacado Elite</span>
                    <h2 class="text-3xl font-black mt-3">Hogwarts Snacks & Foods</h2>
                    <p class="text-sm opacity-90 mt-2 font-light">¡Magia en cada bocado! Hamburguesas, alitas y postres temáticos entregados en tu puerta.</p>
                    <button class="mt-5 bg-white text-tm-azul px-6 py-2.5 rounded font-bold text-sm shadow hover:bg-gray-100 transition">Ver Menú Mágico</button>
                </div>
                <div class="hidden md:block">
                    <img src="https://images.unsplash.com/photo-1550507992-eb63ffee0847?auto=format&fit=crop&w=300" class="rounded-full border-4 border-white w-40 h-40 object-cover shadow-2xl">
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200" class="w-full h-full object-cover opacity-20">
        </div>
    </section>

    <nav class="max-w-7xl mx-auto mt-8 px-4 overflow-x-auto">
        <div class="flex gap-2 pb-2 border-b border-gray-200">
            <button onclick="filtrar('Todos')" id="btn-Todos" class="filter-btn active-filter whitespace-nowrap px-6 py-2 rounded-md border border-tm-azul text-tm-azul font-semibold text-sm hover:bg-tm-azul-claro hover:text-tm-azul transition">Todos</button>
            <button onclick="filtrar('Alimentos')" id="btn-Alimentos" class="filter-btn whitespace-nowrap px-6 py-2 rounded-md border border-tm-azul text-tm-azul font-semibold text-sm hover:bg-tm-azul-claro hover:text-tm-azul transition">Alimentos</button>
            <button onclick="filtrar('Servicios')" id="btn-Servicios" class="filter-btn whitespace-nowrap px-6 py-2 rounded-md border border-tm-azul text-tm-azul font-semibold text-sm hover:bg-tm-azul-claro hover:text-tm-azul transition">Servicios</button>
            <button onclick="filtrar('Salud')" id="btn-Salud" class="filter-btn whitespace-nowrap px-6 py-2 rounded-md border border-tm-azul text-tm-azul font-semibold text-sm hover:bg-tm-azul-claro hover:text-tm-azul transition">Salud y Belleza</button>
            <button onclick="filtrar('Hogar')" id="btn-Hogar" class="filter-btn whitespace-nowrap px-6 py-2 rounded-md border border-tm-azul text-tm-azul font-semibold text-sm hover:bg-tm-azul-claro hover:text-tm-azul transition">Hogar</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="contenedor-anuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="bg-tm-azul-oscuro text-white py-12 mt-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="flex flex-col items-center justify-center text-white leading-none mb-4">
                <span class="font-light tracking-[0.2em] text-xs">CIUDAD</span>
                <span class="font-black text-2xl tracking-tight mt-1">TRES MARÍAS</span>
            </div>
            <p class="text-sm opacity-80 mt-2 font-light">Directorio Comercial Exclusivo</p>
            <div class="w-16 h-0.5 bg-tm-dorado mx-auto mt-6"></div>
            <p class="text-xs opacity-50 mt-6 font-light">© 2026 Reservados todos los derechos. Morelia, Michoacán.</p>
        </div>
    </footer>

    <script>
        // CLAVES DE SUPABASE
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosAnuncios = [];

        // Cargar datos al inicio
        async function cargarDatos() {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '<div class="col-span-full text-center py-10 text-tm-azul opacity-50 animate-pulse font-semibold">Cargando directorio...</div>';

            const { data, error } = await supabase
                .from('anuncios')
                .select('*')
                .order('nivel_pago', { ascending: false });

            if (error) {
                console.error(error);
                contenedor.innerHTML = '<p class="col-span-full text-center py-20 text-red-500 font-bold">Error al conectar con la base de datos.</p>';
                return;
            }
            todosLosAnuncios = data;
            renderizar(todosLosAnuncios);
        }

        // Lógica de filtrado
        function filtrar(categoria) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`btn-${categoria}`).classList.add('active-filter');

            if (categoria === 'Todos') {
                renderizar(todosLosAnuncios);
            } else {
                const filtrados = todosLosAnuncios.filter(a => a.categoria === categoria);
                renderizar(filtrados);
            }
        }

        // Dibujar las tarjetas de anuncios
        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-medium">No hay anuncios registrados en esta categoría.</p>';
                return;
            }

            lista.forEach(anuncio => {
                const esPremium = anuncio.nivel_pago >= 2;
                const esElite = anuncio.nivel_pago === 3;
                
                const bordeTarjeta = esElite ? 'border-tm-dorado ring-1 ring-tm-dorado/30 border-2' : (esPremium ? 'border-tm-azul ring-1 ring-tm-azul/10 border-2' : 'border-gray-200 border');
                const colorBotonPrincipal = esElite ? 'bg-tm-dorado hover:bg-yellow-600 text-white' : 'bg-tm-azul hover:bg-tm-azul-oscuro text-white';

                const tarjetaHtml = `
                    <div class="bg-white rounded-xl shadow-sm ${bordeTarjeta} overflow-hidden hover:shadow-lg transition duration-300 flex flex-col h-full">
                        ${anuncio.imagen_url ? `<img src="${anuncio.imagen_url}" alt="${anuncio.nombre_negocio}" class="w-full h-48 object-cover bg-tm-azul-claro" loading="lazy">` : ''}
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start gap-2">
                                <span class="text-[10px] font-bold text-tm-azul bg-tm-azul-claro px-2.5 py-1 rounded-sm uppercase tracking-wider">${anuncio.categoria}</span>
                                ${esElite ? '<span class="text-tm-dorado font-bold text-xs uppercase tracking-wide flex items-center gap-1">★ Elite</span>' : (esPremium ? '<span class="text-tm-azul font-bold text-xs uppercase tracking-wide">Destacado</span>' : '')}
                            </div>
                            <h3 class="mt-3 font-bold text-xl text-tm-azul-oscuro leading-tight">${anuncio.nombre_negocio}</h3>
                            <p class="text-sm text-tm-gris mt-2 flex-grow line-clamp-3 font-light">${anuncio.descripcion}</p>
                            
                            <div class="mt-6 pt-4 border-t border-gray-100 flex gap-3">
                                <a href="https://wa.me/${anuncio.enlace_whatsapp || ''}" target="_blank" class="flex-1 text-center bg-green-500 text-white py-2.5 rounded text-sm font-semibold hover:bg-green-600 transition shadow-sm">WhatsApp</a>
                                ${esPremium ? `<button class="flex-1 ${colorBotonPrincipal} py-2.5 rounded text-sm font-semibold transition shadow-sm">Ver Perfil</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjetaHtml;
            });
        }

        // Iniciar carga de datos
        cargarDatos();
    </script>
</body>
</html>
