<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Tres Marías - Directorio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } } }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-tm-gris flex flex-col relative">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-tm-azul p-2">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" class="h-12 sm:h-20" alt="Logo">
            <div class="flex gap-2 items-center">
                <a href="rastreo.html" class="text-tm-dorado font-bold text-xs">📍 Seguir Pedido</a>
                <a href="login.html" id="btn-login" class="bg-tm-azul text-white px-4 py-2 rounded font-bold text-xs">Entrar</a>
                <button onclick="abrirPerfil()" id="btn-perfil" class="hidden text-tm-azul font-bold text-xs">👤 Mi Perfil</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="contenedor-anuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="modal-menu" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 id="menu-titulo" class="font-black text-tm-azul">Menú</h2>
                <button onclick="cerrarMenu()" class="text-2xl">&times;</button>
            </div>
            <div id="menu-lista" class="p-4 overflow-y-auto flex-grow space-y-4"></div>
            <div id="menu-carrito" class="p-4 border-t bg-white shadow-lg">
                <p class="font-black text-lg mb-4 text-right">Total: <span id="menu-total" class="text-tm-azul">$0.00</span></p>
                <div class="space-y-2 mb-4">
                    <input type="text" id="cliente-nombre" placeholder="Nombre Completo" class="w-full p-2 border rounded">
                    <input type="tel" id="cliente-telefono" placeholder="Teléfono" class="w-full p-2 border rounded">
                    <textarea id="cliente-direccion" placeholder="Dirección Exacta" class="w-full p-2 border rounded"></textarea>
                </div>
                <button onclick="procesarPedido()" class="w-full bg-tm-dorado text-white py-3 rounded-lg font-black uppercase">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioActual = null;
        let carritoActual = {};
        let negocioActualPedido = null;
        let perfilUsuarioActual = null;

        clienteSupabase.auth.onAuthStateChange(async (event, session) => {
            usuarioActual = session?.user || null;
            if(usuarioActual) {
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('btn-perfil').classList.remove('hidden');
                const { data } = await clienteSupabase.from('perfiles').select('*').eq('user_id', usuarioActual.id).maybeSingle();
                perfilUsuarioActual = data;
            }
            cargarDatos();
        });

        async function cargarDatos() {
            const { data } = await clienteSupabase.from('anuncios').select('*').order('nivel_pago', { ascending: false });
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = data.map(a => `
                <div class="bg-white rounded-xl shadow border p-5 flex flex-col">
                    <h3 class="font-black text-tm-azul-oscuro">${a.nombre_negocio}</h3>
                    <p class="text-xs text-gray-500 my-2">${a.descripcion}</p>
                    <button onclick='abrirMenu(${JSON.stringify(a)}, true)' class="mt-auto bg-tm-dorado text-white py-2 rounded font-bold text-xs uppercase">Ver Menú y Pedir</button>
                </div>`).join('');
        }

        async function abrirMenu(negocio) {
            negocioActualPedido = negocio; carritoActual = {};
            document.getElementById('modal-menu').classList.remove('hidden');
            document.getElementById('menu-titulo').innerText = negocio.nombre_negocio;
            
            if(perfilUsuarioActual) {
                document.getElementById('cliente-nombre').value = perfilUsuarioActual.nombre_completo || '';
                document.getElementById('cliente-telefono').value = perfilUsuarioActual.telefono || '';
                document.getElementById('cliente-direccion').value = perfilUsuarioActual.direccion || '';
            }

            const { data: prods } = await clienteSupabase.from('productos').select('*').eq('anuncio_id', negocio.id);
            negocioActualPedido.productosArr = prods;
            document.getElementById('menu-lista').innerHTML = prods.map((p, i) => `
                <div class="flex justify-between items-center border-b pb-2">
                    <div><p class="font-bold text-sm">${p.nombre}</p><p class="text-tm-dorado font-bold">$${p.precio}</p></div>
                    <div class="flex items-center gap-2">
                        <button onclick="cambiarCant(${i},-1)" class="w-6 h-6 bg-gray-200 rounded">-</button>
                        <span id="cant-${i}" class="font-bold text-sm">0</span>
                        <button onclick="cambiarCant(${i},1)" class="w-6 h-6 bg-tm-azul text-white rounded">+</button>
                    </div>
                </div>`).join('');
        }

        function cambiarCant(i, c) {
            carritoActual[i] = Math.max(0, (carritoActual[i] || 0) + c);
            document.getElementById(`cant-${i}`).innerText = carritoActual[i];
            let t = 0;
            for(let key in carritoActual) t += carritoActual[key] * negocioActualPedido.productosArr[key].precio;
            document.getElementById('menu-total').innerText = `$${t.toFixed(2)}`;
        }

        async function procesarPedido() {
            const n = document.getElementById('cliente-nombre').value;
            const t = document.getElementById('cliente-telefono').value;
            const d = document.getElementById('cliente-direccion').value;
            if(!n || !t || !d) return alert("Llena tus datos.");

            let total = 0; let peds = [];
            for(let i in carritoActual) {
                if(carritoActual[i] > 0) {
                    let sub = carritoActual[i] * negocioActualPedido.productosArr[i].precio;
                    total += sub;
                    peds.push(`${carritoActual[i]}x ${negocioActualPedido.productosArr[i].nombre}`);
                }
            }
            if(peds.length === 0) return alert("Carrito vacío.");

            const folio = 'VTM-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            await clienteSupabase.from('pedidos').insert([{
                folio, negocio_id: negocioActualPedido.id, cliente_id: usuarioActual?.id,
                cliente_nombre: n, cliente_telefono: t, cliente_direccion: d,
                total, estado: 'esperando_activacion', detalles_pedido: peds
            }]);

            const base = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            const msg = `*NUEVO PEDIDO*\nCliente: ${n}\nTotal: $${total}\nFolio: ${folio}\nActiva aquí:\n${base}/activar_pedido.html?folio=${folio}`;
            window.open(`https://wa.me/${negocioActualPedido.enlace_whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
            cerrarMenu();
        }

        function cerrarMenu() { document.getElementById('modal-menu').classList.add('hidden'); }
        function abrirPerfil() { window.location.href = "panel.html?view=perfil"; }
    </script>
</body>
</html>
