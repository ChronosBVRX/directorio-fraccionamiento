<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Tres Marías - Directorio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } }
        }
    </script>
    <style>
        /* Estilos del botón activo */
        .active-filter { 
            background-color: #22527b !important; 
            border-color: #22527b !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Fuerza el color blanco en el texto cuando el filtro está activo */
        .active-filter .label-categoria { 
            color: white !important; 
        }
        
        /* Ocultar barra de scroll para un look de app móvil */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-tm-gris flex flex-col">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-tm-azul">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
            <a href="#" onclick="mostrarVista('directorio')" class="flex items-center">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" alt="Logo" class="h-12 w-auto">
            </a>
            
            <div id="nav-botones" class="flex gap-2 items-center">
                <button onclick="mostrarVista('directorio')" id="btn-inicio" class="hidden text-tm-azul font-bold text-sm px-4 py-2 hover:underline">Inicio</button>
                <a href="login.html" id="btn-login" class="bg-tm-azul hover:bg-tm-azul-oscuro text-white px-4 py-2 rounded font-bold text-sm transition inline-block">Entrar / Registrarse</a>
                <button onclick="mostrarVista('panel')" id="btn-panel" class="hidden bg-tm-dorado hover:bg-yellow-600 text-white px-4 py-2 rounded font-bold text-sm transition">Mi Panel</button>
                <button onclick="cerrarSesion()" id="btn-logout" class="hidden bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-bold text-sm text-tm-azul transition">Salir</button>
            </div>
        </div>
    </header>

    <div id="vista-directorio" class="block flex-grow">
        <nav class="max-w-7xl mx-auto mt-6 px-4 flex gap-3 overflow-x-auto pb-4 pt-2 border-b border-gray-200 hide-scrollbar">
            
            <button onclick="filtrar('Todos')" id="btn-Todos" class="filter-btn active-filter flex flex-col items-center justify-center gap-2 px-2 py-3 rounded-2xl border border-transparent hover:bg-gray-100 transition min-w-[90px]">
                <span class="text-4xl drop-shadow-sm">🏪</span>
                <span class="label-categoria text-sm font-bold text-tm-gris">Todos</span>
            </button>
            
            <button onclick="filtrar('Alimentos')" id="btn-Alimentos" class="filter-btn flex flex-col items-center justify-center gap-2 px-2 py-3 rounded-2xl border border-transparent hover:bg-gray-100 transition min-w-[90px]">
                <span class="text-4xl drop-shadow-sm">🍔</span>
                <span class="label-categoria text-sm font-bold text-tm-gris">Alimentos</span>
            </button>
            
            <button onclick="filtrar('Servicios')" id="btn-Servicios" class="filter-btn flex flex-col items-center justify-center gap-2 px-2 py-3 rounded-2xl border border-transparent hover:bg-gray-100 transition min-w-[90px]">
                <span class="text-4xl drop-shadow-sm">🛠️</span>
                <span class="label-categoria text-sm font-bold text-tm-gris">Servicios</span>
            </button>
            
            <button onclick="filtrar('Salud')" id="btn-Salud" class="filter-btn flex flex-col items-center justify-center gap-2 px-2 py-3 rounded-2xl border border-transparent hover:bg-gray-100 transition min-w-[90px]">
                <span class="text-4xl drop-shadow-sm">🩺</span>
                <span class="label-categoria text-sm font-bold text-tm-gris">Salud</span>
            </button>
            
            <button onclick="filtrar('Hogar')" id="btn-Hogar" class="filter-btn flex flex-col items-center justify-center gap-2 px-2 py-3 rounded-2xl border border-transparent hover:bg-gray-100 transition min-w-[90px]">
                <span class="text-4xl drop-shadow-sm">🏠</span>
                <span class="label-categoria text-sm font-bold text-tm-gris">Hogar</span>
            </button>

        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <div id="contenedor-anuncios" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <div id="vista-iframe-container" class="hidden flex-grow w-full">
        <iframe src="panel.html" id="panel-iframe" class="w-full h-full min-h-[85vh] border-none"></iframe>
    </div>

    <div id="modal-menu" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-md w-full relative flex flex-col max-h-[85vh] overflow-hidden">
            <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                <h2 id="menu-titulo" class="font-black text-xl text-tm-azul">Menú</h2>
                <button onclick="cerrarMenu()" class="text-2xl text-gray-500 hover:text-black">&times;</button>
            </div>
            <div id="menu-lista" class="p-4 overflow-y-auto flex-grow space-y-4"></div>
            <div id="menu-carrito" class="hidden p-4 bg-white border-t shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                <div class="flex justify-between items-center mb-3 font-bold text-lg">
                    <span>Total:</span><span id="menu-total" class="text-tm-azul">$0.00</span>
                </div>
                <button onclick="enviarPedidoWA()" class="w-full bg-[#25D366] text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2">Hacer Pedido por WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosAnuncios = [];
        let usuarioActual = null;
        let carritoActual = {}; 
        let negocioActualPedido = null;

        // AUTH LISTENER CORREGIDO
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            usuarioActual = session ? session.user : null;
            document.getElementById('btn-login').classList.toggle('hidden', !!usuarioActual);
            document.getElementById('btn-panel').classList.toggle('hidden', !usuarioActual);
            document.getElementById('btn-logout').classList.toggle('hidden', !usuarioActual);
            
            if(usuarioActual) {
                cargarDatos(); 
            } else {
                mostrarVista('directorio');
            }
        });

        // NAVEGACIÓN
        function mostrarVista(vista) {
            if(vista === 'directorio') {
                document.getElementById('vista-directorio').classList.remove('hidden');
                document.getElementById('vista-iframe-container').classList.add('hidden');
                document.getElementById('btn-inicio').classList.add('hidden');
                cargarDatos();
            } else {
                document.getElementById('vista-directorio').classList.add('hidden');
                document.getElementById('vista-iframe-container').classList.remove('hidden');
                document.getElementById('btn-inicio').classList.remove('hidden');
            }
        }

        // CARGA DE DATOS PÚBLICOS
        async function cargarDatos() {
            const { data, error } = await clienteSupabase.from('anuncios').select('*').order('nivel_pago', { ascending: false });
            if (error) {
                console.error("Error al cargar datos:", error);
            }
            todosLosAnuncios = data || [];
            
            if(!document.getElementById('vista-directorio').classList.contains('hidden')) {
                const filtroActivo = document.querySelector('.active-filter').id.replace('btn-', '');
                filtrar(filtroActivo);
            }
        }

        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '';
            
            if (lista.length === 0) {
                contenedor.innerHTML = `<p class="col-span-full text-center py-10 text-gray-400">No hay negocios aquí.</p>`;
                return;
            }

            lista.forEach(a => {
                const esGratis = a.nivel_pago === 0;
                const tieneMenu = a.nivel_pago >= 2;
                const recibePedidos = a.nivel_pago === 3;
                
                let botones = '';
                if(recibePedidos) {
                    botones = `<button onclick='abrirMenu(${JSON.stringify(a).replace(/'/g, "&apos;")}, true)' class="flex-1 bg-tm-dorado text-white py-2 rounded font-bold text-sm hover:bg-yellow-600 transition">Menú y Pedir</button>`;
                } else if(tieneMenu) {
                    botones = `<button onclick='abrirMenu(${JSON.stringify(a).replace(/'/g, "&apos;")}, false)' class="flex-1 border-2 border-tm-azul text-tm-azul py-2 rounded font-bold text-sm hover:bg-blue-50 transition">Ver Menú</button>`;
                } else {
                    botones = `<a href="https://wa.me/${a.enlace_whatsapp}" target="_blank" class="flex-1 text-center bg-[#25D366] text-white py-2 rounded font-bold text-sm hover:bg-green-600 transition">Contactar</a>`;
                }

                contenedor.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border ${esGratis ? 'border-gray-200' : (recibePedidos ? 'border-tm-dorado ring-1 ring-tm-dorado/30' : 'border-tm-azul')} overflow-hidden flex flex-col hover:shadow-lg transition">
                        ${!esGratis && a.imagen_url ? `<img src="${a.imagen_url}" class="w-full h-40 object-cover bg-gray-100">` : ''}
                        <div class="p-5 flex flex-col flex-grow">
                            <span class="text-[10px] font-bold text-tm-azul bg-blue-50 px-2 py-1 rounded w-max uppercase">${a.categoria}</span>
                            <h3 class="mt-2 font-bold text-lg text-tm-azul-oscuro leading-tight">${a.nombre_negocio}</h3>
                            <p class="text-sm text-tm-gris mt-1 font-light line-clamp-2">${a.descripcion}</p>
                            ${a.direccion ? `<p class="text-xs text-gray-500 mt-3 flex items-center gap-1">📍 ${a.direccion}</p>` : ''}
                            ${a.horarios ? `<p class="text-xs text-gray-500 mt-1 flex items-center gap-1">🕒 ${a.horarios}</p>` : ''}
                            <div class="mt-4 pt-4 border-t border-gray-100 flex gap-2">${botones}</div>
                        </div>
                    </div>`;
            });
        }

        function filtrar(cat) { 
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`btn-${cat}`)?.classList.add('active-filter');
            renderizar(cat === 'Todos' ? todosLosAnuncios : todosLosAnuncios.filter(a => a.categoria === cat)); 
        }

        // LÓGICA DE MENÚ Y CARRITO
        function abrirMenu(negocio, permitePedidos) {
            negocioActualPedido = negocio;
            carritoActual = {};
            document.getElementById('modal-menu').classList.remove('hidden');
            document.getElementById('menu-titulo').innerText = negocio.nombre_negocio;
            
            const contenedorLista = document.getElementById('menu-lista');
            
            let menuArr = [];
            try {
                menuArr = typeof negocio.menu === 'string' ? JSON.parse(negocio.menu) : (negocio.menu || []);
            } catch (e) {
                console.error("Error al parsear el menú:", e);
            }

            if(menuArr.length === 0) {
                contenedorLista.innerHTML = `<p class="text-center text-gray-400 py-10">Este negocio aún no ha agregado productos.</p>`;
            } else {
                contenedorLista.innerHTML = menuArr.map((item, index) => `
                    <div class="border-b pb-3 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-tm-azul-oscuro">${item.nombre}</h4>
                            <p class="text-xs text-tm-gris">${item.desc || ''}</p>
                            <p class="text-tm-dorado font-bold mt-1">$${item.precio}</p>
                        </div>
                        ${permitePedidos ? `
                        <div class="flex items-center gap-3 bg-gray-100 rounded-lg p-1 shadow-inner">
                            <button onclick="cambiarCantidad(${index}, -1)" class="w-8 h-8 bg-white rounded shadow-sm text-red-500 font-bold hover:bg-gray-50">-</button>
                            <span id="cant-${index}" class="font-bold w-4 text-center">0</span>
                            <button onclick="cambiarCantidad(${index}, 1)" class="w-8 h-8 bg-white rounded shadow-sm text-tm-azul font-bold hover:bg-gray-50">+</button>
                        </div>` : ''}
                    </div>
                `).join('');
            }

            const divCarrito = document.getElementById('menu-carrito');
            if(permitePedidos && menuArr.length > 0) {
                divCarrito.classList.remove('hidden');
                actualizarTotal();
            } else {
                divCarrito.classList.add('hidden');
            }
        }

        function cerrarMenu() { document.getElementById('modal-menu').classList.add('hidden'); }
        
        function cambiarCantidad(index, cambio) {
            if(!carritoActual[index]) carritoActual[index] = 0;
            carritoActual[index] = Math.max(0, carritoActual[index] + cambio);
            document.getElementById(`cant-${index}`).innerText = carritoActual[index];
            actualizarTotal();
        }
        
        function actualizarTotal() {
            let total = 0;
            const menu = typeof negocioActualPedido.menu === 'string' ? JSON.parse(negocioActualPedido.menu) : negocioActualPedido.menu;
            for (let i in carritoActual) total += carritoActual[i] * menu[i].precio;
            document.getElementById('menu-total').innerText = `$${total.toFixed(2)}`;
        }
        
        function enviarPedidoWA() {
            let total = 0;
            let resumen = `Hola! Quiero hacer un pedido a *${negocioActualPedido.nombre_negocio}*:%0A%0A`;
            const menu = typeof negocioActualPedido.menu === 'string' ? JSON.parse(negocioActualPedido.menu) : negocioActualPedido.menu;
            let tieneItems = false;
            
            for (let i in carritoActual) {
                if(carritoActual[i] > 0) {
                    tieneItems = true;
                    let subtotal = carritoActual[i] * menu[i].precio;
                    total += subtotal;
                    resumen += `- ${carritoActual[i]}x ${menu[i].nombre} ($${subtotal})%0A`;
                }
            }
            if(!tieneItems) return alert("Por favor agrega productos a tu pedido.");
            resumen += `%0A*Total: $${total.toFixed(2)}*`;
            window.open(`https://wa.me/${negocioActualPedido.enlace_whatsapp}?text=${resumen}`, '_blank');
            cerrarMenu();
        }

        async function cerrarSesion() { 
            await clienteSupabase.auth.signOut(); 
            window.location.reload(); 
        }

    </script>
</body>
</html>
