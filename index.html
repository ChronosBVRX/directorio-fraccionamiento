        async function cargarDatos() {

        function estaAbiertoAhora(a) {
            try {
                if (a.esta_abierto === false) return false; 
                if (!a.horarios || typeof a.horarios !== 'object' || Object.keys(a.horarios).length === 0) return true; 

                const ahora = new Date();
                const diaSemana = ahora.getDay(); 
                const horaActual = ahora.getHours() * 60 + ahora.getMinutes(); 

                const hoy = a.horarios[diaSemana];
                if (!hoy) return true; 
                if (!hoy.abierto) return false; 
                if (!hoy.abre || !hoy.cierra) return true; 

                const [hAbre, mAbre] = hoy.abre.split(':').map(Number);
                const [hCierra, mCierra] = hoy.cierra.split(':').map(Number);
                const minAbre = hAbre * 60 + mAbre;
                const minCierra = hCierra * 60 + mCierra;

                return horaActual >= minAbre && horaActual <= minCierra;
            } catch(e) {
                return true; 
            }
        }

        function stringHorarioHoy(horarios) {
            try {
                if (!horarios || typeof horarios !== 'object' || Object.keys(horarios).length === 0) return 'Horario no definido';
                const ahora = new Date(); 
                const hoy = horarios[ahora.getDay()];
                
                if (!hoy) return 'Horario no definido';
                if (!hoy.abierto) return 'Cerrado hoy';
                if (!hoy.abre || !hoy.cierra) return 'Abierto 24 hrs';
                
                function format12(time24) { 
                    let [h, m] = time24.split(':'); 
                    h = parseInt(h); 
                    let ampm = h >= 12 ? 'PM' : 'AM'; 
                    h = h % 12 || 12; 
                    return `${h}:${m} ${ampm}`; 
                }
                return `Hoy de ${format12(hoy.abre)} a ${format12(hoy.cierra)}`;
            } catch(e) {
                return 'Horario no definido';
            }
        }

        function renderizar(lista) {

            lista.forEach(a => {

                const estaAbierto = estaAbiertoAhora(a);
                const textoHorario = stringHorarioHoy(a.horarios);
                
                let badgeAntiguedad = '';
                if (a.created_at) {
                    const meses = Math.floor((new Date() - new Date(a.created_at)) / (1000 * 60 * 60 * 24 * 30.44));

                    else if (meses < 1) badgeAntiguedad = `<span class="bg-blue-100 text-blue-600 text-[9px] font-black px-2 py-0.5 rounded uppercase ml-1 whitespace-nowrap">NUEVO</span>`;

                let botones = '';

                    else botones = `<button onclick='abrirMenu(${JSON.stringify(a).replace(/'/g, "&apos;")})' class="flex-1 bg-gray-200 text-gray-500 py-1.5 sm:py-2 px-2 rounded font-bold text-xs sm:text-sm hover:bg-gray-300 transition">Ver Menú (Cerrado)</button>`;

        }

        function filtrar(cat) { 
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`btn-${cat}`)?.classList.add('active-filter');
            renderizar(cat === 'Todos' ? todosLosAnuncios : todosLosAnuncios.filter(a => a.categoria === cat)); 
        }

        // --- LÓGICA DEL MENÚ Y PEDIDOS ---
        async function abrirMenu(negocio) {
            negocioActualPedido = negocio;
            carritoActual = {};
            document.getElementById('modal-menu').classList.remove('hidden');
            document.getElementById('menu-titulo').innerText = negocio.nombre_negocio;
            document.getElementById('cliente-notas').value = '';

            const permitePedidos = negocio.nivel_pago >= 2;
            const negocioAbierto = estaAbiertoAhora(negocio);

            // --- AUTOCOMPLETADO AIRBNB Y PERFIL ---
            const airbnbDir = localStorage.getItem('tm_airbnb_direccion');
            const inputDir = document.getElementById('cliente-direccion');
            const inputNombre = document.getElementById('cliente-nombre');
            const inputTel = document.getElementById('cliente-telefono');

            if (airbnbDir) {
                inputDir.value = airbnbDir;
                inputDir.setAttribute('readonly', 'true');
                inputDir.classList.add('bg-gray-100', 'cursor-not-allowed');
                
                inputNombre.value = perfilUsuarioActual ? (perfilUsuarioActual.nombre_completo || '') : '';
                inputTel.value = perfilUsuarioActual ? (perfilUsuarioActual.telefono || '') : '';
            } else {
                inputDir.removeAttribute('readonly');
                inputDir.classList.remove('bg-gray-100', 'cursor-not-allowed');
                
                if (perfilUsuarioActual) {
                    inputNombre.value = perfilUsuarioActual.nombre_completo || '';
                    inputTel.value = perfilUsuarioActual.telefono || '';
                    inputDir.value = perfilUsuarioActual.direccion || '';
                } else {
                    inputNombre.value = ''; inputTel.value = ''; inputDir.value = '';
                }
            }
            
            const contenedorLista = document.getElementById('menu-lista');
            contenedorLista.innerHTML = `<p class="text-center text-gray-400 py-4 text-sm">Cargando menú...</p>`;
            
            const { data: productosLista } = await clienteSupabase.from('productos').select('*').eq('anuncio_id', negocio.id).order('id', { ascending: true });
            
            if(!productosLista || productosLista.length === 0) {
                contenedorLista.innerHTML = `<p class="text-center text-gray-400 py-10 text-sm">Este negocio aún no ha agregado productos.</p>`;
                document.getElementById('menu-carrito').classList.add('hidden');
                return;
            }

            negocioActualPedido.productosArr = productosLista;
            let htmlLista = '';
            
            if (!negocioAbierto && permitePedidos) {
                htmlLista += `<div class="bg-red-50 text-red-600 border border-red-200 p-3 rounded-lg text-sm font-bold text-center mb-4">El negocio está cerrado en este momento. No se aceptan pedidos.</div>`;
            }

            htmlLista += productosLista.map((item, index) => {
                const estaDisponible = item.disponible !== false;
                return `
                <div class="border-b pb-3 flex justify-between items-center gap-2 ${!estaDisponible ? 'opacity-50' : ''}">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm sm:text-base text-tm-azul-oscuro flex flex-wrap items-center gap-2">
                            ${item.nombre}
                            ${!estaDisponible ? '<span class="bg-red-100 text-red-600 text-[9px] font-black px-2 py-0.5 rounded uppercase whitespace-nowrap">Agotado</span>' : ''}
                        </h4>
                        <p class="text-[11px] sm:text-xs text-tm-gris line-clamp-2">${item.descripcion || ''}</p>
                        <p class="text-tm-dorado font-bold mt-1 text-sm sm:text-base">$${item.precio}</p>
                    </div>
                    ${(permitePedidos && estaDisponible && negocioAbierto) ? `
                    <div class="flex items-center gap-2 sm:gap-3 bg-gray-100 rounded-lg p-1 shadow-inner shrink-0">
                        <button onclick="cambiarCantidad(${index}, -1)" class="w-7 h-7 sm:w-8 sm:h-8 bg-white rounded shadow-sm text-red-500 font-bold hover:bg-gray-50 flex items-center justify-center">-</button>
                        <span id="cant-${index}" class="font-bold w-4 sm:w-5 text-center text-sm sm:text-base">0</span>
                        <button onclick="cambiarCantidad(${index}, 1)" class="w-7 h-7 sm:w-8 sm:h-8 bg-white rounded shadow-sm text-tm-azul font-bold hover:bg-gray-50 flex items-center justify-center">+</button>
                    </div>` : ''}
                </div>
            `}).join('');

            contenedorLista.innerHTML = htmlLista;

            const divCarrito = document.getElementById('menu-carrito');
            if(permitePedidos && productosLista.length > 0 && negocioAbierto) {
                divCarrito.classList.remove('hidden');
                actualizarTotal();
            } else {
                divCarrito.classList.add('hidden');
            }
        }

        function cerrarMenu() { document.getElementById('modal-menu').classList.add('hidden'); }
        
        function cambiarCantidad(index, cambio) {
            if(!carritoActual[index]) carritoActual[index] = 0;
            carritoActual[index] = Math.max(0, carritoActual[index] + cambio);
            document.getElementById(`cant-${index}`).innerText = carritoActual[index];
            actualizarTotal();
        }
        
        function actualizarTotal() {
            let total = 0;
            const prodList = negocioActualPedido.productosArr;
            for (let i in carritoActual) total += carritoActual[i] * prodList[i].precio;
            document.getElementById('menu-total').innerText = `$${total.toFixed(2)}`;
        }
        
        async function procesarPedido() {
            const nombre = document.getElementById('cliente-nombre').value.trim();
            const telefono = document.getElementById('cliente-telefono').value.trim();
            const direccion = document.getElementById('cliente-direccion').value.trim();
            const notas = document.getElementById('cliente-notas').value.trim();

            if (!nombre || !telefono || !direccion) return alert("Por favor, llena todos tus datos de envío.");

            let total = 0;
            let detallesPedido = [];
            const prodList = negocioActualPedido.productosArr;
            
            let textoPedido = `*NUEVO PEDIDO DE VIVE TRES MARÍAS* 🚀\n\n`;
            textoPedido += `*Cliente:* ${nombre}\n*Teléfono:* ${telefono}\n*Dirección:* ${direccion}\n\n*Detalle:*\n`;
            
            for (let i in carritoActual) {
                if(carritoActual[i] > 0) {
                    let subtotal = carritoActual[i] * prodList[i].precio;
                    total += subtotal;
                    detallesPedido.push({ cantidad: carritoActual[i], producto: prodList[i].nombre, precio_unitario: prodList[i].precio, subtotal: subtotal });
                    textoPedido += `- ${carritoActual[i]}x ${prodList[i].nombre} ...... $${subtotal.toFixed(2)}\n`;
                }
            }

            if(detallesPedido.length === 0) return alert("Por favor agrega productos a tu pedido.");
            if (notas) textoPedido += `\n*Anotaciones del Cliente:*\n_💬 "${notas}"_\n`;

            const btn = document.getElementById('btn-confirmar-pedido');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = 'Procesando pedido...'; btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');

            const { data, error } = await clienteSupabase.functions.invoke('procesar-pedido', {
                body: { negocio_id: negocioActualPedido.id, cliente_id: usuarioActual ? usuarioActual.id : null, nombre: nombre, telefono: telefono, direccion: direccion, carrito: detallesPedido, total: total, notas: notas }
            });

            btn.innerHTML = textoOriginal; btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');

            if (error || !data.success) return alert("Hubo un error al generar tu pedido. Intenta nuevamente.");

            const folioVenta = data.folio;
            textoPedido += `\n*TOTAL A PAGAR: $${total.toFixed(2)}*\n*Folio:* ${folioVenta}\n\n`;
            
            const rutaBase = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            textoPedido += `_Vendedor: Tras confirmar el pago, da clic en el siguiente enlace para solicitar un repartidor:_\n${rutaBase}/activar_pedido.html?folio=${folioVenta}`;

            let numeroVendedor = negocioActualPedido.enlace_whatsapp ? negocioActualPedido.enlace_whatsapp.replace(/\D/g,'') : '';
            if(numeroVendedor) window.open(`https://wa.me/${numeroVendedor}?text=${encodeURIComponent(textoPedido)}`, '_blank');
            else alert("El negocio no tiene un número configurado. Guarda este Folio para aclaraciones: " + folioVenta);

            alert(`¡Pedido generado!\nTu folio es: ${folioVenta}\n\nGuárdalo para rastrear a tu repartidor.`);
            cerrarMenu();
        }

        async function cerrarSesion() { await clienteSupabase.auth.signOut(); window.location.reload(); }

        // --- PWA SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(err => {}));
        }
        let eventoInstalacion; const btnInstalar = document.getElementById('btn-instalar');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); eventoInstalacion = e; btnInstalar.classList.remove('hidden'); });
        btnInstalar.addEventListener('click', async () => {
            if (!eventoInstalacion) return; eventoInstalacion.prompt(); 
            const { outcome } = await eventoInstalacion.userChoice;
            if (outcome === 'accepted') btnInstalar.classList.add('hidden');
            eventoInstalacion = null;
        });
        window.addEventListener('appinstalled', () => btnInstalar.classList.add('hidden'));
    </script>
</body>
</html>
