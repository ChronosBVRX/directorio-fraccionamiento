<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vive Tres Marías - Directorio Comercial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'bosque-morado': '#622e70',    
                'bosque-oliva': '#5d444e',     
                'bosque-lima': '#a8c345',      
                'bosque-cian': '#34bec1',      
                'bosque-amarillo': '#ebd138',  
              }
            }
          }
        }
    </script>
    <style>
        .active-filter { background-color: #622e70 !important; color: white !important; }
        /* Transición suave para la carga de imágenes */
        img { transition: opacity 0.3s ease-in-out; }
        img[loading] { opacity: 0; }
        img[src] { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white shadow-md sticky top-0 z-50 border-b-4 border-bosque-morado">
        <div class="max-w-7xl mx-auto px-6 py-2 flex items-center justify-between gap-4">
            <a href="#" class="flex items-center gap-4 flex-shrink-0">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/logo.png" alt="Logo Vive Tres Marías" class="h-16 w-auto flex-shrink-0 py-1">

                <div class="flex-shrink-0">
                    <h1 class="text-xl md:text-2xl font-serif tracking-wide text-bosque-oliva uppercase leading-none">Vive <span class="text-bosque-morado font-bold text-2xl md:text-3xl">Tres Marías</span></h1>
                    <p class="text-[11px] md:text-xs text-bosque-oliva font-light -mt-0.5">Directorio Comercial Exclusivo</p>
                </div>
            </a>
            
            <a href="https://wa.me/tu_numero" class="bg-bosque-cian hover:bg-teal-500 text-white px-5 py-2.5 rounded-full text-sm font-bold transition shadow-md whitespace-nowrap">
                Publicar Anuncio
            </a>
        </div>
    </header>

    <section class="max-w-7xl mx-auto mt-6 px-4">
        <div class="relative overflow-hidden rounded-2xl shadow-xl bg-bosque-morado h-48 md:h-64 flex items-center">
            <div class="absolute inset-0 flex items-center justify-between px-10 bg-gradient-to-r from-bosque-morado/90 via-bosque-morado/60 to-transparent z-10">
                <div class="max-w-md text-white">
                    <span class="bg-bosque-amarillo text-bosque-morado px-2.5 py-1 rounded text-xs font-bold uppercase tracking-wider">Destacado de la semana</span>
                    <h2 class="text-3xl font-bold mt-2">Hogwarts Snacks & Foods</h2>
                    <p class="text-sm opacity-90 mt-1">¡Magia en cada bocado! Hamburguesas, alitas y postres temáticos.</p>
                    <button class="mt-4 bg-white text-bosque-morado px-5 py-2 rounded-lg font-bold text-sm shadow hover:bg-gray-100 transition">Ver Menú Mágico</button>
                </div>
                <div class="hidden md:block">
                    <img src="https://images.unsplash.com/photo-1550507992-eb63ffee0847?auto=format&fit=crop&w=300" class="rounded-full border-4 border-bosque-lima w-40 h-40 object-cover shadow-2xl">
                </div>
            </div>
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200" class="w-full h-full object-cover opacity-30">
        </div>
    </section>

    <nav class="max-w-7xl mx-auto mt-8 px-4 overflow-x-auto">
        <div class="flex gap-3 pb-2 border-b border-gray-100">
            <button onclick="filtrar('Todos')" id="btn-Todos" class="filter-btn active-filter whitespace-nowrap px-6 py-2.5 rounded-full border border-bosque-morado text-bosque-morado font-semibold text-sm hover:bg-bosque-morado hover:text-white transition">Todos</button>
            <button onclick="filtrar('Alimentos')" id="btn-Alimentos" class="filter-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-bosque-morado text-bosque-morado font-semibold text-sm hover:bg-bosque-morado hover:text-white transition">🍔 Alimentos</button>
            <button onclick="filtrar('Servicios')" id="btn-Servicios" class="filter-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-bosque-morado text-bosque-morado font-semibold text-sm hover:bg-bosque-morado hover:text-white transition">🛠️ Servicios</button>
            <button onclick="filtrar('Salud')" id="btn-Salud" class="filter-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-bosque-morado text-bosque-morado font-semibold text-sm hover:bg-bosque-morado hover:text-white transition">🩺 Salud</button>
            <button onclick="filtrar('Hogar')" id="btn-Hogar" class="filter-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-bosque-morado text-bosque-morado font-semibold text-sm hover:bg-bosque-morado hover:text-white transition">🏠 Hogar</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div id="contenedor-anuncios" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="bg-bosque-oliva text-white py-12 mt-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="font-serif text-2xl uppercase tracking-widest leading-none">Vive Tres Marías</h2>
            <p class="text-sm opacity-80 mt-1">Conectando la comunidad de Tres Marías</p>
            <div class="w-16 h-1 bg-bosque-morado mx-auto mt-4 rounded-full"></div>
            <p class="text-xs opacity-60 mt-6">© 2026 Directorio Comercial Protegido. Morelia, Michoacán.</p>
        </div>
    </footer>

    <script>
        // CONFIGURACIÓN DE SUPABASE (Tus claves exactas)
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosLosAnuncios = [];

        // Cargar datos al inicio
        async function cargarDatos() {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400 animate-pulse">Cargando directorio...</div>';

            const { data, error } = await supabase
                .from('anuncios')
                .select('*')
                .order('nivel_pago', { ascending: false });

            if (error) {
                console.error(error);
                contenedor.innerHTML = '<p class="col-span-full text-center py-20 text-red-500 font-medium">Error al conectar con la base de datos.</p>';
                return;
            }
            todosLosAnuncios = data;
            renderizar(todosLosAnuncios);
        }

        // Lógica de filtrado
        function filtrar(categoria) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            document.getElementById(`btn-${categoria}`).classList.add('active-filter');

            if (categoria === 'Todos') {
                renderizar(todosLosAnuncios);
            } else {
                const filtrados = todosLosAnuncios.filter(a => a.categoria === categoria);
                renderizar(filtrados);
            }
        }

        // Dibujar las tarjetas de anuncios
        function renderizar(lista) {
            const contenedor = document.getElementById('contenedor-anuncios');
            contenedor.innerHTML = '';

            if (lista.length === 0) {
                contenedor.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 font-medium">No hay anuncios registrados en esta categoría.</p>';
                return;
            }

            lista.forEach(anuncio => {
                const esPremium = anuncio.nivel_pago >= 2;
                const esElite = anuncio.nivel_pago === 3;
                
                // Configuración visual según nivel
                const bordeTarjeta = esPremium ? (esElite ? 'border-bosque-amarillo ring-2 ring-bosque-amarillo/20' : 'border-bosque-lima ring-1 ring-bosque-lima/20') : 'border-gray-100';
                const colorBotonPrincipal = esElite ? 'bg-bosque-morado hover:bg-purple-900' : 'bg-bosque-cian hover:bg-teal-500';

                const tarjetaHtml = `
                    <div class="bg-white rounded-2xl shadow-sm border ${bordeTarjeta} overflow-hidden hover:shadow-lg transition duration-300 flex flex-col h-full transform hover:-translate-y-0.5">
                        ${anuncio.imagen_url ? `<img src="${anuncio.imagen_url}" alt="${anuncio.nombre_negocio}" class="w-full h-48 object-cover bg-gray-50" loading="lazy">` : ''}
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start gap-2">
                                <span class="text-[10px] font-bold text-bosque-morado bg-purple-50 px-2.5 py-1 rounded uppercase tracking-wider">${anuncio.categoria}</span>
                                ${esElite ? '<span class="text-amber-500 font-bold text-xs whitespace-nowrap">★ Elite</span>' : (esPremium ? '<span class="text-bosque-lima font-bold text-xs whitespace-nowrap">Destacado</span>' : '')}
                            </div>
                            <h3 class="mt-2.5 font-bold text-xl text-bosque-oliva leading-tight">${anuncio.nombre_negocio}</h3>
                            <p class="text-sm text-gray-600 mt-1.5 flex-grow line-clamp-3">${anuncio.descripcion}</p>
                            
                            <div class="mt-5 pt-4 border-t border-gray-100 flex gap-2.5">
                                <a href="https://wa.me/${anuncio.enlace_whatsapp || ''}" target="_blank" class="flex-1 text-center bg-green-500 text-white py-2.5 rounded-lg text-sm font-bold hover:bg-green-600 transition shadow-sm">WhatsApp</a>
                                ${esPremium ? `<button class="flex-1 ${colorBotonPrincipal} text-white py-2.5 rounded-lg text-sm font-bold transition shadow-sm">Ver Detalles</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += tarjetaHtml;
            });
        }

        // Iniciar carga de datos
        cargarDatos();
    </script>
</body>
</html>
