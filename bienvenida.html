<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Vive Tres Marías</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans flex flex-col relative">

    <header class="bg-white shadow-md sticky top-0 z-40 border-b-4 border-tm-azul relative">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 py-2 flex items-center justify-between gap-2">
            <a href="index.html" class="flex items-center shrink-0">
                <img src="https://raw.githubusercontent.com/ChronosBVRX/directorio-fraccionamiento/main/images/Logo.png" alt="Logo" class="h-10 sm:h-14 w-auto object-contain">
            </a>
            <div class="flex items-center gap-1.5 sm:gap-2 shrink-0">
                <button onclick="toggleMenuPrincipal()" class="bg-gray-100 text-tm-azul p-1.5 sm:p-2 rounded-lg hover:bg-gray-200 transition flex items-center shadow-sm border border-gray-200">
                    <span class="text-lg sm:text-xl leading-none">☰</span>
                </button>
            </div>
        </div>

        <div id="dropdown-principal" class="hidden absolute right-3 top-[105%] w-48 bg-white rounded-xl shadow-xl border border-gray-200 overflow-hidden z-50">
            <a href="rastreo.html" class="block px-4 py-3 border-b border-gray-100 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 transition">
                <span class="text-lg">📍</span> Seguir Pedido
            </a>
            <a href="index.html" class="block px-4 py-3 border-b border-gray-100 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 transition">
                <span class="text-lg">🏪</span> Directorio
            </a>
            <a href="airbnb-host.html" class="block px-4 py-3 border-b border-gray-100 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 transition">
                <span class="text-lg">🏠</span> Panel Airbnb
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center border-t-8 border-tm-azul">
            <div class="text-6xl mb-4">🏠</div>
            <h1 class="text-2xl font-black text-tm-azul-oscuro mb-2">¡Bienvenido!</h1>
            <div id="loading" class="text-gray-500 animate-pulse">Detectando ubicación...</div>
            
            <div id="success-content" class="hidden">
                <p class="text-gray-600 text-sm mb-4">Estamos listos para entregarte en:</p>
                <div class="bg-blue-50 text-tm-azul font-black p-4 rounded-2xl mb-8 border border-blue-100" id="nombre-airbnb">...</div>
                <a href="index.html" class="block w-full bg-tm-dorado text-white font-black py-4 rounded-2xl shadow-lg transition hover:scale-105">
                    Ver Restaurantes
                </a>
            </div>

            <div id="error-content" class="hidden text-center">
                <p class="text-red-500 font-bold mb-4">Código QR no válido o expirado</p>
                <a href="index.html" class="text-sm underline text-tm-azul font-bold">Ir al directorio principal</a>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleMenuPrincipal() {
            document.getElementById('dropdown-principal').classList.toggle('hidden');
        }

        window.onload = async () => {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) { mostrarError(); return; }

            try {
                const { data, error } = await clienteSupabase.from('airbnbs').select('*').eq('id', id).single();
                if(data) {
                    localStorage.setItem('tm_airbnb_nombre', data.nombre_alojamiento);
                    localStorage.setItem('tm_airbnb_direccion', data.direccion_completa);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('success-content').classList.remove('hidden');
                    document.getElementById('nombre-airbnb').innerText = data.nombre_alojamiento;
                } else { mostrarError(); }
            } catch (err) { mostrarError(); }
        };

        function mostrarError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
