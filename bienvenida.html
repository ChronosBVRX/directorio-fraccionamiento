<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center border-t-8 border-[#22527b]">
        <div class="text-6xl mb-4">🏠</div>
        <h1 class="text-2xl font-black text-[#143653] mb-2">¡Bienvenido!</h1>
        <div id="loading" class="text-gray-500 animate-pulse">Detectando ubicación...</div>
        
        <div id="success-content" class="hidden">
            <p class="text-gray-600 text-sm mb-4">Estamos listos para entregarte en:</p>
            <div class="bg-blue-50 text-[#22527b] font-black p-4 rounded-2xl mb-8 border border-blue-100" id="nombre-airbnb">...</div>
            <a href="index.html" class="block w-full bg-[#d4af37] text-white font-black py-4 rounded-2xl shadow-lg transition hover:scale-105">
                Ver Restaurantes
            </a>
        </div>

        <div id="error-content" class="hidden">
            <p class="text-red-500 font-bold mb-4">QR no válido</p>
            <a href="index.html" class="text-sm underline text-tm-azul">Ir al directorio manual</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        
        // CORREGIDO: Usamos clienteSupabase para evitar errores de declaración
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async () => {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) { mostrarError(); return; }

            const { data, error } = await clienteSupabase.from('airbnbs').select('*').eq('id', id).single();
            if(data) {
                localStorage.setItem('tm_airbnb_nombre', data.nombre_alojamiento);
                localStorage.setItem('tm_airbnb_direccion', data.direccion_completa);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('success-content').classList.remove('hidden');
                document.getElementById('nombre-airbnb').innerText = data.nombre_alojamiento;
            } else { mostrarError(); }
        };
        function mostrarError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
