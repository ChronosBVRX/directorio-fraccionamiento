<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Repartidores - Vive Tres Marías</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border-t-4 border-tm-dorado">
        <div class="bg-tm-azul p-6 text-center text-white">
            <span class="text-5xl">🛵</span>
            <h1 id="titulo-principal" class="text-2xl font-black mt-2">App Repartidores</h1>
            <p id="subtitulo" class="text-blue-200 text-sm">Gana dinero entregando en Tres Marías</p>
        </div>

        <div class="p-8">
            <div id="auth-msg" class="hidden w-full p-3 rounded-lg mb-6 text-sm font-bold text-center"></div>

            <form id="form-repartidor" class="space-y-4">
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre Completo</label>
                    <input type="text" id="reg-nombre" required class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">WhatsApp</label>
                        <input type="tel" id="reg-telefono" placeholder="4431234567" required class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehículo</label>
                        <select id="reg-vehiculo" class="w-full p-3 bg-gray-50 border rounded-lg outline-none cursor-pointer">
                            <option value="Moto">Motocicleta</option>
                            <option value="Bici">Bicicleta</option>
                            <option value="Auto">Automóvil</option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <div id="seccion-auth" class="space-y-4">
                    <p class="text-xs text-gray-400 font-semibold italic text-center">Crea una cuenta nueva o inicia sesión si ya eres cliente</p>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Correo Electrónico</label>
                        <input type="email" id="reg-email" class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Contraseña</label>
                        <input type="password" id="reg-pass" minlength="6" class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-tm-azul hover:bg-tm-azul-oscuro text-white py-4 rounded-xl font-bold transition shadow-lg mt-4">
                    Registrarme como Repartidor
                </button>

                <p id="link-login" class="text-center text-sm text-gray-500 mt-4">
                    ¿Ya tienes cuenta de cliente? <a href="login.html" class="text-tm-dorado font-bold hover:underline">Inicia sesión primero</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Referencias de UI
        const authMsg = document.getElementById('auth-msg');
        const seccionAuth = document.getElementById('seccion-auth');
        const btnSubmit = document.getElementById('btn-submit');
        const tituloPrincipal = document.getElementById('titulo-principal');
        const subtitulo = document.getElementById('subtitulo');
        const linkLogin = document.getElementById('link-login');

        function mostrarMensaje(texto, esError) {
            authMsg.innerText = texto;
            authMsg.className = `w-full p-3 rounded-lg mb-6 text-sm font-bold text-center ${esError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            authMsg.classList.remove('hidden');
        }

        // 1. VERIFICAR SI EL USUARIO YA ESTÁ LOGUEADO (Como cliente)
        async function verificarEstadoSesion() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            
            if (session) {
                // Adaptar formulario para usuario existente
                seccionAuth.classList.add('hidden');
                linkLogin.classList.add('hidden');
                tituloPrincipal.innerText = "Activar Perfil de Reparto";
                subtitulo.innerText = "Completa los datos para tu cuenta actual";
                btnSubmit.innerText = "Confirmar y Activar Perfil";
                
                // Intentar pre-cargar el nombre si existe en metadata
                if (session.user.user_metadata?.nombre_completo) {
                    document.getElementById('reg-nombre').value = session.user.user_metadata.nombre_completo;
                }
            }
        }
        verificarEstadoSesion();

        // 2. PROCESAR EL FORMULARIO
        document.getElementById('form-repartidor').addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Procesando...";
            authMsg.classList.add('hidden');

            const nombre = document.getElementById('reg-nombre').value;
            const telefono = document.getElementById('reg-telefono').value;
            const vehiculo = document.getElementById('reg-vehiculo').value;

            try {
                let userId;
                const { data: { session } } = await clienteSupabase.auth.getSession();

                // CASO A: El usuario no ha iniciado sesión (Nueva cuenta)
                if (!session) {
                    const email = document.getElementById('reg-email').value;
                    const pass = document.getElementById('reg-pass').value;

                    if (!email || !pass) throw new Error("Debes ingresar correo y contraseña");

                    const { data: authData, error: authError } = await clienteSupabase.auth.signUp({
                        email,
                        password: pass,
                        options: { data: { nombre_completo: nombre } }
                    });

                    if (authError) throw authError;
                    userId = authData.user.id;
                } else {
                    // CASO B: El usuario ya está logueado (Usamos su ID actual)
                    userId = session.user.id;
                }

                // 3. INSERTAR DATOS EN LA TABLA REPARTIDORES
                const { error: dbError } = await clienteSupabase
                    .from('repartidores')
                    .insert([{
                        id: userId,
                        nombre: nombre,
                        telefono: telefono,
                        vehiculo: vehiculo
                    }]);

                if (dbError) {
                    // Manejar si el usuario ya es repartidor (ID duplicado)
                    if (dbError.code === "23505") throw new Error("Ya estás registrado como repartidor.");
                    throw dbError;
                }

                mostrarMensaje("¡Registro exitoso! Redirigiendo...", false);
                setTimeout(() => window.location.href = 'panel-repartidor.html', 2000);

            } catch (err) {
                mostrarMensaje(err.message, true);
                btnSubmit.disabled = false;
                btnSubmit.innerText = session ? "Confirmar y Activar Perfil" : "Registrarme como Repartidor";
            }
        });
    </script>
</body>
</html>
