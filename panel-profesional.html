<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Profesional - Vive Tres Marías</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37' } } } }
    </script>

    <style>
        .fc { background: white; border-radius: 1.5rem; padding: 1rem; border: 1px solid #e5e7eb; min-height: 600px; }
        .fc-event { cursor: pointer; border-radius: 6px; padding: 2px 4px; border: none !important; }
        .fc .fc-button-primary { background-color: #22527b !important; border-radius: 8px; border: none; font-weight: bold; }
    </style>
</head>

<body class="bg-gray-50 p-4 md:p-8">
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b pb-6">
        <div>
            <h2 class="text-3xl font-black text-tm-azul-oscuro">Panel de Consultorio 🩺</h2>
            <p class="text-sm text-gray-500">Gestión de agenda y bloqueos manuales.</p>
        </div>
        <div class="flex gap-2">
            <a href="index.html" class="bg-white border px-5 py-2.5 rounded-xl font-bold text-sm">🏠 Inicio</a>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                <div class="flex gap-2 mb-6 border-b pb-4">
                    <button onclick="switchTab('basico')" id="t-basico" class="flex-1 font-bold text-tm-azul border-b-2 border-tm-azul pb-2">Info</button>
                    <button onclick="switchTab('agenda')" id="t-agenda" class="flex-1 font-bold text-gray-400 pb-2">Agenda</button>
                </div>

                <div id="p-basico" class="space-y-4">
                    <input type="hidden" id="admin-negocio-id">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Consultorio</label>
                        <input type="text" id="admin-nombre" class="w-full p-4 bg-gray-50 rounded-2xl border outline-none focus:ring-2 focus:ring-tm-azul mt-1">
                    </div>
                    <button onclick="guardarNegocioSeguro()" class="w-full bg-tm-azul text-white py-4 rounded-2xl font-black shadow-lg">GUARDAR CAMBIOS</button>
                </div>

                <div id="p-agenda" class="hidden space-y-4">
                    <button onclick="document.getElementById('modal-bloqueo').classList.remove('hidden')" class="w-full bg-red-500 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-red-600 transition">
                        🛑 NUEVO BLOQUEO / CITA EXT.
                    </button>
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 text-[11px] text-blue-700">
                        <b>Tip:</b> Los bloqueos aparecen en rojo y las citas de la plataforma en azul. Haz clic en un evento para eliminarlo.
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div id="calendar"></div>
        </div>
    </div>

    <div id="modal-bloqueo" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black text-tm-azul-oscuro mb-2">Bloqueo Manual 🛑</h3>
            <div class="space-y-4 mt-4">
                <input type="text" id="b-titulo" placeholder="Ej: Cita Externa: Juan Pérez" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <input type="date" id="b-fecha" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Inicia</label>
                        <input type="time" id="b-inicio" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Termina</label>
                        <input type="time" id="b-fin" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                    </div>
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="document.getElementById('modal-bloqueo').classList.add('hidden')" class="flex-1 py-4 font-bold text-gray-400">Cerrar</button>
                <button onclick="ejecutarBloqueo()" class="flex-1 bg-tm-azul text-white py-4 rounded-2xl font-bold shadow-xl">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'TU_ANON_KEY';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let calendar = null;

        document.addEventListener("DOMContentLoaded", () => {
            sb.auth.onAuthStateChange((evt, session) => {
                if(session) {
                    const id = new URLSearchParams(window.location.search).get('id');
                    if(id) initPanel(id.replace('eq.', ''));
                } else { window.location.href = 'index.html'; }
            });
        });

        async function initPanel(id) {
            const { data: n } = await sb.from('anuncios').select('*').eq('id', id).single();
            if(n) {
                document.getElementById('admin-negocio-id').value = n.id;
                document.getElementById('admin-nombre').value = n.nombre_negocio;
                cargarCalendario(n.id);
            }
        }

        async function cargarCalendario(idN) {
            const { data: citas } = await sb.from('citas').select('*, perfiles:cliente_id(nombre_completo)').eq('anuncio_id', idN).neq('estado', 'cancelada');
            
            const events = (citas || []).map(c => ({
                id: c.id,
                title: c.estado === 'bloqueado' ? `🚫 ${c.notas}` : `✅ ${c.perfiles?.nombre_completo || 'Cita'}`,
                start: `${c.fecha_cita}T${c.hora_inicio}`,
                end: `${c.fecha_cita}T${c.hora_fin}`,
                backgroundColor: c.estado === 'bloqueado' ? '#ef4444' : '#22527b'
            }));

            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                locale: 'es', initialView: 'timeGridWeek', events,
                slotMinTime: '07:00:00', slotMaxTime: '21:00:00', allDaySlot: false,
                eventClick: (info) => {
                    if(confirm("¿Eliminar este registro?")) eliminarRegistro(info.event.id);
                }
            });
            calendar.render();
        }

        async function ejecutarBloqueo() {
            const payload = {
                anuncio_id: document.getElementById('admin-negocio-id').value,
                fecha: document.getElementById('b-fecha').value,
                hora_inicio: document.getElementById('b-inicio').value,
                hora_fin: document.getElementById('b-fin').value,
                titulo: document.getElementById('b-titulo').value
            };

            const { data, error } = await sb.functions.invoke('gestionar-agendas', { 
                body: { accion: 'bloquear_espacio', payload } 
            });

            if(!error) {
                document.getElementById('modal-bloqueo').classList.add('hidden');
                cargarCalendario(payload.anuncio_id);
                toast("Espacio Bloqueado");
            }
        }

        async function eliminarRegistro(id) {
            const { error } = await sb.functions.invoke('gestionar-agendas', { 
                body: { accion: 'cancelar_cita', payload: { cita_id: id } } 
            });
            if(!error) cargarCalendario(document.getElementById('admin-negocio-id').value);
        }

        function switchTab(t) {
            document.getElementById('p-basico').classList.toggle('hidden', t !== 'basico');
            document.getElementById('p-agenda').classList.toggle('hidden', t !== 'agenda');
            document.getElementById('t-basico').className = t === 'basico' ? 'flex-1 font-bold text-tm-azul border-b-2 border-tm-azul pb-2' : 'flex-1 font-bold text-gray-400 pb-2';
            document.getElementById('t-agenda').className = t === 'agenda' ? 'flex-1 font-bold text-tm-azul border-b-2 border-tm-azul pb-2' : 'flex-1 font-bold text-gray-400 pb-2';
            if(calendar) setTimeout(() => calendar.updateSize(), 100);
        }

        function toast(m) {
            const el = document.createElement('div');
            el.className = "bg-tm-azul-oscuro text-white px-6 py-3 rounded-xl shadow-xl font-bold text-xs";
            el.innerText = m;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
</body>
</html>
