<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Profesional - Vive Tres Marías</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } } }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .fc { font-family: 'Montserrat', sans-serif; background: white; border-radius: 1.5rem; padding: 1rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); min-height: 650px; border: 1px solid #e5e7eb; }
        .fc-event { cursor: pointer; border: none !important; padding: 4px 6px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .fc .fc-button-primary { background-color: #22527b !important; border: none; font-weight: bold; border-radius: 10px; }
        .fc-highlight { background: rgba(34, 82, 123, 0.2) !important; } /* Color de seleccion mejorado */
    </style>
</head>
<body class="bg-gray-50 font-sans text-tm-gris p-3 sm:p-4 md:p-8">
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div class="max-w-7xl mx-auto mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b pb-6">
        <div>
            <h2 class="text-3xl sm:text-4xl font-black text-tm-azul-oscuro">Panel de Consultorio 🩺</h2>
            <p class="text-sm text-gray-500 mt-1">Administra tus servicios y agenda en <b>Vive Tres Marías</b>.</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="bg-white border border-gray-200 text-gray-700 px-6 py-3 rounded-2xl font-bold text-sm">🏠 Inicio</a>
        </div>
    </div>

    <div id="si-auth" class="max-w-7xl mx-auto">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 overflow-hidden flex flex-col lg:flex-row min-h-[750px]">
            <div class="w-full lg:w-5/12 flex flex-col border-r bg-gray-50/30">
                <div class="flex gap-1 p-4 border-b bg-white overflow-x-auto scrollbar-hide">
                    <button onclick="cambiarPestana('basico')" id="tab-basico" class="font-bold text-sm text-tm-azul border-b-2 border-tm-azul px-4 py-2 whitespace-nowrap">Datos</button>
                    <button onclick="cambiarPestana('servicios')" id="tab-servicios" class="font-bold text-sm text-gray-400 px-4 py-2 whitespace-nowrap">Servicios</button>
                    <button onclick="cambiarPestana('agenda')" id="tab-agenda" class="font-bold text-sm text-gray-400 px-4 py-2 whitespace-nowrap">Mi Calendario</button>
                </div>

                <div class="p-6 flex-grow overflow-y-auto">
                    <div id="panel-basico" class="space-y-5">
                        <input type="hidden" id="admin-negocio-id">
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Nombre Comercial</label>
                            <input type="text" id="admin-nombre" class="w-full p-4 bg-white border rounded-2xl mt-1 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">WhatsApp</label>
                            <input type="number" id="admin-wa" class="w-full p-4 bg-white border rounded-2xl mt-1 outline-none">
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                            <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Horarios</h4>
                            <div id="contenedor-horarios" class="space-y-3"></div>
                        </div>
                        <button onclick="guardarNegocioSeguro()" class="w-full bg-tm-dorado text-white py-5 rounded-2xl font-black shadow-xl">GUARDAR CAMBIOS</button>
                    </div>

                    <div id="panel-servicios" class="hidden space-y-6">
                        <div class="bg-tm-azul-oscuro p-6 rounded-[2rem] text-white">
                            <h4 class="font-bold mb-4">✨ Crear Servicio</h4>
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <input type="text" id="serv-nombre" placeholder="Nombre" class="p-4 rounded-xl bg-white/10 border text-sm outline-none">
                                <input type="number" id="serv-precio" placeholder="Precio $" class="p-4 rounded-xl bg-white/10 border text-sm outline-none">
                            </div>
                            <input type="number" id="serv-duracion" placeholder="Minutos (Ej: 60)" class="w-full p-4 rounded-xl bg-white/10 border text-sm mb-4 outline-none">
                            <button onclick="agregarServicio()" class="w-full bg-tm-dorado text-tm-azul-oscuro py-4 rounded-xl font-black text-sm uppercase">Añadir</button>
                        </div>
                        <div id="lista-servicios" class="space-y-3"></div>
                    </div>

                    <div id="panel-agenda" class="hidden space-y-4">
                        <button onclick="document.getElementById('modal-bloqueo').classList.remove('hidden')" class="w-full bg-red-500 text-white p-5 rounded-[2rem] font-black shadow-lg">
                            🛑 REGISTRAR CITA EXTERNA / BLOQUEO
                        </button>
                        <p class="text-xs text-center text-gray-500 italic mt-2">💡 Tip: Puedes arrastrar directamente en el calendario para bloquear horarios de forma rápida.</p>
                        <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mt-6 ml-1">Próximas Citas</h4>
                        <div id="lista-citas-negocio" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-7/12 bg-gray-50/50 p-4 md:p-8 flex flex-col">
                <div id="calendar" class="h-full"></div>
            </div>
        </div>
    </div>

    <div id="modal-bloqueo" class="hidden fixed inset-0 bg-tm-azul-oscuro/80 z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black text-tm-azul-oscuro mb-2">Reserva Manual 🛑</h3>
            <div class="space-y-4">
                <input type="text" id="bloqueo-titulo" placeholder="Nombre o Motivo" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <input type="date" id="bloqueo-fecha" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="time" id="bloqueo-inicio" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                    <input type="time" id="bloqueo-fin" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="document.getElementById('modal-bloqueo').classList.add('hidden')" class="flex-1 py-4 font-bold text-gray-400">Cerrar</button>
                <button onclick="guardarBloqueo()" class="flex-1 bg-tm-azul text-white py-4 rounded-2xl font-bold shadow-xl">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let calendar = null;
        let horariosGlobal = {}; // Variable para guardar el estado de los horarios actual
        const DIAS = { 1:'Lunes', 2:'Martes', 3:'Miércoles', 4:'Jueves', 5:'Viernes', 6:'Sábado', 0:'Domingo' };

        document.addEventListener("DOMContentLoaded", () => {
            renderizarUIHorarios();
            clienteSupabase.auth.onAuthStateChange((event, session) => {
                if (session) {
                    let idUrl = new URLSearchParams(window.location.search).get('id');
                    if (idUrl) cargarTodo(idUrl.replace('eq.', ''));
                } else { window.location.href = 'index.html'; }
            });
        });

        async function cargarTodo(id) {
            const { data: n } = await clienteSupabase.from('anuncios').select('*').eq('id', id).single();
            if (n) {
                document.getElementById('admin-negocio-id').value = n.id;
                document.getElementById('admin-nombre').value = n.nombre_negocio || '';
                document.getElementById('admin-wa').value = n.enlace_whatsapp || '';
                if (n.horarios) {
                    horariosGlobal = n.horarios;
                    setearHorariosUI(n.horarios);
                }
                cargarServicios(n.id);
                cargarAgendaYCalendario(n.id);
            }
        }

        async function cargarServicios(idN) {
            const { data } = await clienteSupabase.from('servicios').select('*').eq('anuncio_id', idN);
            document.getElementById('lista-servicios').innerHTML = (data || []).map(s => `
                <div class="flex justify-between items-center p-5 bg-white border rounded-2xl shadow-sm">
                    <div><p class="font-bold text-tm-azul-oscuro">${s.nombre}</p><p class="text-[10px] text-gray-400 font-bold">${s.duracion_minutos} MIN • $${s.precio}</p></div>
                    <button onclick="eliminarServicio('${s.id}')" class="text-red-500 font-bold text-[10px] bg-red-50 px-4 py-2 rounded-xl">Borrar</button>
                </div>
            `).join('');
        }

        async function agregarServicio() {
            const idN = document.getElementById('admin-negocio-id').value;
            const p = { anuncio_id: idN, nombre: document.getElementById('serv-nombre').value, precio: parseFloat(document.getElementById('serv-precio').value) || 0, duracion_minutos: parseInt(document.getElementById('serv-duracion').value) || 60 };
            const { error } = await clienteSupabase.from('servicios').insert([p]);
            if (!error) { notificar("Servicio Creado"); cargarServicios(idN); }
        }
        
        async function eliminarServicio(id) {
            if(confirm('¿Eliminar servicio?')) {
                await clienteSupabase.from('servicios').delete().eq('id', id);
                cargarServicios(document.getElementById('admin-negocio-id').value);
                notificar("Servicio eliminado");
            }
        }

        async function cargarAgendaYCalendario(idN) {
            const { data } = await clienteSupabase.from('citas').select('*, perfiles:cliente_id(nombre_completo)').eq('anuncio_id', idN).neq('estado', 'cancelada');
            const eventos = (data || []).map(c => ({
                id: c.id,
                title: c.estado === 'bloqueado' ? `🛑 ${c.notas}` : `✅ ${c.perfiles?.nombre_completo || 'Cita'}`,
                start: `${c.fecha_cita}T${c.hora_inicio}`,
                end: `${c.fecha_cita}T${c.hora_fin}`,
                backgroundColor: c.estado === 'bloqueado' ? '#ef4444' : '#22527b'
            }));

            // Calcular limites de hora dinámicos y días ocultos basados en los horarios guardados
            let slotMin = '06:00:00';
            let slotMax = '22:00:00';
            let diasOcultos = [];

            if (horariosGlobal && Object.keys(horariosGlobal).length > 0) {
                let minMinutos = 24 * 60;
                let maxMinutos = 0;
                
                [0, 1, 2, 3, 4, 5, 6].forEach(d => {
                    if (horariosGlobal[d] && horariosGlobal[d].abierto) {
                        let abreArr = horariosGlobal[d].abre.split(':');
                        let cierraArr = horariosGlobal[d].cierra.split(':');
                        let minsAbre = parseInt(abreArr[0]) * 60 + parseInt(abreArr[1]);
                        let minsCierra = parseInt(cierraArr[0]) * 60 + parseInt(cierraArr[1]);
                        
                        if (minsAbre < minMinutos) minMinutos = minsAbre;
                        if (minsCierra > maxMinutos) maxMinutos = minsCierra;
                    } else {
                        diasOcultos.push(d); // Si está cerrado, lo agregamos a diasOcultos
                    }
                });

                if (minMinutos < 24 * 60) {
                    slotMin = `${String(Math.floor(minMinutos/60)).padStart(2,'0')}:${String(minMinutos%60).padStart(2,'0')}:00`;
                }
                if (maxMinutos > 0) {
                    slotMax = `${String(Math.floor(maxMinutos/60)).padStart(2,'0')}:${String(maxMinutos%60).padStart(2,'0')}:00`;
                }
            }

            if (calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                locale: 'es', 
                initialView: 'timeGridWeek', 
                events: eventos,
                slotMinTime: slotMin, 
                slotMaxTime: slotMax, 
                hiddenDays: diasOcultos, // Ocultar días que el negocio no abre
                height: 'auto',
                selectable: true, // Permitir selección arrastrando
                selectMirror: true,
                select: function(info) {
                    abrirModalBloqueoDeCalendario(info.startStr, info.endStr);
                    calendar.unselect();
                },
                eventClick: (info) => { if (confirm("¿Eliminar registro?")) cancelarCitaOwner(info.event.id); }
            });
            calendar.render();
        }

        // Nueva función para pre-rellenar el formulario desde el click en el calendario
        function abrirModalBloqueoDeCalendario(startStr, endStr) {
            // startStr usualmente viene como "YYYY-MM-DDTHH:mm:ss"
            const startParts = startStr.split('T');
            const endParts = endStr.split('T');

            document.getElementById('bloqueo-fecha').value = startParts[0];

            if (startParts.length > 1) {
                document.getElementById('bloqueo-inicio').value = startParts[1].substring(0, 5);
            }
            if (endParts.length > 1) {
                document.getElementById('bloqueo-fin').value = endParts[1].substring(0, 5);
            }
            
            document.getElementById('bloqueo-titulo').value = ''; // Limpiar el titulo anterior
            document.getElementById('modal-bloqueo').classList.remove('hidden');
        }

        async function guardarBloqueo() {
            const idN = document.getElementById('admin-negocio-id').value;
            const payload = {
                anuncio_id: idN,
                fecha: document.getElementById('bloqueo-fecha').value,
                hora_inicio: document.getElementById('bloqueo-inicio').value,
                hora_fin: document.getElementById('bloqueo-fin').value,
                titulo: document.getElementById('bloqueo-titulo').value || 'Reserva Manual'
            };
            const { error } = await clienteSupabase.functions.invoke('gestionar-agendas', { body: { accion: 'bloquear_espacio', payload } });
            if (!error) {
                notificar("Registrado ✅");
                document.getElementById('modal-bloqueo').classList.add('hidden');
                cargarAgendaYCalendario(idN);
            } else { alert("Error: No se pudo guardar. Revisa que el cliente_id y servicio_id en tu DB permitan nulos."); }
        }

        async function cancelarCitaOwner(id) {
            const { error } = await clienteSupabase.functions.invoke('gestionar-agendas', { body: { accion: 'cancelar_cita', payload: { cita_id: id } } });
            if (!error) { notificar("Eliminado"); cargarAgendaYCalendario(document.getElementById('admin-negocio-id').value); }
        }

        function cambiarPestana(tab) {
            ['basico', 'servicios', 'agenda'].forEach(t => {
                document.getElementById('panel-'+t).classList.add('hidden');
                document.getElementById('tab-'+t).className = "font-bold text-sm text-gray-400 px-4 py-2 whitespace-nowrap";
            });
            document.getElementById('panel-'+tab).classList.remove('hidden');
            document.getElementById('tab-'+tab).className = "font-bold text-sm text-tm-azul border-b-2 border-tm-azul px-4 py-2 whitespace-nowrap";
            if (calendar) setTimeout(() => calendar.updateSize(), 100);
        }

        function renderizarUIHorarios() {
            document.getElementById('contenedor-horarios').innerHTML = [1,2,3,4,5,6,0].map(d => `
                <div class="flex items-center justify-between gap-2 p-2.5 bg-gray-50 rounded-xl border">
                    <label class="flex items-center gap-2 w-28 cursor-pointer">
                        <input type="checkbox" class="dia-abierto w-4 h-4 text-tm-azul rounded" checked>
                        <span class="text-[11px] font-black text-tm-azul-oscuro uppercase">${DIAS[d]}</span>
                    </label>
                    <div class="flex items-center gap-1">
                        <input type="time" class="hora-abre p-1 border rounded-lg text-[10px] w-full" value="09:00">
                        <input type="time" class="hora-cierra p-1 border rounded-lg text-[10px] w-full" value="18:00">
                    </div>
                </div>
            `).join('');
        }

        function setearHorariosUI(hJSON) {
            [1,2,3,4,5,6,0].forEach((d, idx) => {
                const r = document.querySelectorAll('#contenedor-horarios > div')[idx];
                if (hJSON[d]) {
                    r.querySelector('.dia-abierto').checked = hJSON[d].abierto;
                    r.querySelector('.hora-abre').value = hJSON[d].abre;
                    r.querySelector('.hora-cierra').value = hJSON[d].cierra;
                }
            });
        }

        async function guardarNegocioSeguro() {
            const id = document.getElementById('admin-negocio-id').value;
            let h = {};
            [1,2,3,4,5,6,0].forEach((d, idx) => {
                const r = document.querySelectorAll('#contenedor-horarios > div')[idx];
                h[d] = { abierto: r.querySelector('.dia-abierto').checked, abre: r.querySelector('.hora-abre').value, cierra: r.querySelector('.hora-cierra').value };
            });
            const { error } = await clienteSupabase.from('anuncios').update({ nombre_negocio: document.getElementById('admin-nombre').value, enlace_whatsapp: document.getElementById('admin-wa').value, horarios: h }).eq('id', id);
            
            if (!error) { 
                notificar("Guardado ✅");
                horariosGlobal = h; // Actualizar variable global
                cargarAgendaYCalendario(id); // Recargar calendario para aplicar las restricciones de dias/horas visuales
            }
        }

        function notificar(m) {
            const el = document.createElement('div');
            el.className = "bg-tm-azul-oscuro text-white px-6 py-4 rounded-2xl shadow-xl font-black text-xs uppercase animate-bounce";
            el.innerText = m;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
</body>
</html>
