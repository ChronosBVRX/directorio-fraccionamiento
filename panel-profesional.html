<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Profesional - Vive Tres Marías</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/es.global.min.js'></script>

    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] }, 
                    colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37' } 
                } 
            } 
        }
    </script>
    <style>
        .fc { background: white; border-radius: 1rem; padding: 1rem; min-height: 500px; }
        .fc-event { cursor: pointer; transition: opacity 0.2s; }
        .fc-event:hover { opacity: 0.8; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-700 p-4 md:p-8">

    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div id="si-auth" class="max-w-7xl mx-auto">
        <div class="mb-8 flex flex-col sm:row sm:items-center justify-between gap-4 border-b pb-6">
            <div>
                <h2 class="text-3xl font-black text-tm-azul-oscuro">Panel de Consultorio 🩺</h2>
                <p class="text-gray-500">Gestiona tus servicios y agenda en tiempo real.</p>
            </div>
            <button onclick="guardarNegocioSeguro()" id="btn-guardar-admin" class="bg-tm-dorado hover:bg-yellow-600 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg">
                Guardar Cambios
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden flex flex-col lg:flex-row min-h-[700px]">
            <div class="w-full lg:w-1/2 border-r border-gray-100 flex flex-col">
                <div class="flex gap-1 p-4 border-b bg-gray-50 overflow-x-auto">
                    <button onclick="cambiarPestana('basico')" id="tab-basico" class="px-4 py-2 font-bold text-tm-azul border-b-2 border-tm-azul">Datos</button>
                    <button onclick="cambiarPestana('servicios')" id="tab-servicios" class="px-4 py-2 font-bold text-gray-400">Servicios</button>
                    <button onclick="cambiarPestana('agenda')" id="tab-agenda" class="px-4 py-2 font-bold text-gray-400">Calendario</button>
                </div>

                <div class="p-6 flex-grow overflow-y-auto">
                    <div id="panel-basico" class="space-y-4">
                        <input type="hidden" id="admin-negocio-id">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">Nombre del Consultorio</label>
                            <input type="text" id="admin-nombre" class="w-full p-3 bg-gray-50 border rounded-xl mt-1 outline-none focus:border-tm-azul">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">WhatsApp</label>
                            <input type="number" id="admin-wa" class="w-full p-3 bg-gray-50 border rounded-xl mt-1 outline-none">
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200">
                            <h4 class="text-xs font-bold text-gray-500 uppercase mb-3">Horarios de Atención</h4>
                            <div id="contenedor-horarios" class="space-y-2"></div>
                        </div>
                    </div>

                    <div id="panel-servicios" class="hidden space-y-4">
                        <div class="bg-tm-azul-oscuro p-4 rounded-2xl text-white">
                            <h4 class="font-bold mb-3 text-sm">Añadir Nuevo Servicio</h4>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <input type="text" id="serv-nombre" placeholder="Nombre (Ej: Consulta)" class="p-2 rounded bg-white/10 border border-white/20 text-sm">
                                <input type="number" id="serv-precio" placeholder="Precio $" class="p-2 rounded bg-white/10 border border-white/20 text-sm">
                            </div>
                            <input type="number" id="serv-duracion" placeholder="Duración (minutos)" class="w-full p-2 rounded bg-white/10 border border-white/20 text-sm mb-2">
                            <button onclick="agregarServicioSeguro()" class="w-full bg-tm-dorado py-2 rounded-xl font-bold text-sm">Insertar Servicio</button>
                        </div>
                        <div id="lista-servicios" class="space-y-2"></div>
                    </div>

                    <div id="panel-agenda" class="hidden space-y-4">
                        <button onclick="abrirModalBloqueo()" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold flex items-center justify-center gap-2">
                            🛑 Bloquear Fecha / Consulta Externa
                        </button>
                        <div id="lista-citas-negocio" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <div id="panel-derecho" class="w-full lg:w-1/2 bg-gray-100 p-4 flex flex-col">
                <div id="contenedor-calendario-full" class="hidden flex-grow bg-white rounded-2xl shadow-inner p-2">
                    <div id="calendar"></div>
                </div>
                <div id="preview-placeholder" class="flex flex-col items-center justify-center h-full text-gray-400">
                    <p class="font-bold">Vista Previa del Calendario</p>
                    <p class="text-xs">Selecciona la pestaña "Calendario" para gestionar citas.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-bloqueo" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black text-tm-azul-oscuro mb-4">Bloquear Espacio 🛑</h3>
            <div class="space-y-3">
                <input type="text" id="bloqueo-titulo" placeholder="Motivo o Nombre Paciente Externo" class="w-full p-3 bg-gray-50 border rounded-xl">
                <input type="date" id="bloqueo-fecha" class="w-full p-3 bg-gray-50 border rounded-xl">
                <div class="grid grid-cols-2 gap-2">
                    <input type="time" id="bloqueo-inicio" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <input type="time" id="bloqueo-fin" class="w-full p-3 bg-gray-50 border rounded-xl">
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="document.getElementById('modal-bloqueo').classList.add('hidden')" class="flex-1 py-3 font-bold text-gray-500">Cancelar</button>
                <button onclick="guardarBloqueo()" class="flex-1 bg-tm-azul text-white py-3 rounded-xl font-bold">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'TU_ANON_KEY'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let calendar = null;
        let usuarioActual = null;
        const DIAS = { 1:'Lunes', 2:'Martes', 3:'Miércoles', 4:'Jueves', 5:'Viernes', 6:'Sábado', 0:'Domingo' };

        // Inicialización
        document.addEventListener("DOMContentLoaded", () => {
            renderizarUIHorarios();
            clienteSupabase.auth.onAuthStateChange((event, session) => {
                if (session) {
                    usuarioActual = session.user;
                    const urlParams = new URLSearchParams(window.location.search);
                    const idNegocio = urlParams.get('id');
                    if (idNegocio) cargarDatosProfesional(idNegocio);
                }
            });
        });

        function renderizarUIHorarios() {
            document.getElementById('contenedor-horarios').innerHTML = Object.keys(DIAS).map(d => `
                <div class="flex items-center justify-between gap-2 text-sm">
                    <label class="flex items-center gap-2 w-28">
                        <input type="checkbox" class="dia-abierto rounded text-tm-azul" checked>
                        <span class="font-bold">${DIAS[d]}</span>
                    </label>
                    <div class="flex items-center gap-1">
                        <input type="time" class="hora-abre border rounded p-1 text-xs" value="09:00">
                        <span>-</span>
                        <input type="time" class="hora-cierra border rounded p-1 text-xs" value="18:00">
                    </div>
                </div>
            `).join('');
        }

        async function cargarDatosProfesional(id) {
            const { data } = await clienteSupabase.from('anuncios').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('admin-negocio-id').value = data.id;
                document.getElementById('admin-nombre').value = data.nombre_negocio;
                document.getElementById('admin-wa').value = data.enlace_whatsapp;
                cargarServicios(data.id);
                cargarAgendaYCalendario(data.id);
            }
        }

        async function cargarServicios(idN) {
            const { data } = await clienteSupabase.from('servicios').select('*').eq('anuncio_id', idN);
            const l = document.getElementById('lista-servicios');
            l.innerHTML = data.map(s => `
                <div class="flex justify-between items-center p-3 bg-white border rounded-xl shadow-sm">
                    <div>
                        <p class="font-bold text-sm">${s.nombre}</p>
                        <p class="text-[10px] text-gray-500">${s.duracion_minutos} min | $${s.precio}</p>
                    </div>
                    <button onclick="eliminarServicio('${s.id}')" class="text-red-500 font-bold text-xs">Eliminar</button>
                </div>
            `).join('');
        }

        async function agregarServicioSeguro() {
            const idN = document.getElementById('admin-negocio-id').value;
            const payload = {
                anuncio_id: idN,
                nombre: document.getElementById('serv-nombre').value,
                precio: parseFloat(document.getElementById('serv-precio').value) || 0,
                duracion_minutos: parseInt(document.getElementById('serv-duracion').value) || 60
            };
            const { error } = await clienteSupabase.from('servicios').insert([payload]);
            if (!error) {
                mostrarNotificacion("Servicio añadido");
                cargarServicios(idN);
            }
        }

        async function eliminarServicio(id) {
            if (!confirm("¿Borrar servicio?")) return;
            await clienteSupabase.from('servicios').delete().eq('id', id);
            cargarServicios(document.getElementById('admin-negocio-id').value);
        }

        async function cargarAgendaYCalendario(idN) {
            const { data } = await clienteSupabase.from('citas')
                .select('*, perfiles:cliente_id(nombre_completo)')
                .eq('anuncio_id', idN)
                .neq('estado', 'cancelada');

            const eventos = data.map(c => ({
                id: c.id,
                title: c.estado === 'bloqueado' ? `🛑 ${c.notas}` : `✅ ${c.perfiles?.nombre_completo || 'Cita'}`,
                start: `${c.fecha_cita}T${c.hora_inicio}`,
                end: `${c.fecha_cita}T${c.hora_fin}`,
                backgroundColor: c.estado === 'bloqueado' ? '#ef4444' : '#22527b',
                borderColor: 'transparent'
            }));

            if (calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                locale: 'es',
                initialView: 'timeGridWeek',
                slotMinTime: '07:00:00',
                events: eventos,
                eventClick: (info) => { if(confirm("¿Eliminar este registro?")) cancelarCitaOwner(info.event.id); }
            });
            calendar.render();
        }

        async function guardarBloqueo() {
            const payload = {
                anuncio_id: document.getElementById('admin-negocio-id').value,
                fecha: document.getElementById('bloqueo-fecha').value,
                hora_inicio: document.getElementById('bloqueo-inicio').value,
                hora_fin: document.getElementById('bloqueo-fin').value,
                titulo: document.getElementById('bloqueo-titulo').value
            };
            await clienteSupabase.functions.invoke('gestionar-agendas', { body: { accion: 'bloquear_espacio', payload } });
            document.getElementById('modal-bloqueo').classList.add('hidden');
            cargarAgendaYCalendario(payload.anuncio_id);
        }

        async function cancelarCitaOwner(id) {
            await clienteSupabase.functions.invoke('gestionar-agendas', { body: { accion: 'cancelar_cita', payload: { cita_id: id } } });
            cargarAgendaYCalendario(document.getElementById('admin-negocio-id').value);
        }

        function cambiarPestana(p) {
            ['basico', 'servicios', 'agenda'].forEach(t => {
                document.getElementById('panel-'+t).classList.add('hidden');
                document.getElementById('tab-'+t).classList.remove('text-tm-azul', 'border-b-2');
            });
            document.getElementById('panel-'+p).classList.remove('hidden');
            document.getElementById('tab-'+p).classList.add('text-tm-azul', 'border-b-2');

            if (p === 'agenda') {
                document.getElementById('contenedor-calendario-full').classList.remove('hidden');
                document.getElementById('preview-placeholder').classList.add('hidden');
                setTimeout(() => calendar.updateSize(), 100);
            }
        }

        function mostrarNotificacion(m) {
            const el = document.createElement('div');
            el.className = "bg-tm-azul-oscuro text-white px-6 py-3 rounded-xl shadow-2xl";
            el.innerText = m;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
</body>
</html>
