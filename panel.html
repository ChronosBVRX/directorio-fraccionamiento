<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
          theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-azul-oscuro': '#143653', 'tm-dorado': '#d4af37', 'tm-gris': '#4b5563' } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-tm-gris p-4 md:p-8">

    <div id="no-auth" class="flex flex-col items-center justify-center h-[70vh] text-center hidden">
        <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <h2 class="text-2xl font-bold text-tm-azul-oscuro mb-2">Acceso Denegado</h2>
        <p class="text-gray-500">Por favor inicia sesión en la página principal para acceder a tu panel de control.</p>
    </div>

    <div id="si-auth" class="hidden max-w-5xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-tm-azul-oscuro">Mis Negocios</h1>
                <p class="text-sm text-gray-500 mt-1">Administra la información que ven tus clientes.</p>
            </div>
            <button onclick="abrirModalNegocio()" class="bg-tm-azul text-white px-5 py-2.5 rounded-lg shadow hover:bg-tm-azul-oscuro font-bold">+ Nuevo Negocio (Gratis)</button>
        </div>

        <div id="contenedor-mis-negocios" class="grid grid-cols-1 gap-5">
            <div class="text-center py-10 text-gray-400">Cargando tus negocios...</div>
        </div>
    </div>

    <div id="modal-negocio" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-8 max-w-lg w-full relative max-h-[90vh] overflow-y-auto">
            <button onclick="cerrarModalNegocio()" class="absolute top-4 right-4 text-2xl font-bold text-gray-400 hover:text-black">&times;</button>
            <h2 class="text-2xl font-black text-tm-azul mb-4" id="titulo-modal-negocio">Datos de tu Negocio</h2>
            
            <form onsubmit="event.preventDefault(); guardarNegocio();" class="space-y-4">
                <input type="hidden" id="neg-id">
                
                <div>
                    <label class="text-xs font-bold uppercase text-gray-500">Nombre *</label>
                    <input type="text" id="neg-nombre" required class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none">
                </div>
                
                <div>
                    <label class="text-xs font-bold uppercase text-gray-500">Categoría *</label>
                    <select id="neg-categoria" class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none">
                        <option>Alimentos</option><option>Servicios</option><option>Salud</option><option>Hogar</option>
                    </select>
                </div>
                
                <div>
                    <label class="text-xs font-bold uppercase text-gray-500">Descripción Corta *</label>
                    <textarea id="neg-desc" required rows="2" class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none"></textarea>
                </div>
                
                <div>
                    <label class="text-xs font-bold uppercase text-gray-500">Dirección Física</label>
                    <input type="text" id="neg-dir" placeholder="Ej. Av. Principal 123" class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-500">Horarios</label>
                        <input type="text" id="neg-horario" placeholder="Ej. L-V 9am a 6pm" class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-500">WhatsApp *</label>
                        <input type="number" id="neg-wa" placeholder="Solo números" required class="w-full p-2.5 bg-gray-50 border rounded mt-1 focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                </div>
                
                <div id="campo-imagen" class="hidden bg-blue-50 p-4 rounded-lg border border-blue-100 mt-2">
                    <label class="text-xs font-bold uppercase text-tm-azul">URL de Imagen (Desbloqueado Nivel 1+)</label>
                    <input type="url" id="neg-img" placeholder="https://..." class="w-full p-2 bg-white border rounded mt-2 focus:ring-2 focus:ring-tm-azul outline-none">
                </div>

                <button type="submit" id="neg-btn-submit" class="w-full bg-tm-dorado hover:bg-yellow-600 text-white py-3.5 rounded-lg font-bold mt-6 transition shadow-md">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (Se comparte gracias a que está en el mismo dominio)
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM'; 
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_WA = '4430000000'; // Tu número para ventas de nivel

        let usuarioActual = null;

        // AUTH LISTENER PARA EL IFRAME
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            usuarioActual = session ? session.user : null;
            if(usuarioActual) {
                document.getElementById('no-auth').classList.add('hidden');
                document.getElementById('si-auth').classList.remove('hidden');
                cargarMisNegocios();
            } else {
                document.getElementById('no-auth').classList.remove('hidden');
                document.getElementById('si-auth').classList.add('hidden');
            }
        });

        // CARGAR NEGOCIOS DEL USUARIO LOGUEADO
        async function cargarMisNegocios() {
            const { data, error } = await clienteSupabase
                .from('anuncios')
                .select('*')
                .eq('user_id', usuarioActual.id)
                .order('id', { ascending: false });
            
            const contenedor = document.getElementById('contenedor-mis-negocios');
            
            if (error || !data || data.length === 0) {
                contenedor.innerHTML = `<div class="bg-white p-10 rounded-xl border border-dashed border-gray-300 text-center"><p class="text-gray-500">Aún no has publicado ningún negocio.</p></div>`;
                return;
            }

            contenedor.innerHTML = data.map(n => `
                <div class="bg-white p-5 md:p-6 rounded-xl border shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:shadow-md transition">
                    <div class="flex-grow">
                        <div class="flex items-center gap-3">
                            <h3 class="font-bold text-xl text-tm-azul-oscuro">${n.nombre_negocio}</h3>
                            <span class="bg-gray-100 text-gray-600 border border-gray-200 text-[10px] uppercase tracking-wider px-2 py-1 rounded font-bold">Nivel ${n.nivel_pago}</span>
                        </div>
                        <p class="text-sm text-gray-500 mt-2 line-clamp-2">${n.descripcion}</p>
                    </div>
                    
                    <div class="flex gap-2 w-full md:w-auto shrink-0">
                        <button onclick='editarNegocio(${JSON.stringify(n).replace(/'/g, "&apos;")})' class="flex-1 md:flex-none border-2 border-tm-azul text-tm-azul px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-50 transition">Editar</button>
                        <a href="https://wa.me/${ADMIN_WA}?text=Hola,%20quiero%20mejorar%20el%20nivel%20de%20mi%20negocio%20'${n.nombre_negocio}'%20en%20Vive%20Tres%20Marias." target="_blank" class="flex-1 md:flex-none bg-tm-dorado hover:bg-yellow-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition text-center shadow-sm flex items-center justify-center gap-1">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                            Mejorar Nivel
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // LÓGICA DE FORMULARIO
        function abrirModalNegocio() {
            document.getElementById('modal-negocio').classList.remove('hidden');
            document.getElementById('titulo-modal-negocio').innerText = "Nuevo Negocio";
            document.querySelector('#modal-negocio form').reset();
            document.getElementById('neg-id').value = '';
            document.getElementById('campo-imagen').classList.add('hidden'); // Oculto en Nivel 0
        }

        function editarNegocio(n) {
            abrirModalNegocio();
            document.getElementById('titulo-modal-negocio').innerText = "Editar Negocio";
            document.getElementById('neg-id').value = n.id;
            document.getElementById('neg-nombre').value = n.nombre_negocio || '';
            document.getElementById('neg-categoria').value = n.categoria || 'Servicios';
            document.getElementById('neg-desc').value = n.descripcion || '';
            document.getElementById('neg-dir').value = n.direccion || '';
            document.getElementById('neg-horario').value = n.horarios || '';
            document.getElementById('neg-wa').value = n.enlace_whatsapp || '';
            
            // Si el negocio tiene nivel 1 o más, le mostramos el campo de imagen
            if(n.nivel_pago >= 1) {
                document.getElementById('campo-imagen').classList.remove('hidden');
                document.getElementById('neg-img').value = n.imagen_url || '';
            } else {
                document.getElementById('campo-imagen').classList.add('hidden');
            }
        }

        function cerrarModalNegocio() { document.getElementById('modal-negocio').classList.add('hidden'); }

        async function guardarNegocio() {
            const btn = document.getElementById('neg-btn-submit');
            btn.disabled = true; btn.innerText = "Guardando...";
            
            const id = document.getElementById('neg-id').value;
            const payload = {
                nombre_negocio: document.getElementById('neg-nombre').value,
                categoria: document.getElementById('neg-categoria').value,
                descripcion: document.getElementById('neg-desc').value,
                direccion: document.getElementById('neg-dir').value,
                horarios: document.getElementById('neg-horario').value,
                enlace_whatsapp: document.getElementById('neg-wa').value,
                imagen_url: document.getElementById('neg-img')?.value || null
            };

            try {
                if (id) {
                    const { error } = await clienteSupabase.from('anuncios').update(payload).eq('id', id);
                    if(error) throw error;
                } else {
                    payload.user_id = usuarioActual.id;
                    payload.nivel_pago = 0; // Por defecto
                    const { error } = await clienteSupabase.from('anuncios').insert([payload]);
                    if(error) throw error;
                }
                cerrarModalNegocio();
                cargarMisNegocios(); // Recargar la lista en el panel
            } catch (error) {
                alert("Hubo un problema al guardar: " + error.message);
            } finally {
                btn.disabled = false; btn.innerText = "Guardar Cambios";
            }
        }
    </script>
</body>
</html>
