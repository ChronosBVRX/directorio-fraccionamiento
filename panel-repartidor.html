<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Repartidor - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-dorado': '#d4af37' } } } }
    </script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <header class="bg-tm-azul text-white p-4 flex justify-between items-center shadow-md z-10 relative">
        <div>
            <h1 class="font-black text-lg leading-tight">App Repartidor</h1>
            <button onclick="abrirPerfil()" class="text-xs text-blue-200 hover:text-white transition flex items-center gap-1 mt-0.5">
                <span id="nombre-repartidor">Cargando...</span>
                <span>✏️</span>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <span id="estado-texto" class="font-bold text-sm text-red-300 transition-colors">Desconectado</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="toggle-estado" class="sr-only peer" onchange="cambiarEstado()">
                <div class="w-11 h-6 bg-gray-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
            </label>
            <button onclick="cerrarSesion()" class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded font-bold transition">Salir</button>
        </div>
    </header>

    <main class="flex-grow p-4 overflow-y-auto w-full max-w-md mx-auto relative">
        
        <div id="vista-pendientes" class="block">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm flex items-center justify-between">
                <span>Mis Pedidos Asignados</span>
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-tm-dorado opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-tm-dorado"></span>
                </span>
            </h2>
            <div id="contenedor-pedidos" class="space-y-4">
                <p class="text-center text-gray-400 mt-10 text-sm">Conéctate para ver si te asignaron un viaje...</p>
            </div>
        </div>

        <div id="vista-activo" class="hidden h-full flex flex-col">
            <div class="bg-white rounded-2xl shadow-xl border-t-4 border-tm-azul overflow-hidden flex-grow flex flex-col">
                <div class="p-6 bg-blue-50 border-b text-center">
                    <span id="badge-fase" class="bg-tm-azul text-white text-xs font-bold uppercase px-3 py-1 rounded-full animate-pulse">En Tránsito</span>
                    <h2 class="text-2xl font-black text-tm-azul mt-3">Detalle del Viaje</h2>
                </div>
                
                <div class="p-6 space-y-4 flex-grow flex flex-col justify-center" id="info-pedido-activo">
                </div>
            </div>
        </div>

        <div id="vista-perfil" class="hidden h-full flex flex-col">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm">Mis Datos Personales</h2>
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-tm-dorado">
                <form id="form-editar-perfil" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre Completo</label>
                        <input type="text" id="edit-nombre" required class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">WhatsApp</label>
                        <input type="tel" id="edit-telefono" required class="w-full p-3 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-tm-azul outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehículo Actual</label>
                        <select id="edit-vehiculo" class="w-full p-3 bg-gray-50 border rounded-lg outline-none cursor-pointer">
                            <option value="Moto">Motocicleta</option>
                            <option value="Bici">Bicicleta</option>
                            <option value="Auto">Automóvil</option>
                        </select>
                    </div>
                    
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="cerrarPerfil()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-300 transition">Cancelar</button>
                        <button type="submit" id="btn-guardar-perfil" class="flex-1 bg-tm-azul text-white font-bold py-3 rounded-lg hover:bg-tm-azul-oscuro transition shadow-md">Guardar Datos</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioId = null;
        let watchId = null;
        let ultimaVezEnviado = 0;
        let pedidoActivo = null;

        const CENTRO_TRES_MARIAS = { lat: 19.6942, lng: -101.1278 }; 
        const RADIO_PERMITIDO_METROS = 5000; 

        // 1. MODIFICADO: Recuperación inteligente tras F5
        async function init() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (!session) return window.location.href = 'login-repartidor.html';
            
            usuarioId = session.user.id;
            
            // Traemos también 'esta_activo' para saber si estaba en línea antes de recargar
            const { data: perfil } = await clienteSupabase.from('repartidores').select('nombre, esta_activo').eq('id', usuarioId).maybeSingle();
            if (perfil && perfil.nombre) {
                document.getElementById('nombre-repartidor').innerText = `Hola, ${perfil.nombre.split(' ')[0]}`;
            }

            // Buscamos si hay pedido pendiente, y ahora INCLUIMOS 'asignado'
            const { data: pedidoPendiente } = await clienteSupabase.from('pedidos')
                .select('*, anuncios(nombre_negocio, direccion)')
                .eq('repartidor_id', usuarioId)
                .in('estado', ['asignado', 'aceptado', 'en_camino'])
                .order('created_at', { ascending: false })
                .limit(1)
                .maybeSingle();

            if (pedidoPendiente) {
                if (pedidoPendiente.estado === 'asignado') {
                    // Si recargó y apenas se lo asignaron
                    document.getElementById('toggle-estado').checked = true;
                    marcarConectadoUI();
                    cargarPedidosDisponibles();
                    iniciarRastreoInteligente();
                } else {
                    // Si ya iba en camino al negocio o al cliente
                    pedidoActivo = pedidoPendiente;
                    document.getElementById('toggle-estado').checked = true;
                    marcarConectadoUI();
                    iniciarRastreoInteligente();
                    mostrarPantallaActivo();
                }
                suscribirseAPedidos();
            } else {
                // Si no hay pedidos, revisamos si estaba conectado en la BD
                if (perfil && perfil.esta_activo) {
                    document.getElementById('toggle-estado').checked = true;
                    cambiarEstado(); // Esto reconecta GPS y estado automáticamente
                } else {
                    cargarPedidosDisponibles();
                }
                suscribirseAPedidos();
            }
        }

        // Pequeña función para no repetir código visual
        function marcarConectadoUI() {
            document.getElementById('estado-texto').innerText = 'Conectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-green-400';
            document.getElementById('toggle-estado').disabled = false;
        }

        async function abrirPerfil() {
            if (pedidoActivo) return alert("No puedes editar tu perfil mientras tienes un pedido en curso.");
            document.getElementById('vista-pendientes').classList.add('hidden');
            document.getElementById('vista-perfil').classList.remove('hidden');

            const { data } = await clienteSupabase.from('repartidores').select('*').eq('id', usuarioId).single();
            if (data) {
                document.getElementById('edit-nombre').value = data.nombre || '';
                document.getElementById('edit-telefono').value = data.telefono || '';
                document.getElementById('edit-vehiculo').value = data.vehiculo || 'Moto';
            }
        }

        function cerrarPerfil() {
            document.getElementById('vista-perfil').classList.add('hidden');
            document.getElementById('vista-pendientes').classList.remove('hidden');
        }

        document.getElementById('form-editar-perfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar-perfil');
            btn.innerText = "Guardando..."; btn.disabled = true;

            const nombre = document.getElementById('edit-nombre').value;
            const telefono = document.getElementById('edit-telefono').value;
            const vehiculo = document.getElementById('edit-vehiculo').value;

            const { error } = await clienteSupabase.from('repartidores').update({ nombre, telefono, vehiculo }).eq('id', usuarioId);
            btn.innerText = "Guardar Datos"; btn.disabled = false;

            if (error) alert("Error: " + error.message);
            else {
                document.getElementById('nombre-repartidor').innerText = `Hola, ${nombre.split(' ')[0]}`;
                cerrarPerfil();
            }
        });

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3; const rad = Math.PI / 180;
            const a = Math.sin((lat2 - lat1)*rad/2)**2 + Math.cos(lat1*rad)*Math.cos(lat2*rad)*Math.sin((lon2 - lon1)*rad/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        async function cambiarEstado() {
            const toggle = document.getElementById('toggle-estado');
            const textoEstado = document.getElementById('estado-texto');
            
            if (toggle.checked) {
                textoEstado.innerText = 'Buscando GPS...';
                textoEstado.className = 'font-bold text-sm text-yellow-500';
                toggle.disabled = true;

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const distancia = calcularDistancia(pos.coords.latitude, pos.coords.longitude, CENTRO_TRES_MARIAS.lat, CENTRO_TRES_MARIAS.lng);
                    if (distancia > RADIO_PERMITIDO_METROS) {
                        alert("Estás fuera de la zona. Acércate para trabajar.");
                        forzarDesconexion();
                        return;
                    }
                    await clienteSupabase.from('repartidores').update({ esta_activo: true }).eq('id', usuarioId);
                    marcarConectadoUI();
                    cargarPedidosDisponibles();
                    iniciarRastreoInteligente();
                }, () => {
                    alert("GPS obligatorio. Activa tu ubicación.");
                    forzarDesconexion();
                }, { enableHighAccuracy: true });
            } else {
                if(pedidoActivo) {
                    alert("Termina tu pedido actual antes de desconectarte.");
                    toggle.checked = true;
                    return;
                }
                forzarDesconexion(true);
            }
        }

        function forzarDesconexion() {
            document.getElementById('toggle-estado').checked = false;
            document.getElementById('toggle-estado').disabled = false;
            document.getElementById('estado-texto').innerText = 'Desconectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-red-300';
            document.getElementById('contenedor-pedidos').innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">Conéctate para ver si te asignaron un viaje...</p>';
            
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(usuarioId) clienteSupabase.from('repartidores').update({ esta_activo: false }).eq('id', usuarioId);
        }

        function iniciarRastreoInteligente() {
            if (watchId) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                if (!pedidoActivo) return; 

                const ahora = Date.now();
                if (ahora - ultimaVezEnviado > 10000) { 
                    await clienteSupabase.from('repartidores').update({ latitud: latitude, longitud: longitude }).eq('id', usuarioId);

                    if (pedidoActivo.estado === 'en_camino') {
                        await clienteSupabase.from('pedidos')
                            .update({ repartidor_lat: latitude, repartidor_lng: longitude })
                            .eq('id', pedidoActivo.id);
                    }
                    ultimaVezEnviado = ahora;
                }
            }, console.error, { enableHighAccuracy: true });
        }

        async function cargarPedidosDisponibles() {
            if(!document.getElementById('toggle-estado').checked || pedidoActivo) return;

            const { data } = await clienteSupabase.from('pedidos')
                .select('*, anuncios(nombre_negocio)')
                .eq('estado', 'asignado')
                .eq('repartidor_id', usuarioId) // SOLO MIS PEDIDOS ASIGNADOS
                .order('created_at', { ascending: false });
            
            const contenedor = document.getElementById('contenedor-pedidos');
            if(!data || data.length === 0) {
                contenedor.innerHTML = '<p class="text-center text-gray-400 mt-10">No tienes viajes asignados por el momento.</p>';
                return;
            }
            
            contenedor.innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-tm-dorado transition hover:shadow-md">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded shadow-sm">⭐ Te Eligieron</span>
                        <span class="text-gray-400 text-xs font-mono">Folio: ${p.folio}</span>
                    </div>
                    <p class="text-xs text-tm-azul uppercase font-bold mb-1">De: ${p.anuncios ? p.anuncios.nombre_negocio : 'Negocio'}</p>
                    <p class="font-bold text-gray-800 text-lg mb-1">Para: ${p.cliente_nombre}</p>
                    <p class="text-sm text-gray-500 leading-tight mb-4">📍 ${p.cliente_direccion}</p>
                    
                    <div class="border-t border-dashed pt-3 flex justify-between items-center">
                        <p class="text-xs text-gray-400">Total a cobrar:</p>
                        <span class="font-black text-xl text-tm-azul">$${p.total}</span>
                    </div>
                    <button onclick="aceptarPedido('${p.id}')" class="mt-4 w-full bg-tm-dorado hover:bg-yellow-600 text-white font-bold py-3 rounded-lg transition shadow">Aceptar Mi Viaje</button>
                </div>
            `).join('');
        }

        // 2. MODIFICADO: Generar sonido y alerta cuando el vendedor asigne
        function reproducirBeep() {
            try {
                // Sonido de alerta muy simple generado por JS puro sin necesidad de MP3
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.value = 880; // Tono alto
                gain.gain.setValueAtTime(1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                osc.start();
                osc.stop(ctx.currentTime + 1);
            } catch(e) { console.log(e); }
        }

        function suscribirseAPedidos() {
            clienteSupabase.channel('pedidos-nuevos')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, payload => {
                    const nuevo = payload.new;
                    
                    // Si el vendedor actualizó el pedido a 'asignado' y el ID es el mío
                    if (nuevo && nuevo.estado === 'asignado' && nuevo.repartidor_id === usuarioId) {
                        if (navigator.vibrate) navigator.vibrate([500, 200, 500]); // Vibrar si el celular lo soporta
                        reproducirBeep(); // Sonar beep
                        // La alerta pausa el navegador, garantizando que el repartidor la vea
                        alert("¡🔔 NUEVO VIAJE ASIGNADO! Revisa tu pantalla.");
                    }

                    if(!pedidoActivo) cargarPedidosDisponibles(); 
                }).subscribe();
        }

        async function aceptarPedido(id_pedido) {
            const { data: check } = await clienteSupabase.from('pedidos').select('estado, repartidor_id').eq('id', id_pedido).single();
            if(check.estado !== 'asignado' || check.repartidor_id !== usuarioId) return alert("Este pedido ya no está disponible.");

            const { data: pedido, error } = await clienteSupabase.from('pedidos')
                .update({ estado: 'aceptado' })
                .eq('id', id_pedido)
                .select('*, anuncios(nombre_negocio, direccion)').single();
            
            if(error) return alert("Error al aceptar.");
            
            pedidoActivo = pedido;
            mostrarPantallaActivo();
        }

        async function iniciarEntrega() {
            const { data: pedido, error } = await clienteSupabase.from('pedidos')
                .update({ estado: 'en_camino' })
                .eq('id', pedidoActivo.id)
                .select('*, anuncios(nombre_negocio, direccion)').single();

            if(error) return alert("Error al iniciar entrega.");

            pedidoActivo = pedido;
            alert("¡GPS Activado!\nEl cliente ya puede rastrear tu ubicación en el mapa.");
            mostrarPantallaActivo();
        }

        function mostrarPantallaActivo() {
            document.getElementById('vista-pendientes').classList.add('hidden');
            document.getElementById('vista-perfil').classList.add('hidden');
            document.getElementById('vista-activo').classList.remove('hidden');

            const infoContainer = document.getElementById('info-pedido-activo');
            const estadoTexto = document.getElementById('estado-texto');
            const badgeFase = document.getElementById('badge-fase');

            if (pedidoActivo.estado === 'aceptado') {
                estadoTexto.innerText = 'Voy al Negocio';
                estadoTexto.className = 'font-bold text-sm text-yellow-500';
                badgeFase.innerText = "Fase 1: Recolección";
                badgeFase.className = "bg-yellow-500 text-white text-xs font-bold uppercase px-3 py-1 rounded-full animate-pulse";

                infoContainer.innerHTML = `
                    <div class="bg-yellow-50 p-5 rounded-xl border border-yellow-200 shadow-sm">
                        <p class="text-xs text-yellow-600 uppercase font-black tracking-wider mb-2">Recoger Pedido en:</p>
                        <p class="font-bold text-xl text-yellow-900">${pedidoActivo.anuncios ? pedidoActivo.anuncios.nombre_negocio : 'El negocio'}</p>
                        <p class="text-sm text-yellow-700 mt-1">📍 ${pedidoActivo.anuncios ? pedidoActivo.anuncios.direccion : 'Revisa la dirección con el cliente'}</p>
                        <p class="text-xs text-yellow-600 mt-4 font-mono font-bold bg-yellow-200 inline-block px-2 py-1 rounded">Folio: ${pedidoActivo.folio}</p>
                    </div>
                    
                    <button onclick="iniciarEntrega()" class="w-full mt-auto bg-tm-dorado hover:bg-yellow-600 text-white font-black py-4 rounded-xl shadow-lg transition text-lg flex justify-center items-center gap-2">
                        <span>📦</span> Ya tengo el pedido
                    </button>
                `;
            } else if (pedidoActivo.estado === 'en_camino') {
                estadoTexto.innerText = 'En Ruta al Cliente';
                estadoTexto.className = 'font-bold text-sm text-green-500';
                badgeFase.innerText = "Fase 2: Entrega GPS Activo";
                badgeFase.className = "bg-green-500 text-white text-xs font-bold uppercase px-3 py-1 rounded-full animate-pulse";

                infoContainer.innerHTML = `
                    <div class="bg-gray-50 p-4 rounded-lg border shadow-sm">
                        <p class="text-xs text-gray-500 uppercase font-black tracking-wider mb-1">Entregar a</p>
                        <p class="font-bold text-xl text-gray-800">${pedidoActivo.cliente_nombre}</p>
                        <p class="text-sm text-gray-600 mt-1">📍 ${pedidoActivo.cliente_direccion}</p>
                        <a href="tel:${pedidoActivo.cliente_telefono || ''}" class="bg-white border border-tm-azul text-tm-azul px-3 py-1.5 rounded-lg text-sm font-bold mt-3 inline-block hover:bg-blue-50">📞 Llamar</a>
                    </div>
                    
                    <div class="bg-white p-4 rounded-lg border shadow-sm flex justify-between items-center mt-3">
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Cobrar al entregar:</p>
                        <p class="text-3xl font-black text-green-600">$${pedidoActivo.total}</p>
                    </div>
                    
                    <div class="mt-auto grid gap-3 pt-4">
                        <button onclick="abrirRutaMaps()" class="w-full bg-blue-100 text-tm-azul font-bold py-3.5 rounded-xl flex justify-center items-center gap-2 hover:bg-blue-200 transition">
                            📍 Abrir en Google Maps
                        </button>
                        <button onclick="finalizarPedido()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl shadow-lg transition text-lg flex justify-center items-center gap-2">
                            <span>✅</span> Pedido Entregado
                        </button>
                    </div>
                `;
            }
        }

        function abrirRutaMaps() {
            let direccion = pedidoActivo.estado === 'aceptado' ? (pedidoActivo.anuncios ? pedidoActivo.anuncios.direccion : '') : pedidoActivo.cliente_direccion;
            const direccionCodificada = encodeURIComponent(`${direccion}, Tres Marias, Morelia, Michoacan`);
            window.open(`https://maps.google.com/?q=${direccionCodificada}`, '_blank');
        }

        async function finalizarPedido() {
            if(!confirm("¿Confirmas que ya entregaste el pedido y recibiste el dinero?")) return;

            await clienteSupabase.from('pedidos').update({ estado: 'entregado' }).eq('id', pedidoActivo.id);
            
            alert("¡Excelente trabajo! Pedido finalizado.");
            pedidoActivo = null;
            marcarConectadoUI();
            
            document.getElementById('vista-activo').classList.add('hidden');
            document.getElementById('vista-pendientes').classList.remove('hidden');
            cargarPedidosDisponibles();
        }

        async function cerrarSesion() {
            if(pedidoActivo) return alert("Termina el pedido actual antes de salir.");
            forzarDesconexion(true);
            await clienteSupabase.auth.signOut();
            window.location.reload();
        }

        init();
    </script>
</body>
</html>
