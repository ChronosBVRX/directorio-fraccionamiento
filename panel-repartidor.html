<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Repartidor - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-dorado': '#d4af37' } } } }
    </script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <header class="bg-tm-azul text-white p-4 flex justify-between items-center shadow-md z-10 relative">
        <div>
            <h1 class="font-black text-lg leading-tight">App Repartidor</h1>
            <button onclick="abrirPerfil()" class="text-xs text-blue-200 hover:text-white transition flex items-center gap-1 mt-0.5">
                <span id="nombre-repartidor">Cargando...</span> ✏️
            </button>
        </div>
        <div class="flex items-center gap-3">
            <span id="estado-texto" class="font-bold text-sm text-red-300">Desconectado</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="toggle-estado" class="sr-only peer" onchange="cambiarEstado()">
                <div class="w-11 h-6 bg-gray-400 rounded-full peer peer-checked:bg-green-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
            </label>
            <button onclick="cerrarSesion()" class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded font-bold">Salir</button>
        </div>
    </header>

    <main class="flex-grow p-4 overflow-y-auto w-full max-w-md mx-auto relative">
        
        <div id="vista-pendientes" class="block">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm flex items-center justify-between">
                <span>Mis Pedidos Asignados</span>
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute h-full w-full rounded-full bg-tm-dorado opacity-75"></span>
                  <span class="relative rounded-full h-3 w-3 bg-tm-dorado"></span>
                </span>
            </h2>
            <div id="contenedor-pedidos" class="space-y-4">
                <p class="text-center text-gray-400 mt-10 text-sm">Conéctate para recibir viajes...</p>
            </div>
        </div>

        <div id="vista-activo" class="hidden h-full flex flex-col">
            <div class="bg-white rounded-2xl shadow-xl border-t-4 border-tm-azul overflow-hidden flex-grow flex flex-col">
                <div class="p-6 bg-blue-50 border-b text-center">
                    <span id="badge-fase" class="bg-tm-azul text-white text-xs font-bold uppercase px-3 py-1 rounded-full animate-pulse">En Tránsito</span>
                    <h2 class="text-2xl font-black text-tm-azul mt-3">Detalle del Viaje</h2>
                </div>
                <div class="p-6 space-y-4 flex-grow flex flex-col justify-center" id="info-pedido-activo"></div>
            </div>
        </div>

        <div id="vista-perfil" class="hidden h-full flex flex-col">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm">Mis Datos Personales</h2>
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-tm-dorado">
                <form id="form-editar-perfil" class="space-y-4">
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre</label><input type="text" id="edit-nombre" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none"></div>
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">WhatsApp</label><input type="tel" id="edit-telefono" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none"></div>
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehículo</label><select id="edit-vehiculo" class="w-full p-3 bg-gray-50 border rounded-lg outline-none"><option value="Moto">Motocicleta</option><option value="Bici">Bicicleta</option><option value="Auto">Automóvil</option></select></div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="cerrarPerfil()" class="flex-1 bg-gray-200 font-bold py-3 rounded-lg">Cancelar</button>
                        <button type="submit" class="flex-1 bg-tm-azul text-white font-bold py-3 rounded-lg">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioId = null;
        let watchId = null;
        let ultimaVezEnviado = 0;
        let pedidoActivo = null;

        async function init() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (!session) return window.location.href = 'login-repartidor.html';
            usuarioId = session.user.id;
            
            const { data: perf } = await clienteSupabase.from('repartidores').select('nombre, esta_activo').eq('id', usuarioId).maybeSingle();
            if (perf?.nombre) document.getElementById('nombre-repartidor').innerText = `Hola, ${perf.nombre.split(' ')[0]}`;

            const { data: ped } = await clienteSupabase.from('pedidos').select('*, anuncios(nombre_negocio, direccion, enlace_whatsapp)').eq('repartidor_id', usuarioId).in('estado', ['asignado', 'aceptado', 'en_camino']).order('creado_en', { ascending: false }).limit(1).maybeSingle();

            if (ped) {
                document.getElementById('toggle-estado').checked = true;
                marcarConectadoUI();
                iniciarRastreoInteligente();
                if (ped.estado === 'asignado') cargarPedidosDisponibles();
                else { pedidoActivo = ped; mostrarPantallaActivo(); }
            } else if (perf?.esta_activo) {
                document.getElementById('toggle-estado').checked = true;
                cambiarEstado();
            } else {
                cargarPedidosDisponibles();
            }
            suscribirseAPedidos();
        }

        function marcarConectadoUI() {
            document.getElementById('estado-texto').innerText = 'Conectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-green-400';
            document.getElementById('toggle-estado').disabled = false;
        }

        async function cambiarEstado() {
            const toggle = document.getElementById('toggle-estado');
            if (toggle.checked) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await clienteSupabase.from('repartidores').update({ esta_activo: true }).eq('id', usuarioId);
                    marcarConectadoUI();
                    cargarPedidosDisponibles();
                    iniciarRastreoInteligente();
                }, () => { alert("GPS obligatorio."); forzarDesconexion(); }, { enableHighAccuracy: true });
            } else {
                if(pedidoActivo) { alert("Termina el pedido primero."); toggle.checked = true; return; }
                await forzarDesconexion(); // AHORA ESPERA
            }
        }

        // CORRECCIÓN: Ahora es una función asíncrona para asegurar que la base de datos se actualice
        async function forzarDesconexion() {
            document.getElementById('toggle-estado').checked = false;
            document.getElementById('estado-texto').innerText = 'Desconectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-red-300';
            document.getElementById('contenedor-pedidos').innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">Conéctate para recibir viajes...</p>';
            
            if(watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            if(usuarioId) {
                // AWAIT clave para que no corte la conexión antes de guardar
                await clienteSupabase.from('repartidores').update({ esta_activo: false }).eq('id', usuarioId);
            }
        }

        function iniciarRastreoInteligente() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                if (!pedidoActivo) return;
                const ahora = Date.now();
                if (ahora - ultimaVezEnviado > 10000) {
                    await clienteSupabase.from('repartidores').update({ latitud: pos.coords.latitude, longitud: pos.coords.longitude }).eq('id', usuarioId);
                    if (pedidoActivo.estado === 'en_camino') {
                        await clienteSupabase.from('pedidos').update({ repartidor_lat: pos.coords.latitude, repartidor_lng: pos.coords.longitude }).eq('id', pedidoActivo.id);
                    }
                    ultimaVezEnviado = ahora;
                }
            }, null, { enableHighAccuracy: true });
        }

        async function cargarPedidosDisponibles() {
            if(!document.getElementById('toggle-estado').checked || pedidoActivo) return;
            const { data } = await clienteSupabase.from('pedidos').select('*, anuncios(*)').eq('estado', 'asignado').eq('repartidor_id', usuarioId).order('creado_en', { ascending: false });
            const contenedor = document.getElementById('contenedor-pedidos');
            if(!data || data.length === 0) { contenedor.innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">Sin viajes asignados.</p>'; return; }
            
            contenedor.innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-tm-dorado">
                    <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase">⭐ Te eligieron</span>
                    <p class="text-xs font-bold text-tm-azul mt-2">${p.anuncios?.nombre_negocio}</p>
                    <p class="font-black text-lg text-gray-800">${p.cliente_nombre}</p>
                    <p class="text-sm text-gray-500 mb-4">📍 ${p.cliente_direccion}</p>
                    <div class="border-t border-dashed pt-3 flex justify-between items-center">
                        <span class="text-sm font-black text-tm-azul">$${p.total}</span>
                        <div class="flex gap-2">
                            <button onclick="rechazarPedido('${p.id}', '${p.folio}', '${p.anuncios?.enlace_whatsapp}')" class="bg-gray-100 px-3 py-2 rounded-lg font-bold text-xs">Rechazar</button>
                            <button onclick="aceptarPedido('${p.id}')" class="bg-tm-dorado text-white px-4 py-2 rounded-lg font-bold text-xs">Aceptar</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function reproducirBeep() {
            try {
                const ctx = new window.AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880; osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                osc.stop(ctx.currentTime + 1);
            } catch(e){}
        }

        function suscribirseAPedidos() {
            clienteSupabase.channel('peds').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pedidos' }, payload => {
                if(!pedidoActivo) cargarPedidosDisponibles();
                if (payload.new.estado === 'asignado' && payload.new.repartidor_id === usuarioId) {
                    reproducirBeep(); if(navigator.vibrate) navigator.vibrate([500,200,500]);
                    setTimeout(() => alert("¡🔔 VIAJE ASIGNADO!"), 500);
                }
            }).subscribe();
        }

        async function rechazarPedido(id, folio, wa) {
            if(!confirm("¿Rechazar viaje?")) return;
            await clienteSupabase.from('pedidos').update({ estado: 'esperando_activacion', repartidor_id: null }).eq('id', id);
            if(wa) {
                const ruta = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                const link = `${ruta}/activar_pedido.html?folio=${folio}`;
                const msg = `No puedo aceptar el pedido *${folio}*. Asígnalo de nuevo aquí:\n${link}`;
                window.open(`https://wa.me/${wa.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
            }
            cargarPedidosDisponibles();
        }

        async function aceptarPedido(id) {
            const { data: ped, error } = await clienteSupabase.from('pedidos').update({ estado: 'aceptado' }).eq('id', id).select('*, anuncios(*)').single();
            if(!error) { pedidoActivo = ped; mostrarPantallaActivo(); }
        }

        async function iniciarEntrega() {
            const { data: ped, error } = await clienteSupabase.from('pedidos').update({ estado: 'en_camino' }).eq('id', pedidoActivo.id).select('*, anuncios(*)').single();
            if(!error) { pedidoActivo = ped; alert("GPS Activado."); mostrarPantallaActivo(); }
        }

        function mostrarPantallaActivo() {
            document.getElementById('vista-pendientes').classList.add('hidden');
            document.getElementById('vista-activo').classList.remove('hidden');
            const info = document.getElementById('info-pedido-activo');
            
            const txtPago = pedidoActivo.pago_confirmado 
                ? `<div class="bg-green-100 text-green-700 p-3 rounded-lg text-center font-black text-xs mb-4">✅ YA ESTÁ PAGADO - NO COBRAR</div>`
                : `<div class="bg-red-100 text-red-700 p-3 rounded-lg text-center font-black text-xs mb-4">⚠️ COBRAR $${pedidoActivo.total} EN EFECTIVO</div>`;

            if (pedidoActivo.estado === 'aceptado') {
                document.getElementById('badge-fase').innerText = "Fase 1: Recolección";
                info.innerHTML = `
                    <div class="bg-yellow-50 p-5 rounded-xl border border-yellow-200">
                        ${txtPago}
                        <p class="text-xs text-yellow-600 font-black uppercase mb-1">Recoger en:</p>
                        <p class="font-bold text-xl text-yellow-900">${pedidoActivo.anuncios?.nombre_negocio}</p>
                        <p class="text-sm text-yellow-700 mt-1">📍 ${pedidoActivo.anuncios?.direccion}</p>
                    </div>
                    <button onclick="iniciarEntrega()" class="w-full mt-6 bg-tm-dorado text-white font-black py-4 rounded-xl shadow-lg transition text-lg">📦 YA TENGO EL PEDIDO</button>`;
            } else {
                document.getElementById('badge-fase').innerText = "Fase 2: Entrega GPS Activo";
                info.innerHTML = `
                    <div class="bg-gray-50 p-4 rounded-lg border">
                        ${txtPago}
                        <p class="text-xs text-gray-500 font-black uppercase mb-1">Entregar a:</p>
                        <p class="font-bold text-xl text-gray-800">${pedidoActivo.cliente_nombre}</p>
                        <p class="text-sm text-gray-600">📍 ${pedidoActivo.cliente_direccion}</p>
                        <a href="tel:${pedidoActivo.cliente_telefono}" class="bg-white border border-tm-azul text-tm-azul px-4 py-2 rounded-lg text-xs font-bold mt-4 inline-block">📞 Llamar</a>
                    </div>
                    <div class="mt-auto grid gap-3 pt-4">
                        <button onclick="window.open('http://googleusercontent.com/maps.google.com/2{encodeURIComponent(pedidoActivo.cliente_direccion)}', '_blank')" class="w-full bg-blue-100 text-tm-azul font-bold py-4 rounded-xl">📍 ABRIR MAPA</button>
                        <button onclick="finalizarPedido()" class="w-full bg-green-500 text-white font-black py-4 rounded-xl shadow-lg">✅ PEDIDO ENTREGADO</button>
                    </div>`;
            }
        }

        async function finalizarPedido() {
            if(!confirm("¿Entregado y cobrado?")) return;
            await clienteSupabase.from('pedidos').update({ estado: 'entregado' }).eq('id', pedidoActivo.id);
            pedidoActivo = null; marcarConectadoUI();
            document.getElementById('vista-activo').classList.add('hidden');
            document.getElementById('vista-pendientes').classList.remove('hidden');
            cargarPedidosDisponibles();
        }

        // CORRECCIÓN: Se agregó 'await' para forzar a que termine la desconexión antes de salir
        async function cerrarSesion() { 
            if(pedidoActivo) {
                alert("Termina el pedido primero.");
                return; 
            }
            await forzarDesconexion(); 
            await clienteSupabase.auth.signOut(); 
            window.location.reload(); 
        }
        
        // Seguro extra por si cierran la pestaña de golpe (navegadores lo soportan parcialmente)
        window.addEventListener('beforeunload', (e) => {
            if(usuarioId && document.getElementById('toggle-estado').checked) {
                clienteSupabase.from('repartidores').update({ esta_activo: false }).eq('id', usuarioId).then();
            }
        });

        init();
    </script>
</body>
</html>
