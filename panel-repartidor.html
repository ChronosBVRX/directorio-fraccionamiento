<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Repartidor - Vive Tres Marías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] }, colors: { 'tm-azul': '#22527b', 'tm-dorado': '#d4af37' } } } }
    </script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <header class="bg-tm-azul text-white p-4 flex justify-between items-center shadow-md z-10 relative shrink-0">
        <div>
            <h1 class="font-black text-lg leading-tight">App Repartidor</h1>
            <button onclick="abrirPerfil()" class="text-xs text-blue-200 hover:text-white transition flex items-center gap-1 mt-0.5">
                <span id="nombre-repartidor">Cargando...</span> ✏️
            </button>
        </div>
        <div class="flex items-center gap-3">
            <span id="estado-texto" class="font-bold text-sm text-red-300">Desconectado</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="toggle-estado" class="sr-only peer" onchange="cambiarEstado()">
                <div class="w-11 h-6 bg-gray-400 rounded-full peer peer-checked:bg-green-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
            </label>
            <button onclick="cerrarSesion()" class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded font-bold">Salir</button>
        </div>
    </header>

    <main class="flex-grow p-4 overflow-y-auto w-full max-w-md mx-auto relative">
        
        <div id="vista-ruta" class="block pb-20">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm flex items-center justify-between">
                <span>Mi Ruta Activa</span>
                <span class="relative flex h-3 w-3" id="indicador-actividad">
                  </span>
            </h2>
            
            <div id="contenedor-pedidos" class="space-y-4">
                <p class="text-center text-gray-400 mt-10 text-sm">Conéctate para recibir viajes...</p>
            </div>
        </div>

        <div id="vista-perfil" class="hidden h-full flex flex-col">
            <h2 class="text-gray-500 font-bold mb-4 uppercase text-sm">Mis Datos Personales</h2>
            <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-tm-dorado">
                <form id="form-editar-perfil" class="space-y-4">
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre</label><input type="text" id="edit-nombre" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none"></div>
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">WhatsApp</label><input type="tel" id="edit-telefono" required class="w-full p-3 bg-gray-50 border rounded-lg outline-none"></div>
                    <div><label class="block text-xs font-bold uppercase text-gray-500 mb-1">Vehículo</label><select id="edit-vehiculo" class="w-full p-3 bg-gray-50 border rounded-lg outline-none"><option value="Moto">Motocicleta</option><option value="Bici">Bicicleta</option><option value="Auto">Automóvil</option></select></div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" onclick="cerrarPerfil()" class="flex-1 bg-gray-200 font-bold py-3 rounded-lg">Cancelar</button>
                        <button type="submit" class="flex-1 bg-tm-azul text-white font-bold py-3 rounded-lg">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://vlnpefgqodnxcqeztcnh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsbnBlZmdxb2RueGNxZXp0Y25oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzI4NTUsImV4cCI6MjA5MDkwODg1NX0.mhDVhu9xRnFFi1dEevyK2tDnNk1Kc6pPRatQCxt-1NM';
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let usuarioId = null;
        let watchId = null;
        let ultimaVezEnviado = 0;
        
        // Ahora manejamos un ARREGLO de pedidos
        let pedidosActivos = [];

        async function init() {
            const { data: { session } } = await clienteSupabase.auth.getSession();
            if (!session) return window.location.href = 'login-repartidor.html';
            usuarioId = session.user.id;
            
            const { data: perf } = await clienteSupabase.from('repartidores').select('nombre, esta_activo').eq('id', usuarioId).maybeSingle();
            if (perf?.nombre) document.getElementById('nombre-repartidor').innerText = `Hola, ${perf.nombre.split(' ')[0]}`;

            // Cargamos TODOS los pedidos que le pertenecen y no están entregados
            await cargarTodosLosPedidos(false);

            if (pedidosActivos.length > 0) {
                document.getElementById('toggle-estado').checked = true;
                marcarConectadoUI();
                iniciarRastreoInteligente();
            } else if (perf?.esta_activo) {
                document.getElementById('toggle-estado').checked = true;
                cambiarEstado();
            }
            
            suscribirseAPedidos();
        }

        function marcarConectadoUI() {
            document.getElementById('estado-texto').innerText = 'Conectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-green-400';
            document.getElementById('toggle-estado').disabled = false;
            document.getElementById('indicador-actividad').innerHTML = `
                <span class="animate-ping absolute h-full w-full rounded-full bg-tm-dorado opacity-75"></span>
                <span class="relative rounded-full h-3 w-3 bg-tm-dorado"></span>`;
        }

        async function cambiarEstado() {
            const toggle = document.getElementById('toggle-estado');
            if (toggle.checked) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await clienteSupabase.from('repartidores').update({ esta_activo: true }).eq('id', usuarioId);
                    marcarConectadoUI();
                    cargarTodosLosPedidos();
                    iniciarRastreoInteligente();
                }, () => { alert("GPS obligatorio."); forzarDesconexion(); }, { enableHighAccuracy: true });
            } else {
                if(pedidosActivos.length > 0) { 
                    alert("Tienes pedidos en curso. Termínalos antes de desconectarte."); 
                    toggle.checked = true; 
                    return; 
                }
                await forzarDesconexion();
            }
        }

        async function forzarDesconexion() {
            document.getElementById('toggle-estado').checked = false;
            document.getElementById('estado-texto').innerText = 'Desconectado';
            document.getElementById('estado-texto').className = 'font-bold text-sm text-red-300';
            document.getElementById('indicador-actividad').innerHTML = '';
            document.getElementById('contenedor-pedidos').innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">Conéctate para recibir viajes...</p>';
            
            if(watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if(usuarioId) await clienteSupabase.from('repartidores').update({ esta_activo: false }).eq('id', usuarioId);
            pedidosActivos = [];
        }

        function iniciarRastreoInteligente() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(async (pos) => {
                if (pedidosActivos.length === 0) return;
                
                const ahora = Date.now();
                if (ahora - ultimaVezEnviado > 10000) {
                    // Actualizar repartidor
                    await clienteSupabase.from('repartidores').update({ latitud: pos.coords.latitude, longitud: pos.coords.longitude }).eq('id', usuarioId);
                    
                    // Filtrar SOLO los pedidos que ya están en camino para actualizar su GPS en lote
                    const ordenesEnCamino = pedidosActivos.filter(p => p.estado === 'en_camino').map(p => p.id);
                    
                    if (ordenesEnCamino.length > 0) {
                        await clienteSupabase.from('pedidos')
                            .update({ repartidor_lat: pos.coords.latitude, repartidor_lng: pos.coords.longitude })
                            .in('id', ordenesEnCamino);
                    }
                    ultimaVezEnviado = ahora;
                }
            }, null, { enableHighAccuracy: true });
        }

        // CARGA PRINCIPAL QUE DIBUJA EL FEED
        async function cargarTodosLosPedidos(forzarRender = true) {
            const toggle = document.getElementById('toggle-estado');
            if(!toggle.checked && forzarRender) return;

            const { data } = await clienteSupabase.from('pedidos')
                .select('*, anuncios(nombre_negocio, direccion, enlace_whatsapp)')
                .eq('repartidor_id', usuarioId)
                .in('estado', ['asignado', 'aceptado', 'en_camino'])
                .order('creado_en', { ascending: false });
            
            pedidosActivos = data || [];
            if(forzarRender) renderizarFeed();
        }

        function renderizarFeed() {
            const contenedor = document.getElementById('contenedor-pedidos');
            if(pedidosActivos.length === 0) { 
                contenedor.innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">No tienes viajes activos. Esperando asignaciones...</p>'; 
                return; 
            }
            
            contenedor.innerHTML = pedidosActivos.map(p => {
                const pagoTag = p.pago_confirmado 
                    ? `<div class="bg-green-100 text-green-700 p-2 rounded text-center font-black text-[11px] mb-2 uppercase">✅ Pagado - NO COBRAR</div>`
                    : `<div class="bg-red-100 text-red-700 p-2 rounded text-center font-black text-[11px] mb-2 uppercase">⚠️ Cobrar $${p.total} EN EFECTIVO</div>`;

                // 1. TARJETA ASIGNADO (NUEVO)
                if (p.estado === 'asignado') {
                    return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-yellow-400 mb-4 animate-pulse-once">
                        <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded uppercase">⭐ Nueva Solicitud</span>
                        <p class="text-xs font-bold text-tm-azul mt-3">De: ${p.anuncios?.nombre_negocio}</p>
                        <p class="text-xs font-bold text-gray-600">Para: ${p.cliente_nombre}</p>
                        <p class="text-xs text-gray-500 mb-3 line-clamp-1">📍 ${p.cliente_direccion}</p>
                        ${pagoTag}
                        <div class="flex gap-2 mt-3">
                            <button onclick="rechazarPedido('${p.id}', '${p.folio}', '${p.anuncios?.enlace_whatsapp}')" class="flex-1 bg-gray-100 px-2 py-2.5 rounded-lg font-bold text-xs">Rechazar</button>
                            <button onclick="actualizarEstadoPedido('${p.id}', 'aceptado')" class="flex-1 bg-yellow-400 text-yellow-900 px-2 py-2.5 rounded-lg font-black text-xs uppercase shadow">Aceptar</button>
                        </div>
                    </div>`;
                }
                
                // 2. TARJETA ACEPTADO (IR AL NEGOCIO)
                if (p.estado === 'aceptado') {
                    return `
                    <div class="bg-blue-50 p-4 rounded-xl shadow-sm border-l-4 border-l-blue-500 mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="bg-blue-500 text-white text-[10px] font-black px-2 py-1 rounded uppercase">Fase 1: Recolección</span>
                            <span class="text-[10px] text-gray-500 font-mono">Folio: ${p.folio}</span>
                        </div>
                        ${pagoTag}
                        <p class="text-[10px] text-blue-600 font-bold uppercase mt-2">Ir a Negocio:</p>
                        <p class="font-black text-lg text-blue-900 leading-tight">${p.anuncios?.nombre_negocio}</p>
                        <p class="text-xs text-blue-700 mb-4">📍 ${p.anuncios?.direccion}</p>
                        
                        <div class="flex gap-2">
                            <button onclick="abrirMapa('${p.anuncios?.direccion}')" class="w-12 bg-blue-200 hover:bg-blue-300 text-blue-800 rounded-lg font-bold flex justify-center items-center">📍</button>
                            <button onclick="actualizarEstadoPedido('${p.id}', 'en_camino')" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-black text-xs uppercase shadow">📦 Ya lo recogí</button>
                        </div>
                    </div>`;
                }

                // 3. TARJETA EN CAMINO (IR AL CLIENTE)
                if (p.estado === 'en_camino') {
                    return `
                    <div class="bg-green-50 p-4 rounded-xl shadow-md border-l-4 border-l-green-500 mb-4 relative overflow-hidden">
                        <div class="absolute -right-6 top-4 bg-green-500 text-white text-[9px] font-black px-8 py-1 rotate-45 uppercase tracking-widest shadow">GPS ON</div>
                        <span class="bg-green-500 text-white text-[10px] font-black px-2 py-1 rounded uppercase mb-2 inline-block">Fase 2: Entrega</span>
                        ${pagoTag}
                        <p class="text-[10px] text-green-700 font-bold uppercase mt-2">Entregar a:</p>
                        <p class="font-black text-lg text-green-900 leading-tight">${p.cliente_nombre}</p>
                        <p class="text-xs text-green-800 mb-4">📍 ${p.cliente_direccion}</p>
                        
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button onclick="abrirMapa('${p.cliente_direccion}')" class="bg-green-200 text-green-800 py-2 rounded-lg font-bold text-xs flex justify-center items-center gap-1">📍 Mapa</button>
                            <a href="tel:${p.cliente_telefono}" class="bg-green-200 text-green-800 py-2 rounded-lg font-bold text-xs flex justify-center items-center gap-1">📞 Llamar</a>
                        </div>
                        <button onclick="finalizarPedido('${p.id}')" class="w-full bg-green-600 text-white py-3 rounded-lg font-black text-xs uppercase shadow mt-1">✅ Finalizar Viaje</button>
                    </div>`;
                }
            }).join('');
        }

        function abrirMapa(direccion) {
            const dirEncoded = encodeURIComponent(`${direccion}, Sahuayo, Michoacan`);
            window.open(`https://maps.google.com/?q=${dirEncoded}`, '_blank');
        }

        // MOTOR CENTRAL DE ACTUALIZACIÓN DE ESTADOS
        async function actualizarEstadoPedido(id, nuevoEstado) {
            const { error } = await clienteSupabase.from('pedidos').update({ estado: nuevoEstado }).eq('id', id);
            if(error) { alert("Error al actualizar: " + error.message); return; }
            
            if(nuevoEstado === 'en_camino') alert("¡GPS Activado para este pedido!\nEl cliente ya puede rastrear tu ubicación.");
            
            await cargarTodosLosPedidos(); // Recargamos el feed
        }

        async function rechazarPedido(id, folio, wa) {
            if(!confirm("¿Rechazar viaje?")) return;
            await clienteSupabase.from('pedidos').update({ estado: 'esperando_activacion', repartidor_id: null }).eq('id', id);
            
            if(wa) {
                const ruta = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
                const msg = `No puedo aceptar el pedido *${folio}*. Asígnalo de nuevo aquí:\n${ruta}/activar_pedido.html?folio=${folio}`;
                window.open(`https://wa.me/${wa.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
            }
            await cargarTodosLosPedidos();
        }

        async function finalizarPedido(id) {
            if(!confirm("¿Confirmas que ya entregaste el pedido y recibiste el dinero (si aplicaba)?")) return;
            await clienteSupabase.from('pedidos').update({ estado: 'entregado' }).eq('id', id);
            alert("¡Excelente trabajo! Viaje finalizado.");
            await cargarTodosLosPedidos();
        }

        function reproducirBeep() {
            try {
                const ctx = new window.AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880; osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
                osc.stop(ctx.currentTime + 1);
            } catch(e){}
        }

        function suscribirseAPedidos() {
            clienteSupabase.channel('peds').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'pedidos' }, payload => {
                // Recargamos el feed siempre que haya un cambio en la DB
                cargarTodosLosPedidos();
                
                if (payload.new.estado === 'asignado' && payload.new.repartidor_id === usuarioId) {
                    reproducirBeep(); if(navigator.vibrate) navigator.vibrate([500,200,500]);
                }
            }).subscribe();
        }

        // FUNCIONES DEL PERFIL
        async function abrirPerfil() {
            if (pedidosActivos.length > 0) return alert("No puedes editar tu perfil mientras tienes pedidos en curso.");
            document.getElementById('vista-ruta').classList.add('hidden');
            document.getElementById('vista-perfil').classList.remove('hidden');
            const { data } = await clienteSupabase.from('repartidores').select('*').eq('id', usuarioId).single();
            if (data) {
                document.getElementById('edit-nombre').value = data.nombre || '';
                document.getElementById('edit-telefono').value = data.telefono || '';
                document.getElementById('edit-vehiculo').value = data.vehiculo || 'Moto';
            }
        }
        function cerrarPerfil() {
            document.getElementById('vista-perfil').classList.add('hidden');
            document.getElementById('vista-ruta').classList.remove('hidden');
        }
        document.getElementById('form-editar-perfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "Guardando..."; btn.disabled = true;
            const nombre = document.getElementById('edit-nombre').value;
            const telefono = document.getElementById('edit-telefono').value;
            const vehiculo = document.getElementById('edit-vehiculo').value;
            const { error } = await clienteSupabase.from('repartidores').update({ nombre, telefono, vehiculo }).eq('id', usuarioId);
            btn.innerText = "Guardar"; btn.disabled = false;
            if (!error) { document.getElementById('nombre-repartidor').innerText = `Hola, ${nombre.split(' ')[0]}`; cerrarPerfil(); }
        });

        async function cerrarSesion() { 
            if(pedidosActivos.length > 0) { alert("Termina todos tus pedidos primero."); return; }
            await forzarDesconexion(); 
            await clienteSupabase.auth.signOut(); 
            window.location.reload(); 
        }
        
        window.addEventListener('beforeunload', (e) => {
            if(usuarioId && document.getElementById('toggle-estado').checked && pedidosActivos.length === 0) {
                clienteSupabase.from('repartidores').update({ esta_activo: false }).eq('id', usuarioId).then();
            }
        });

        init();
    </script>
</body>
</html>
